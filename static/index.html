// Player Stats render: groups players by team and uses FlashLive's
// own STATS_TYPE_GROUPS + STATS_TYPES catalog to drive the column
// layout per category (Top stats / Shots / Attack / Passes / Defense
// / Goalkeeping / General). Mirrors the FlashScore Player Stats tab
// structure rather than collapsing everything into one fixed table.
async function _loadPlayerStats(container, ticker) {
  // Prefer the TS bundle's PlayerStats block — reads /normalized so
  // it shares the cross-block cache. Falls back to the inline path
  // below if the bundle didn't load (legacy / network issue).
  if (window.StochverseBundle && window.StochverseBundle.renderPlayerStats) {
    try {
      await window.StochverseBundle.renderPlayerStats(ticker, container);
      return;
    } catch (e) {
      // Fall through to legacy renderer.
    }
  }
  container.innerHTML = '<div class="ed-stats-loading">Loading player stats…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/player-stats");
    var d = await r.json();
    if (d.error) { container.innerHTML = '<div class="ed-stats-loading">' + escH(d.error) + '</div>'; return; }
    var inner = (d.data && d.data.DATA) || d.data || {};
    var players = inner.PLAYERS || [];
    var ratings = inner.RATINGS || [];
    var stats = inner.STATS || [];
    var teams = inner.TEAMS || [];
    var typeGroups = inner.STATS_TYPE_GROUPS || [];
    var typesCatalog = inner.STATS_TYPES || [];
    if (!players.length) { container.innerHTML = '<div class="ed-stats-loading">No player stats available.</div>'; return; }
    // Index stat-type metadata for label/format lookups.
    var typeMeta = {};
    for (var ti = 0; ti < typesCatalog.length; ti++) {
      typeMeta[typesCatalog[ti].ID] = typesCatalog[ti];
    }
    // Build per-player record: info + rating + stats keyed by TYPE_ID.
    var byPlayer = {};
    for (var pi = 0; pi < players.length; pi++) {
      byPlayer[players[pi].ID] = {info: players[pi], rating: null, stats: {}};
    }
    for (var ri = 0; ri < ratings.length; ri++) {
      var rt = ratings[ri];
      if (byPlayer[rt.PLAYER_ID]) byPlayer[rt.PLAYER_ID].rating = parseFloat(rt.VALUE);
    }
    // FS_RATING also appears in the STATS array — keep both sources
    // in sync so sorting/coloring works whether RATINGS is empty or
    // not.
    for (var si = 0; si < stats.length; si++) {
      var s = stats[si];
      var rec = byPlayer[s.PLAYER_ID];
      if (!rec) continue;
      rec.stats[s.TYPE_ID] = s.VALUE;
      if (s.TYPE_ID === "FS_RATING" && rec.rating == null) {
        var fv = parseFloat(s.VALUE);
        if (!isNaN(fv) && fv > 0) rec.rating = fv;
      }
    }
    // Group players by team, preserving HOME → AWAY order.
    var teamsList = teams.slice().sort(function(a, b) {
      var rank = function(t) { return (t.SIDE === "HOME") ? 0 : (t.SIDE === "AWAY" ? 1 : 2); };
      return rank(a) - rank(b);
    });
    var byTeam = {};
    for (var ki = 0; ki < teamsList.length; ki++) byTeam[teamsList[ki].ID] = [];
    for (var pi2 = 0; pi2 < players.length; pi2++) {
      var p2 = players[pi2];
      var rec2 = byPlayer[p2.ID];
      if (byTeam[p2.TEAM_ID]) byTeam[p2.TEAM_ID].push(rec2);
    }
    // Sort each team's players: rated outfielders first (by rating
    // desc), then unrated outfielders, then goalkeepers last.
    var sortRoster = function(arr) {
      arr.sort(function(a, b) {
        var aGK = a.info.POSITION_IS_GOALKEEPER ? 1 : 0;
        var bGK = b.info.POSITION_IS_GOALKEEPER ? 1 : 0;
        if (aGK !== bGK) return aGK - bGK;
        var ra = a.rating || 0, rb = b.rating || 0;
        if (ra !== rb) return rb - ra;
        return (a.info.SHORT_DISPLAY_NAME || "").localeCompare(b.info.SHORT_DISPLAY_NAME || "");
      });
    };
    for (var tk in byTeam) sortRoster(byTeam[tk]);
    // Determine usable category tabs. FlashLive sometimes ships
    // groups like GENERAL that overlap heavily with TOP_STATS — keep
    // them all so users can compare with FlashScore directly.
    var groups = typeGroups.length ? typeGroups : [{
      ID: "ALL", LABEL: "Stats", IS_GOALKEEPER_STAT: false,
      TYPES: [{ID: "FS_RATING"}, {ID: "SHOTS_TOTAL"}, {ID: "PASSES_ACCURACY"}, {ID: "TOUCHES_TOTAL"}],
    }];
    // Stable ID for tab buttons so switching doesn't collide across
    // re-renders.
    var uid = "ps-" + Math.random().toString(36).slice(2, 8);
    var h = '<div class="ps-cat-tabs">';
    for (var gi = 0; gi < groups.length; gi++) {
      h += '<button class="ed-sb-tab' + (gi === 0 ? ' active' : '') + '"'
         + ' data-ps-grp="' + gi + '" onclick="window._psSwitchGroup(this)">'
         + escH(groups[gi].LABEL || groups[gi].ID) + '</button>';
    }
    h += '</div>';
    // Build one panel per group, only the first is visible.
    for (var gi2 = 0; gi2 < groups.length; gi2++) {
      var g = groups[gi2];
      var typeIds = (g.TYPES || []).map(function(t) { return t.ID; });
      // Rating label gets a tighter "Rtg" header in the table even
      // though the catalog calls it "Rating".
      h += '<div class="ps-grp-panel" data-ps-grp="' + gi2 + '"'
         + ' style="display:' + (gi2 === 0 ? 'block' : 'none') + '">';
      for (var tj = 0; tj < teamsList.length; tj++) {
        var team = teamsList[tj];
        var roster = byTeam[team.ID] || [];
        if (!roster.length) continue;
        var crestUrl = team.IMAGE
          ? ('https://www.flashscore.com/res/image/data/' + team.IMAGE) : "";
        h += '<div class="ps-team-header">';
        if (crestUrl) h += '<img class="ps-team-crest" src="' + escH(crestUrl) + '" alt="" loading="lazy">';
        h += '<span class="ps-team-name">' + escH(team.NAME || team.THREE_CHAR_NAME || "") + '</span>';
        h += '<span class="ps-team-side">' + escH(team.SIDE || "") + '</span>';
        h += '</div>';
        h += '<div class="ps-table-wrap"><table class="ps-table">';
        h += '<thead><tr><th class="ps-col-name">Player</th>';
        for (var ci = 0; ci < typeIds.length; ci++) {
          var meta = typeMeta[typeIds[ci]] || {};
          var label = meta.LABEL || typeIds[ci];
          if (typeIds[ci] === "FS_RATING") label = "Rtg";
          h += '<th title="' + escH(meta.LABEL || "") + '">' + escH(label) + '</th>';
        }
        h += '</tr></thead><tbody>';
        for (var pj = 0; pj < roster.length; pj++) {
          var p = roster[pj];
          var name = p.info.SHORT_DISPLAY_NAME || p.info.NAME || "";
          var pos = p.info.POSITION_IS_GOALKEEPER ? "GK"
            : (p.info.POSITION_NAME ? p.info.POSITION_NAME.substring(0, 3).toUpperCase() : "");
          h += '<tr>';
          h += '<td class="ps-col-name">'
             + (pos ? '<span class="ps-pos">' + escH(pos) + '</span>' : '')
             + '<span class="ps-pname">' + escH(name) + '</span></td>';
          for (var ck = 0; ck < typeIds.length; ck++) {
            var tid = typeIds[ck];
            var raw = p.stats[tid];
            var cellHTML;
            if (tid === "FS_RATING") {
              var rv = p.rating;
              if (rv != null && rv > 0) {
                var color = rv >= 7.5 ? '#4caf50' : rv >= 6.5 ? 'var(--text)' : '#f44336';
                cellHTML = '<span style="font-weight:700;color:' + color + '">' + rv.toFixed(1) + '</span>';
              } else {
                cellHTML = '<span style="color:var(--text-muted)">-</span>';
              }
            } else if (raw == null || raw === "" || raw === "0" || raw === "0%" || raw === "0.00") {
              cellHTML = '<span style="color:var(--text-muted)">-</span>';
            } else {
              cellHTML = escH(String(raw));
            }
            h += '<td>' + cellHTML + '</td>';
          }
          h += '</tr>';
        }
        h += '</tbody></table></div>';
      }
      h += '</div>';
    }
    container.innerHTML = h;
    container.dataset.psUid = uid;
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load player stats.</div>';
  }
}

// Standings panel collapse/expand. Mirrors window.toggleObSection
// but flipped: panel starts expanded so the data is visible on
// modal open, and the chevron's .open class points up. Click flips

window._toggleStandingsSection = function(btn) {

// Legacy auto-loader retained as a no-op so older entry points

function _initDebugStandings(panel) {
  if (!panel || panel.dataset.dbgLoaded) return;

  // first time the user clicks STANDINGS, which avoids burning a
  // RapidAPI call on every modal open.

async function _loadNews(container, ticker) {
  // Prefer the TS bundle's News block — reads /normalized so it
  // shares the cross-block cache. Falls back to the inline path
  // below if the bundle didn't load (legacy users / network error).
  if (window.StochverseBundle && window.StochverseBundle.renderNews) {
    try {
      await window.StochverseBundle.renderNews(ticker, container);
      return;
    } catch (e) {
      // Fall through to legacy renderer.
    }
  }
  container.innerHTML = '<div class="ed-stats-loading">Loading news…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/news");
    var d = await r.json();
    if (d.error) { container.innerHTML = '<div class="ed-stats-loading">' + escH(d.error) + '</div>'; return; }
    var data = d.data || {};
    var articles = data.DATA || data.data || [];
    if (!Array.isArray(articles) || !articles.length) {
      container.innerHTML = '<div class="ed-stats-loading">No news available.</div>';
      return;
    }
    var h = '';
    for (var i = 0; i < Math.min(articles.length, 10); i++) {
      var a = articles[i];
      if (!a || typeof a !== 'object') continue;
      var title = a.TITLE || a.title || "";
      var link = a.LINK || a.link || "";
      var published = "";
      var pubTs = a.PUBLISHED || a.PUBLISHED_AT || a.published_at || a.published;
      if (pubTs) {
        try { published = new Date(pubTs * 1000).toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}); } catch(e){}
      }
      var source = a.PROVIDER_NAME || a.SOURCE_NAME || a.source_name || "";
      var imgUrl = "";
      if (a.LINKS && a.LINKS.length) imgUrl = a.LINKS[0].IMAGE_VARIANT_URL || "";
      h += '<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px">';
      if (imgUrl) h += '<img src="' + escH(imgUrl) + '" style="width:60px;height:45px;object-fit:cover;border-radius:4px;flex-shrink:0" loading="lazy">';
      h += '<div style="flex:1;min-width:0">';
      if (link) h += '<a href="' + escH(link) + '" target="_blank" rel="noopener" style="font-size:12px;font-weight:600;color:var(--text);line-height:1.3;text-decoration:none">' + escH(title) + '</a>';
      else h += '<div style="font-size:12px;font-weight:600;color:var(--text);line-height:1.3">' + escH(title) + '</div>';
      h += '<div style="font-size:10px;color:var(--text-muted);margin-top:4px">';
      if (source) h += escH(source);
      if (source && published) h += ' · ';
      if (published) h += escH(published);
      h += '</div></div></div>';
    }
    container.innerHTML = h || '<div class="ed-stats-loading">No news available.</div>';
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load news.</div>';
  }
}

window.switchSBTab = function(btn) {
  var panel = btn.closest(".ed-sb-main") || btn.closest(".ed-stats-panel");
  if (!panel) return;
  var target = btn.getAttribute("data-panel");
  // Toggle tab buttons
  var tabRow = btn.closest(".ed-sb-tabs") || btn.closest(".ed-sb-sub-tabs");
  if (tabRow) {
    var tabs = tabRow.querySelectorAll(".ed-sb-tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle("active", tabs[i].getAttribute("data-panel") === target);
  }
  // Toggle panels — find ALL panels in this container, not just direct children
  var allPanels = panel.querySelectorAll(".ed-sb-panel");
  for (var j = 0; j < allPanels.length; j++) {
    var p = allPanels[j];
    // Only toggle panels at the same level (matching the tab row's sibling panels)
    if (p.getAttribute("data-panel") && p.parentNode === panel) {
      p.classList.toggle("active", p.getAttribute("data-panel") === target);
    }
  }
  var activePanel = panel.querySelector('.ed-sb-panel[data-panel="' + target + '"]');
  if (activePanel) {
    var lazy = activePanel.querySelector(".ed-sb-lazy");
    if (lazy && !lazy.dataset.loaded) {
      lazy.dataset.loaded = "1";
      var ticker = (panel.closest(".ed-stats-panel") || {}).dataset && panel.closest(".ed-stats-panel").dataset.ticker;
      var lazyKey = lazy.getAttribute("data-lazy");
      if (lazyKey === "h2h-home") _loadH2HSubTab(lazy, ticker, 1);
      else if (lazyKey === "h2h-away") _loadH2HSubTab(lazy, ticker, 2);
      else if (lazyKey && lazyKey.indexOf("h2h-tab-") === 0) {
        // Generic handler for the dynamically-rebuilt H2H sub-tabs
        // (cricket: Overall/Test/ODI/T20; soccer: Overall/Home/Away).
        var h2hIdx = parseInt(lazyKey.substring(8), 10);
        if (!isNaN(h2hIdx)) _loadH2HSubTab(lazy, ticker, h2hIdx);
      }
      else if (lazyKey === "topscorers") _loadStandingsType(lazy, ticker, "top_scores");
      else if (lazyKey === "form") _loadStandingsType(lazy, ticker, "form");
      else if (lazyKey === "commentary") _loadCommentary(lazy, ticker);
      else if (lazyKey === "player-stats") _loadPlayerStats(lazy, ticker);
      else if (lazyKey === "predicted-lineups") _loadPredictedLineups(lazy, ticker);
      else if (lazyKey === "highlights") _loadHighlights(lazy, ticker);
      else if (lazyKey === "points-history") _loadPointsHistory(lazy, ticker);
      else if (lazyKey === "darts") _loadDarts(lazy, ticker);
      else if (lazyKey === "golf") _loadGolf(lazy, ticker);
    }
  }
};

window.toggleObSection = function(btn) {
  var body = btn.nextElementSibling;
  if (!body) return;
  var open = body.hidden;
  body.hidden = !open;
  btn.setAttribute("aria-expanded", open ? "true" : "false");
  btn.classList.toggle("open", open);
  if (open && !btn.dataset.hydrated) {
    btn.dataset.hydrated = "1";
    var firstBtn = body.querySelector(".ob-outcome-btn.active");
    if (firstBtn) window.selectObOutcome(firstBtn);
  }
};

var _obWsPrevTicker = null;

window.selectObOutcome = function(btn) {
  var section = btn.closest(".ob-section");
  if (!section) return;
  var btns = section.querySelectorAll(".ob-outcome-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("active", btns[i] === btn);
  }
  var ticker = btn.getAttribute("data-ob-ticker");
  // Unsubscribe from previous ticker's orderbook channel.
  if (_obWsPrevTicker && _obWsPrevTicker !== ticker) {
    // Removed: orderbook_delta subscription was causing price bouncing.
    // The 2s REST poll handles OB updates reliably.
  }
  _obActiveOutcome = ticker;
  _obActiveSide = "yes";
  _obWsPrevTicker = ticker;
  var tabs = section.querySelectorAll(".ob-tab");
  for (var j = 0; j < tabs.length; j++) {
    tabs[j].classList.toggle("active", tabs[j].getAttribute("data-side") === "yes");
  }
  var body = section.querySelector(".ob-body");
  if (body) body.innerHTML = '<div class="ob-loading">Loading order book&hellip;</div>';
  // Initial fetch via REST, then subscribe to WS deltas.
  fetchOrderbook(ticker);
  // Removed: orderbook_delta WS subscription was causing price bouncing.
  // The 2s REST poll in fetchOrderbook handles OB depth updates.
};

// Auto-load first outcome on page render.

window.switchObTab = function(btn) {

var _obRefreshTimer = null;
async function fetchOrderbook(ticker) {
  try {
    var r = await fetch("/api/market/" + encodeURIComponent(ticker) + "/orderbook");
    var d = await r.json();
    if (d.error) {
      document.getElementById("ob-body").innerHTML =
        '<div class="ob-empty">Failed to load order book: ' + escH(d.error) + '</div>';
      return;
    }
    _obData = d;
    _seedObDepth(d);
    renderOrderbook();
  } catch (ex) {
    document.getElementById("ob-body").innerHTML =
      '<div class="ob-empty">Failed to load order book.</div>';
    console.error("fetchOrderbook error", ex);
  }
  // Auto-refresh every 3s while live + section visible + same outcome.
  if (_obRefreshTimer) clearTimeout(_obRefreshTimer);
  _obRefreshTimer = setTimeout(function() {
    if (window._obPaused) { _obRefreshTimer = null; return; }
    if (_obActiveOutcome !== ticker) { _obRefreshTimer = null; return; }
    if (!document.getElementById("ob-body")) { _obRefreshTimer = null; return; }
    fetchOrderbook(ticker);
  }, 1000);
}

function renderOrderbook() {
  if (!_obData) return;
  var body = document.getElementById("ob-body");
  var side = _obActiveSide || "yes";
  var data = _obData[side] || {};
  var asks = data.asks || [];
  var bids = data.bids || [];
  // Show the top N levels closest to the spread.
  var asksShown = asks.slice().reverse();  // bottom = best ask
  var bidsShown = bids.slice();             // top = best bid
  // Max quantity across both sides for depth-bar normalization.
  var maxQty = 0;
  for (var i = 0; i < asksShown.length; i++) maxQty = Math.max(maxQty, asksShown[i].qty);
  for (var j = 0; j < bidsShown.length; j++) maxQty = Math.max(maxQty, bidsShown[j].qty);
  if (maxQty <= 0) maxQty = 1;
  var priceCls = side === "yes" ? "ob-price-bid" : "ob-price-ask";
  var priceClsAsk = side === "yes" ? "ob-price-ask" : "ob-price-bid";
  var depthAsk = side === "yes" ? "ob-depth-ask" : "ob-depth-bid";
  var depthBid = side === "yes" ? "ob-depth-bid" : "ob-depth-ask";
  var askLabel = side === "yes" ? "ob-ask-label" : "ob-bid-label";
  var bidLabel = side === "yes" ? "ob-bid-label" : "ob-ask-label";
  // Last-traded price (from either side's best — Kalshi's last
  // price isn't in orderbook, so use mid of top levels as hint).
  var topAsk = asks.length ? asks[0].price : null;
  var topBid = bids.length ? bids[0].price : null;
  var h = '';
  // Column header row.
  h += '<div class="ob-col-headers">'
     + '<div></div><div>Price</div><div>Contracts</div><div>Total</div>'
     + '</div>';
  // Asks section (above the spread line).
  h += '<div class="ob-rows">';
  if (asksShown.length === 0) {
    h += '<div class="ob-empty">No asks.</div>';
  } else {
    for (var a = 0; a < asksShown.length; a++) {
      var ask = asksShown[a];
      var width = (ask.qty / maxQty * 100).toFixed(1);
      var labelCell = (a === asksShown.length - 1)
        ? '<div class="ob-side-label ' + askLabel + '">Asks</div>'
        : '<div></div>';
      h += '<div class="ob-row">';
      h += '<div class="ob-depth ' + depthAsk + '" style="width:' + width + '%"></div>';
      h += labelCell;
      h += '<div class="' + priceClsAsk + '">' + ask.price + '&cent;</div>';
      h += '<div class="ob-qty">' + Math.round(ask.qty).toLocaleString() + '</div>';
      h += '<div class="ob-total">$' + (ask.total != null ? ask.total.toLocaleString() : '0') + '</div>';
      h += '</div>';
    }
  }
  h += '</div>';
  // Spread divider with "Last" price.
  var lastPriceHint = "";
  if (topAsk != null && topBid != null) {
    lastPriceHint = '<span class="ob-last-price">Spread ' + topBid + '&cent; &ndash; ' + topAsk + '&cent;</span>';
  }
  var lastCls = side === "yes" ? "yes-color" : "no-color";
  h += '<div class="ob-last ' + lastCls + '">Trade ' + (side === "yes" ? "Yes" : "No") + ' ' + lastPriceHint + '</div>';
  // Bids section (below the spread line).
  h += '<div class="ob-rows">';
  if (bidsShown.length === 0) {
    h += '<div class="ob-empty">No bids.</div>';
  } else {
    for (var b = 0; b < bidsShown.length; b++) {
      var bid = bidsShown[b];
      var widthB = (bid.qty / maxQty * 100).toFixed(1);
      var labelCell2 = (b === 0)
        ? '<div class="ob-side-label ' + bidLabel + '">Bids</div>'
        : '<div></div>';
      h += '<div class="ob-row">';
      h += '<div class="ob-depth ' + depthBid + '" style="width:' + widthB + '%"></div>';
      h += labelCell2;
      h += '<div class="' + priceCls + '">' + bid.price + '&cent;</div>';
      h += '<div class="ob-qty">' + Math.round(bid.qty).toLocaleString() + '</div>';
      h += '<div class="ob-total">$' + (bid.total != null ? bid.total.toLocaleString() : '0') + '</div>';
      h += '</div>';
    }
  }
  h += '</div>';
  body.innerHTML = h;
}

function renderWhaleSentimentSection(outcomes) {
  if (!outcomes || !outcomes.length) return "";
  var h = '<div class="ws-section">';
  h += '<button class="ws-toggle" aria-expanded="false" onclick="window.toggleWsSection(this)">';
  h += '<span>Large Capital Flow</span>';
  h += '<span class="ws-chevron">\u25BE</span>';
  h += '</button>';
  h += '<div class="ws-inner" hidden>';
  h += '<div class="snap-controls" data-snap-section="capflow" style="margin-bottom:10px">'
     + '<button class="snap-btn" onclick="window.toggleSnap(this)">'
     + '<span class="snap-dot"></span><span class="snap-label">Live</span></button>'
     + '<span class="snap-hint">Click Live to freeze</span>'
     + '<span class="snap-ts" hidden></span>'
     + '<button class="snap-export" onclick="window.exportSnap(this,\'csv\')" hidden>CSV</button>'
     + '<button class="snap-export" onclick="window.exportSnap(this,\'json\')" hidden>JSON</button>'
     + '<button class="snap-export" onclick="window.copySnap(this)" hidden>Copy</button>'
     + '<button class="snap-export snap-share" onclick="window.shareSnap(this)" hidden>Share</button>'
     + '</div>';
  h += '<div class="ws-outcomes">';
  for (var i = 0; i < outcomes.length; i++) {
    var o = outcomes[i];
    if (!o.ticker) continue;
    h += '<button class="ob-outcome-btn' + (i === 0 ? ' active' : '') + '"'
       + ' data-ws-ticker="' + escH(o.ticker) + '"'
       + ' data-ws-label="' + escH(o.label) + '"'
       + ' onclick="window.selectWsOutcome(this)">'
       + escH(o.label) + '</button>';
  }
  h += '</div>';
  h += '<div class="ws-window-row">';
  h += '<label>Window:</label>';
  var windows = [{h:1,l:"1H"},{h:6,l:"6H"},{h:24,l:"24H"},{h:0,l:"All"}];
  for (var w = 0; w < windows.length; w++) {
    var wh = windows[w];
    h += '<button class="ws-window-btn' + (wh.h === 24 ? ' active' : '') + '"'
       + ' data-hours="' + wh.h + '"'
       + ' onclick="window.selectWsWindow(this)">' + wh.l + '</button>';
  }
  h += '</div>';
  h += '<div class="ws-filter-row">';
  h += '<label>Min trade size: $</label>';
  h += '<input class="ws-filter-input" id="ws-filter-val" type="number" value="1000" min="0" step="100">';
  h += '<button class="ws-filter-btn apply" onclick="window.applyWsFilter()">Apply</button>';
  h += '<button class="ws-filter-btn reset" onclick="window.resetWsFilter()">Reset</button>';
  h += '</div>';
  h += '<div class="ws-body" id="ws-body">';
  h += '<div class="ws-empty">Click an outcome to view whale trades.</div>';
  h += '</div>';
  h += '</div>';
  h += '</div>';
  return h;
}

var _wsData = null;
var _wsActiveOutcome = null;
var _wsMinAmount = 1000;
var _wsHours = 24;
var _wsWsPrevTicker = null;

window.toggleWsSection = function(btn) {
  var body = btn.nextElementSibling;
  if (!body) return;
  var open = body.hidden;
  body.hidden = !open;
  btn.setAttribute("aria-expanded", open ? "true" : "false");
  btn.classList.toggle("open", open);
  if (open && !btn.dataset.hydrated) {
    btn.dataset.hydrated = "1";
    var firstBtn = body.querySelector(".ob-outcome-btn.active");
    if (firstBtn) window.selectWsOutcome(firstBtn);
  }
};

window.selectWsOutcome = function(btn) {
  var section = btn.closest(".ws-section");
  if (!section) return;
  var btns = section.querySelectorAll(".ob-outcome-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("active", btns[i] === btn);
  }
  var ticker = btn.getAttribute("data-ws-ticker");
  if (_wsWsPrevTicker && _wsWsPrevTicker !== ticker) {
    // Removed: trade WS subscription could interfere with price data.
  }
  _wsActiveOutcome = ticker;
  _wsWsPrevTicker = ticker;
  var body = section.querySelector(".ws-body");
  if (body) body.innerHTML = '<div class="ws-empty">Loading whale trades\u2026</div>';
  fetchWhaleTrades(ticker);
  // Removed: trade WS subscription could interfere with price data.
  // Large Capital Flow uses REST polling (15s) for trade history.
};

window.applyWsFilter = function() {
  var input = document.getElementById("ws-filter-val");
  if (input) _wsMinAmount = parseFloat(input.value) || 0;
  if (_wsActiveOutcome) fetchWhaleTrades(_wsActiveOutcome);
};

window.resetWsFilter = function() {
  _wsMinAmount = 1000;
  var input = document.getElementById("ws-filter-val");
  if (input) input.value = "1000";
  if (_wsActiveOutcome) fetchWhaleTrades(_wsActiveOutcome);
};

window.selectWsWindow = function(btn) {
  var section = btn.closest(".ws-section");
  if (!section) return;
  var btns = section.querySelectorAll(".ws-window-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("active", btns[i] === btn);
  }
  _wsHours = parseInt(btn.getAttribute("data-hours"), 10) || 0;
  if (_wsActiveOutcome) fetchWhaleTrades(_wsActiveOutcome);
};

var _wsRefreshTimer = null;
async function fetchWhaleTrades(ticker) {
  try {
    var r = await fetch("/api/market/" + encodeURIComponent(ticker) + "/trades?min_amount=" + _wsMinAmount + "&hours=" + _wsHours);
    var d = await r.json();
    if (d.error) {
      document.getElementById("ws-body").innerHTML =
        '<div class="ws-empty">Failed: ' + escH(d.error) + '</div>';
      return;
    }
    _wsData = d;
    renderWhaleSentiment();
  } catch (ex) {
    document.getElementById("ws-body").innerHTML =
      '<div class="ws-empty">Failed to load trades.</div>';
    console.error("fetchWhaleTrades error", ex);
  }
  // Auto-refresh every 15s while live + section visible + same outcome.
  if (_wsRefreshTimer) clearTimeout(_wsRefreshTimer);
  _wsRefreshTimer = setTimeout(function() {
    if (window._wsPaused) { _wsRefreshTimer = null; return; }
    if (_wsActiveOutcome !== ticker) { _wsRefreshTimer = null; return; }
    if (!document.getElementById("ws-body")) { _wsRefreshTimer = null; return; }
    fetchWhaleTrades(ticker);
  }, 15000);
}

function _fmtDollar(n) {
  if (n >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return '$' + Math.round(n).toLocaleString();
}

function _timeAgo(ts) {
  if (!ts) return "";
  var d = new Date(ts);
  var now = Date.now();
  var diffS = Math.floor((now - d.getTime()) / 1000);
  if (diffS < 60) return diffS + "s ago";
  var diffM = Math.floor(diffS / 60);
  if (diffM < 60) return diffM + "m ago";
  var diffH = Math.floor(diffM / 60);
  if (diffH < 24) return diffH + "h ago";
  var diffD = Math.floor(diffH / 24);
  return diffD + "d ago";
}

function renderWhaleSentiment() {
  if (!_wsData) return;
  var body = document.getElementById("ws-body");
  if (!body) return;
  var d = _wsData;
  var total = d.total_volume || 0;
  var yesVol = d.yes_volume || 0;
  var noVol = d.no_volume || 0;
  var yesPct = total > 0 ? Math.round(yesVol / total * 100) : 0;
  var noPct = 100 - yesPct;
  var sentiment = d.sentiment || "Neutral";
  var sentClass = sentiment === "Bullish" ? "bullish" : sentiment === "Bearish" ? "bearish" : "neutral";
  var whaleCount = d.whale_count || 0;
  var trades = d.trades || [];

  var h = '<div class="ws-summary">';
  h += '<div class="ws-sentiment-row">';
  h += '<span class="ws-sentiment-badge ' + sentClass + '">' + sentiment + '</span>';
  h += '<div style="text-align:right">';
  h += '<div class="ws-total">' + _fmtDollar(total) + '</div>';
  h += '<div class="ws-whale-count">' + whaleCount + ' whale trade' + (whaleCount !== 1 ? 's' : '') + '</div>';
  h += '</div></div>';
  h += '<div class="ws-bar-row">';
  h += '<span class="ws-bar-yes">YES ' + _fmtDollar(yesVol) + '</span>';
  h += '<span class="ws-bar-no">NO ' + _fmtDollar(noVol) + '</span>';
  h += '</div>';
  h += '<div class="ws-bar">';
  h += '<div class="ws-bar-fill-yes" style="width:' + yesPct + '%"></div>';
  h += '<div class="ws-bar-fill-no" style="width:' + noPct + '%"></div>';
  h += '</div>';
  h += '<div class="ws-pct-row">';
  h += '<span>' + yesPct + '% (' + (d.yes_count || 0) + ' trades)</span>';
  h += '<span>' + noPct + '% (' + (d.no_count || 0) + ' trades)</span>';
  h += '</div>';
  h += '</div>';

  if (trades.length === 0) {
    h += '<div class="ws-empty">No trades above $' + _wsMinAmount.toLocaleString() + '.</div>';
  } else {
    h += '<div style="font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:8px">Recent Large Trades</div>';
    h += '<div class="ws-trades-list">';
    for (var i = 0; i < trades.length; i++) {
      var t = trades[i];
      var sc = t.side === "YES" ? "yes" : "no";
      h += '<div class="ws-trade">';
      h += '<span class="ws-dot ' + sc + '"></span>';
      h += '<span><span class="ws-cost ' + sc + '">' + _fmtDollar(t.cost) + '</span> ';
      h += '<span class="ws-side-badge ' + sc + '">' + t.side + '</span></span>';
      h += '<span class="ws-trade-price ' + sc + '">' + t.price + '\u00a2</span>';
      h += '<span class="ws-trade-meta">' + _timeAgo(t.time) + '</span>';
      h += '</div>';
    }
    h += '</div>';
  }

  body.innerHTML = h;
}

function renderEventDetail(ev) {
  var sport = ev._sport || "";
  var cat = ev.category || "Other";
  var icon = sport ? (SPORT_EMOJI[sport] || CAT_EMOJI[cat] || "") : (CAT_EMOJI[cat] || "");
  var label = sport || cat;
  var subcat = ev._subcat || "";
  var ticker = ev.event_ticker || "";
  var kalshiUrl = ev.url || "";
  var kickoff = ev._kickoff_dt || "";
  var expires = ev._exp_dt || ev._close_dt || "";
  var live = ev._live_state || null;
  var groups = ev.market_groups || null;
  var hasGroups = Array.isArray(groups) && groups.length > 1;

  // Header card: pills, title, meta, scoreboard.
  var h = '<div class="ed-header">';
  h += '<div class="ed-pills">';
  if (icon) h += '<span class="cat-icon">' + icon + '</span>';
  h += '<span class="cat-pill">' + escH(label) + '</span>';
  if (subcat) h += '<span class="sub-pill">' + escH(subcat) + '</span>';
  if (live && live.state === "in") {
    // Mirror the card badge's tick attrs so the detail header pill
    // updates every 500 ms via tickLiveClocks. data-live-noscore=1
    // tells the tick handler to skip prepending the score (the
    // scoreboard below the pills already shows it; we don't want to
    // duplicate it inside the pill).
    var detailClock;
    var detailAddedFor = (live.period === 1) ? live.added_time_1h
                       : (live.period === 2) ? live.added_time_2h : null;
    if (ev._sport === 'Soccer' && live.stage_start_ms) {
      detailClock = computeSoccerMinute(live.stage_start_ms, live.period, detailAddedFor) || live.short_detail || "";
    } else if (live.display_clock && live.period) {
      // Mirror the tick's buildLiveLabel format on initial render so
      // the detail page badge doesn't flash a different value before
      // the tick takes over. Same logic as the card path.
      var _detBase = parseClockSecs(live.display_clock);
      if (_detBase !== null) {
        var _detElapsed = live.captured_at_ms
          ? Math.min(15, Math.max(0, Math.floor((Date.now() - live.captured_at_ms) / 1000)))
          : 0;
        var _detSecs = (live.clock_running === false) ? _detBase
          : Math.max(0, _detBase - _detElapsed);
        detailClock = buildLiveLabel(ev._sport || '', live.period, _detSecs, live.stage_start_ms, null);
      } else {
        detailClock = live.short_detail || live.display_clock || "";
      }
    } else {
      detailClock = live.short_detail || live.display_clock || "";
    }
    // Same period-preservation pattern as the card path. ESPN-sourced
    // periods bypass the frontend cache fallback — when backend says
    // 0, ESPN is telling us no period info and the cache shouldn't
    // override that authoritative answer.
    var _det_ts_key = ev.event_ticker || "";
    if (!window._lastLivePeriod) window._lastLivePeriod = {};
    var detailEffectivePeriod = live.period || 0;
    var detClockSrc = live.clock_source || '';
    if (detailEffectivePeriod && _det_ts_key) {
      window._lastLivePeriod[_det_ts_key] = detailEffectivePeriod;
    } else if (!detailEffectivePeriod && _det_ts_key && window._lastLivePeriod[_det_ts_key]
               && detClockSrc !== 'espn-missing' && detClockSrc !== 'espn') {
      detailEffectivePeriod = window._lastLivePeriod[_det_ts_key];
    }
    var detailAttrs = '';
    if (live.display_clock && detailEffectivePeriod && live.captured_at_ms) {
      detailAttrs += ' data-live-sport="' + (ev._sport || '') + '"';
      detailAttrs += ' data-live-period="' + detailEffectivePeriod + '"';
      detailAttrs += ' data-live-clock-initial="' + String(live.display_clock).replace(/"/g, '') + '"';
      detailAttrs += ' data-live-captured="' + live.captured_at_ms + '"';
      detailAttrs += ' data-live-running="' + (live.clock_running ? '1' : '0') + '"';
      detailAttrs += ' data-live-noscore="1"';
      if (live.clock_source) {
        detailAttrs += ' data-live-clock-source="' + String(live.clock_source).replace(/"/g, '') + '"';
      }
    }
    if (live.stage_start_ms) {
      detailAttrs += ' data-live-stage-start="' + live.stage_start_ms + '"';
    }
    if (live.added_time_1h != null) {
      detailAttrs += ' data-live-added-1h="' + live.added_time_1h + '"';
    }
    if (live.added_time_2h != null) {
      detailAttrs += ' data-live-added-2h="' + live.added_time_2h + '"';
    }
    h += '<span class="live-badge"' + detailAttrs + '><span class="live-dot"></span>'
      + '<span class="live-text">LIVE' + (detailClock ? " · " + escH(detailClock) : "") + '</span></span>';
  } else if (live && live.state === "post") {
    h += '<span class="final-badge">Final</span>';
  }
  h += '</div>';
  h += '<h1 class="ed-title">' + escH(ev.title || "") + '</h1>';
  h += '<div class="ed-meta">';
  if (kickoff) h += '<span class="ed-meta-item"><span class="ed-meta-label">Starts</span><span class="ed-meta-val">' + escH(formatEDDate(kickoff)) + '</span></span>';
  if (expires) h += '<span class="ed-meta-item"><span class="ed-meta-label">Expires</span><span class="ed-meta-val">' + escH(formatEDDate(expires)) + '</span></span>';
  h += '<span class="ed-meta-item"><span class="ed-meta-label">Ticker</span><span class="ed-meta-val" style="font-family:monospace">' + escH(ticker) + '</span></span>';
  if (kalshiUrl) h += '<span class="ed-meta-item"><a href="' + escH(kalshiUrl) + '" target="_blank">View on Kalshi ↗</a></span>';
  h += '</div>';

  // Scoreboard row when a live game is matched. Gated on state so a
  // pre-game fixture (which may still carry abbrs/0-0 from the feed)
  // does not render a phantom 0-0 scoreboard.
  if (live && (live.state === "in" || live.state === "post")
      && (live.home_abbr || live.away_abbr || live.home_score !== "" || live.away_score !== "")) {
    // Tennis: use the card-style row layout (sets, games, points)
    if (live.tennis && live.tennis.row1_name && live.tennis.row2_name) {
      var tennisHtml = buildTennisScore(ev);
      if (tennisHtml) {
        h += '<div class="ed-scoreboard" style="display:block;padding:10px 20px">' + tennisHtml + '</div>';
      }
    } else {
      // Cricket: append "/wickets (overs)" to the runs the same way
      // outcome rows do. Without this the detail-page scoreboard
      // shows just "225 vs 212" while cards show "225/6 (20)" —
      // inconsistent and dropping the wickets/overs context users
      // need to read the match state.
      var _hScore = String(live.home_score || "0");
      var _aScore = String(live.away_score || "0");
      if (ev._sport === "Cricket") {
        if (live.cricket_home_wickets) _hScore += "/" + live.cricket_home_wickets;
        if (live.cricket_home_overs) _hScore += " (" + live.cricket_home_overs + ")";
        if (live.cricket_away_wickets) _aScore += "/" + live.cricket_away_wickets;
        if (live.cricket_away_overs) _aScore += " (" + live.cricket_away_overs + ")";
      }
      h += '<div class="ed-scoreboard">';
      h += '<div class="ed-sb-team"><div class="ed-sb-name">' + escH(live.home_display || live.home_abbr || "Home") + '</div>'
         + '<div class="ed-sb-score">' + escH(_hScore) + '</div></div>';
      // Just "vs" between team scores — the clock used to live
      // here too but the LIVE pill at the top of the page already
      // shows the synchronized minute. A second redundant copy was
      // confusing and worse, drifted from the pill when the user's
      // browser clock was offset from the server.
      h += '<div class="ed-sb-team"><div class="ed-sb-sep">vs</div></div>';
      h += '<div class="ed-sb-team"><div class="ed-sb-name">' + escH(live.away_display || live.away_abbr || "Away") + '</div>'
         + '<div class="ed-sb-score">' + escH(_aScore) + '</div></div>';
      h += '</div>';
    }
  }

  // Two-leg knockout tie panel (soccer: Champions League, Copa
  // Libertadores, domestic cup ties). Shown when SofaScore or
  // ESPN reported aggregate scores or an explicit leg number.
  if (live && live.is_two_leg) {
    var aggH = (typeof live.aggregate_home === "number") ? live.aggregate_home : null;
    var aggA = (typeof live.aggregate_away === "number") ? live.aggregate_away : null;
    var hasAgg = aggH !== null && aggA !== null;
    var legN = live.leg_number;
    var tiebits = [];
    if (legN) tiebits.push("Leg " + legN + " of 2");
    if (live.round_name) tiebits.push(live.round_name);
    else if (live.tournament_name) tiebits.push(live.tournament_name);
    var tieHeader = tiebits.join(" · ");
    var winCode = live.aggregate_winner || "";
    h += '<div class="ed-series">';
    if (tieHeader) h += '<div class="ed-series-title">' + escH(tieHeader) + '</div>';
    if (hasAgg) {
      // "Aggregate" row: home side | center label | away side.
      // Uses the same .ed-series-row layout as the NBA panel but
      // shows aggregate goals instead of series wins (no dots,
      // since the number of legs is always exactly 2).
      var leadLabel = "Aggregate tied";
      if (winCode === "home") leadLabel = (live.home_abbr || "Home") + " leads aggregate";
      else if (winCode === "away") leadLabel = (live.away_abbr || "Away") + " leads aggregate";
      else if (aggH > aggA) leadLabel = (live.home_abbr || "Home") + " leads aggregate";
      else if (aggA > aggH) leadLabel = (live.away_abbr || "Away") + " leads aggregate";
      h += '<div class="ed-series-row">';
      h += '<div class="ed-series-team">';
      h += '<div class="ed-series-name">' + escH(live.home_display || live.home_abbr || "Home") + '</div>';
      h += '<div class="ed-series-wins">' + aggH + '</div>';
      h += '</div>';
      h += '<div class="ed-series-summary">' + escH(leadLabel) + '</div>';
      h += '<div class="ed-series-team ed-series-team-r">';
      h += '<div class="ed-series-wins">' + aggA + '</div>';
      h += '<div class="ed-series-name">' + escH(live.away_display || live.away_abbr || "Away") + '</div>';
      h += '</div>';
      h += '</div>';
      // Secondary hint line — emphasizes that this is the
      // cumulative score across both legs, not the current match.
      h += '<div class="ed-series-hint">Aggregate score across both legs</div>';
    } else if (legN === 1) {
      // We're on Leg 1 — no aggregate to show yet. Set expectations.
      h += '<div class="ed-series-summary-solo">Aggregate score will show after this leg ends.</div>';
    } else if (legN) {
      // 2nd leg (or later) but our data source hasn't returned the
      // aggregate yet. Don't make a definitive "will show later"
      // claim — the 1st leg has clearly already happened.
      h += '<div class="ed-series-summary-solo">Aggregate score from the 1st leg isn\u2019t available yet — check back shortly.</div>';
    }
    h += '</div>';
  }

  // Playoff-series panel. Only renders when ESPN tagged this game
  // as a playoff fixture — regular-season games have is_playoff=false.
  if (live && live.is_playoff) {
    var hWins = (typeof live.series_home_wins === "number") ? live.series_home_wins : null;
    var aWins = (typeof live.series_away_wins === "number") ? live.series_away_wins : null;
    var hasWins = hWins !== null && aWins !== null;
    var gameN = live.series_game_number;
    // Header line: either "Game 5 · Western Conference Finals" or
    // just the series title when game number is unknown.
    var headerBits = [];
    if (gameN) headerBits.push("Game " + gameN);
    if (live.series_title) headerBits.push(live.series_title);
    var headerLine = headerBits.join(" · ");
    h += '<div class="ed-series">';
    if (headerLine) h += '<div class="ed-series-title">' + escH(headerLine) + '</div>';
    if (hasWins) {
      // Two-team wins bar: home | total-games bubbles | away.
      // Each team shows its wins count and a row of circles (filled
      // for wins, outlined for remaining "possible" games up to 4
      // since NBA/NHL/MLB LCS/WS are best-of-7 → first to 4 wins).
      var bestOf = 7;  // safe default for NBA/NHL/MLB LCS; best-of-5
                       // series (MLB Div, NBA play-in) still render
                       // correctly — the extra outlined dots just
                       // represent unreachable games.
      var target = Math.ceil(bestOf / 2);  // 4 for best-of-7
      h += '<div class="ed-series-row">';
      h += '<div class="ed-series-team">';
      h += '<div class="ed-series-name">' + escH(live.home_display || live.home_abbr || "Home") + '</div>';
      h += '<div class="ed-series-dots">';
      for (var di = 0; di < target; di++) {
        h += '<span class="ed-sdot' + (di < hWins ? ' ed-sdot-filled' : '') + '"></span>';
      }
      h += '</div>';
      h += '<div class="ed-series-wins">' + hWins + '</div>';
      h += '</div>';
      h += '<div class="ed-series-summary">' + escH(live.series_summary || (hWins + "-" + aWins)) + '</div>';
      h += '<div class="ed-series-team ed-series-team-r">';
      h += '<div class="ed-series-wins">' + aWins + '</div>';
      h += '<div class="ed-series-dots">';
      for (var dj = 0; dj < target; dj++) {
        h += '<span class="ed-sdot' + (dj < aWins ? ' ed-sdot-filled' : '') + '"></span>';
      }
      h += '</div>';
      h += '<div class="ed-series-name">' + escH(live.away_display || live.away_abbr || "Away") + '</div>';
      h += '</div>';
      h += '</div>';
    } else if (live.series_summary) {
      h += '<div class="ed-series-summary-solo">' + escH(live.series_summary) + '</div>';
    }
    h += '</div>';
  }

  h += '</div>'; // /ed-header

  // ── Detailed Event Stats panel ──────────────────────────────
  // Single home for every per-event stats surface — Match, H2H,
  // Standings, News — collapsed under one toggle so the layout
  // doesn't fragment between sidebar + below-header sections.
  // hydrateGameStats() fills the inner ed-stats-panel with the
  // top-tab strip and lazy-loads each tab on first click.
  var isSport = !!sport;
  if (isSport) {
    h += '<div class="ed-detailed-stats ob-section">';
    h += '<button class="ob-toggle" aria-expanded="false" onclick="window._toggleStandingsSection(this)">';
    h += '<span>Detailed Event Stats</span><span class="ob-chevron">▾</span>';
    h += '</button>';
    h += '<div class="ob-inner ed-detailed-stats-inner" hidden>';
    h += '<div class="ed-stats-panel" data-stats-ticker="' + escH(ticker) + '">';
    h += '<div class="ed-stats-loading">Loading detailed event stats…</div>';
    h += '</div>';
    h += '</div>';
    h += '</div>';
  }

  // Two-column layout: main content left, stats sidebar right.
  // The sidebar only renders for sport events.
  h += '<div class="ed-layout">';
  h += '<div class="ed-main">';

  // Markets tabs (when the event has sibling market groups) or a
  // single flat table.
  if (hasGroups) {
    h += '<div class="ed-tabs">';
    for (var t = 0; t < groups.length; t++) {
      var g = groups[t];
      h += '<button class="ed-tab' + (t === 0 ? ' active' : '') + '"'
         + ' data-group="' + escH(g.type_code) + '"'
         + ' onclick="window.switchEDTab(this)">'
         + escH(g.label) + '</button>';
    }
    h += '</div>';
    for (var t2 = 0; t2 < groups.length; t2++) {
      var g2 = groups[t2];
      h += '<div class="ed-group' + (t2 === 0 ? ' active' : '') + '" data-group="' + escH(g2.type_code) + '">';
      h += '<div class="ed-section-title">Overview</div>';
      h += summaryStats(g2.outcomes || []);
      h += renderPriceHistoryPanel(g2.event_ticker || ticker, _outcomeLabels(g2.outcomes || []));
      h += marketsSectionTitle(live, ev);
      h += renderMarketsTable(g2.outcomes || [], live);
      h += renderOrderbookSection(g2.outcomes || []);
      h += renderWhaleSentimentSection(g2.outcomes || []);
      h += renderMarketDataGrid(g2.event_ticker || ticker);
      h += renderSettlementRules(g2.outcomes || []);
      h += '</div>';
    }
  } else {
    h += '<div class="ed-section-title">Overview</div>';
    h += summaryStats(ev.outcomes || []);
    h += renderPriceHistoryPanel(ticker, _outcomeLabels(ev.outcomes || []));
    h += marketsSectionTitle(live);
    h += renderMarketsTable(ev.outcomes || [], live);
    h += renderOrderbookSection(ev.outcomes || []);
    h += renderWhaleSentimentSection(ev.outcomes || []);
    h += renderMarketDataGrid(ticker);
    h += renderSettlementRules(ev.outcomes || []);
  }

  h += '</div>'; // /ed-main
  // Stats sidebar removed — its content moved into the Event Scope
  // collapsible panel above (renders inside ed-event-scope-inner so
  // the user has a single place to look for per-event stats).
  h += '</div>'; // /ed-layout

  return h;
}

// ── Fresh price fetch on event load ─────────────────────────────────
// The REST cache can be up to 30 min stale. When the user opens an
// event, fetch guaranteed-fresh prices from /api/event/{ticker}/live_prices
// (which calls Kalshi's REST API directly) and update the Markets table.
async function _fetchLivePrices(eventTicker) {
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(eventTicker) + "/live_prices");
    var d = await r.json();
    if (!d.markets) return;
    for (var tk in d.markets) {
      var m = d.markets[tk];
      var row = document.querySelector('tr[data-mk-row="' + tk + '"]');
      if (!row) continue;
      if (m.yes_bid != null && m.yes_ask != null) {
        var yesCell = row.querySelector('[data-mk-field="yes"]');
        if (yesCell) {
          _flash(yesCell, yesCell.textContent, String(m.yes_bid));
          yesCell.textContent = m.yes_ask + '¢ / ' + m.yes_bid + '¢';
        }
      }
      if (m.no_bid != null && m.no_ask != null) {
        var noCell = row.querySelector('[data-mk-field="no"]');
        if (noCell) {
          _flash(noCell, noCell.textContent, String(m.no_bid));
          noCell.textContent = m.no_ask + '¢ / ' + m.no_bid + '¢';
        }
      }
      if (m.last_price != null) {
        // Normalize to YES perspective: pick whichever of
        // (last_price, 100-last_price) is closest to yes_bid.
        var lp = m.last_price;
        if (m.yes_bid != null) {
          var flipped = 100 - lp;
          if (Math.abs(flipped - m.yes_bid) < Math.abs(lp - m.yes_bid)) {
            lp = flipped;
          }
        }
        if (lp != null) {
          var lastCell = row.querySelector('[data-mk-field="last"]');
          if (lastCell) {
            _flash(lastCell, lastCell.textContent, String(lp));
            lastCell.textContent = lp + '¢';
          }
          var probCell = row.querySelector('[data-mk-field="chance"]');
          if (probCell) {
            var newProb = Math.round(lp) + '%';
            _flash(probCell, probCell.textContent, newProb);
            probCell.textContent = newProb;
          }
        }
      }
      if (m.volume != null) {
        var volCell = row.querySelector('[data-mk-field="vol"]');
        if (volCell) { volCell.dataset.raw = m.volume; volCell.textContent = fmtNum(m.volume); }
      }
      if (m.volume_24h != null) {
        var vol24Cell = row.querySelector('[data-mk-field="vol24"]');
        if (vol24Cell) { vol24Cell.dataset.raw = m.volume_24h; vol24Cell.textContent = fmtNum(m.volume_24h); }
      }
      if (m.open_interest != null) {
        var oiCell = row.querySelector('[data-mk-field="oi"]');
        if (oiCell) { oiCell.dataset.raw = m.open_interest; oiCell.textContent = fmtNum(m.open_interest); }
      }
    }
    _recomputeSummaryStats();
  } catch (ex) {
    console.warn("live price fetch failed", ex);
  }
}

// ── Browser ↔ server price WebSocket ───────────────────────────────
// A single persistent connection replaces the 5s polling loop. The
// server pushes every Kalshi price delta to the tickers we subscribe
// to, so prices, probabilities, and volumes update in <200ms.
var PriceStream = (function() {
  var ws = null;
  var subscribed = new Set();   // tickers we've asked for
  var handlers = [];            // onUpdate callbacks
  var paused = false;           // global pause; per-section is finer
  var retry = 0;
  var heartbeat = null;

  function connect() {
    try {
      var proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(proto + "//" + location.host + "/ws/prices");
    } catch (ex) {
      scheduleReconnect();
      return;
    }
    ws.onopen = function() {
      retry = 0;
      // Re-subscribe on reconnect.
      if (subscribed.size > 0) {
        ws.send(JSON.stringify({
          action: "subscribe",
          tickers: Array.from(subscribed),
        }));
      }
      heartbeat = setInterval(function() {
        try { ws.send(JSON.stringify({action: "ping"})); } catch(e) {}
      }, 25000);
    };
    ws.onmessage = function(ev) {
      if (paused) return;
      var msg;
      try { msg = JSON.parse(ev.data); } catch(e) { return; }
      if (msg.type === "price") {
        dispatch(msg.ticker, msg.data);
      } else if (msg.type === "snapshot") {
        var u = msg.updates || [];
        for (var i = 0; i < u.length; i++) dispatch(u[i].ticker, u[i].data);
      } else if (msg.type === "orderbook_delta") {
        _handleObDelta(msg.ticker, msg.data);
      } else if (msg.type === "trade") {
        _handleLiveTrade(msg.ticker, msg.data);
      }
    };
    ws.onerror = function() { /* onclose will fire next */ };
    ws.onclose = function() {
      if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
      scheduleReconnect();
    };
  }

  function scheduleReconnect() {
    retry = Math.min(retry + 1, 6);
    var delay = Math.min(1000 * Math.pow(2, retry), 30000);
    setTimeout(connect, delay);
  }

  function dispatch(ticker, data) {
    for (var i = 0; i < handlers.length; i++) {
      try { handlers[i](ticker, data); } catch(e) { console.warn(e); }
    }
  }

  return {
    connect: connect,
    subscribe: function(tickers) {
      var added = [];
      for (var i = 0; i < tickers.length; i++) {
        var t = String(tickers[i] || "").toUpperCase();
        if (!t || subscribed.has(t)) continue;
        subscribed.add(t);
        added.push(t);
      }
      if (added.length && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({action: "subscribe", tickers: added}));
      }
    },
    unsubscribe: function(tickers) {
      var removed = [];
      for (var i = 0; i < tickers.length; i++) {
        var t = String(tickers[i] || "").toUpperCase();
        if (subscribed.has(t)) { subscribed.delete(t); removed.push(t); }
      }
      if (removed.length && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({action: "unsubscribe", tickers: removed}));
      }
    },
    onUpdate: function(cb) { handlers.push(cb); },
    subscribeChannel: function(channel, tickers) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({
          action: "subscribe_channel",
          channel: channel,
          tickers: tickers,
        }));
      }
    },
    unsubscribeChannel: function(channel, tickers) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({
          action: "unsubscribe_channel",
          channel: channel,
          tickers: tickers,
        }));
      }
    },
    setPaused: function(p) { paused = !!p; },
    isPaused: function() { return paused; },
  };
})();
window.PriceStream = PriceStream;

// Apply a price delta to any visible markets-table row for this
// ticker. Gated by the markets-table-specific snap flag. Individual
// cells flash green (up) / red (down) just like the card grid.
PriceStream.onUpdate(function(ticker, data) {
  if (window._mkPaused) return;
  var row = document.querySelector('tr[data-mk-row="' + ticker + '"]');
  if (!row) return;
  if (data.yes_bid != null && data.yes_ask != null) {
    var yesCell = row.querySelector('[data-mk-field="yes"]');
    if (yesCell) {
      var newYes = data.yes_ask + '¢ / ' + data.yes_bid + '¢';
      if (yesCell.textContent !== newYes) {
        _flash(yesCell, yesCell.textContent, newYes);
        yesCell.textContent = newYes;
      }
    }
  }
  if (data.no_bid != null && data.no_ask != null) {
    var noCell = row.querySelector('[data-mk-field="no"]');
    if (noCell) {
      var newNo = data.no_ask + '¢ / ' + data.no_bid + '¢';
      if (noCell.textContent !== newNo) {
        _flash(noCell, noCell.textContent, newNo);
        noCell.textContent = newNo;
      }
    }
  }
  // Probability uses last_price (matching Kalshi's display).
  // Bid/ask midpoint is used only as fallback when no last_price.
  if (data.last_price != null || (data.yes_bid != null && data.yes_ask != null)) {
    var wsProb;
    if (data.last_price != null) {
      // Normalize last_price to YES perspective
      var lp = data.last_price;
      var refBid = data.yes_bid;
      if (refBid == null) {
        var yc = row.querySelector('[data-mk-field="yes"]');
        if (yc) { var p = parseInt(yc.textContent.split('/').pop()); if (!isNaN(p)) refBid = p; }
      }
      if (refBid != null) {
        var fl = 100 - lp;
        if (Math.abs(fl - refBid) < Math.abs(lp - refBid)) lp = fl;
      }
      wsProb = Math.round(lp);
    } else {
      wsProb = Math.round((data.yes_bid + data.yes_ask) / 2);
    }
    var probCell = row.querySelector('[data-mk-field="chance"]');
    if (probCell) {
      var newProb = wsProb + '%';
      _flash(probCell, probCell.textContent, newProb);
      probCell.textContent = newProb;
    }
  }
  if (data.last_price != null) {
    // Last column still shows last_price (normalized client-side).
    var lp = data.last_price;
    var refBid = data.yes_bid;
    if (refBid == null) {
      var yesCell2 = row.querySelector('[data-mk-field="yes"]');
      if (yesCell2) {
        var txt = yesCell2.textContent;
        var parts = txt.split('/');
        var parsed = parseInt(parts.length >= 2 ? parts[1] : txt);
        if (!isNaN(parsed)) refBid = parsed;
      }
    }
    if (refBid != null) {
      var flipped = 100 - lp;
      if (Math.abs(flipped - refBid) < Math.abs(lp - refBid)) lp = flipped;
    }
    var lastCell = row.querySelector('[data-mk-field="last"]');
    if (lastCell) {
      _flash(lastCell, lastCell.textContent, String(lp));
      lastCell.textContent = lp + '¢';
    }
  }
  if (data.volume != null) {
    var volCell = row.querySelector('[data-mk-field="vol"]');
    if (volCell) {
      volCell.dataset.raw = data.volume;
      volCell.textContent = fmtNum(data.volume);
    }
  }
  if (data.volume_24h != null) {
    var vol24Cell = row.querySelector('[data-mk-field="vol24"]');
    if (vol24Cell) {
      vol24Cell.dataset.raw = data.volume_24h;
      vol24Cell.textContent = fmtNum(data.volume_24h);
    }
  }
  if (data.open_interest != null) {
    var oiCell = row.querySelector('[data-mk-field="oi"]');
    if (oiCell) {
      oiCell.dataset.raw = data.open_interest;
      oiCell.textContent = fmtNum(data.open_interest);
    }
  }
  // Recompute the top-of-page summary (24h Volume, Total Volume, OI)
  // so the aggregate stats stay in sync with per-row WS updates.
  _recomputeSummaryStats();
});

// ── Orderbook delta handler ──────────────────────────────────────
// When the server sends an orderbook_delta for the ticker the user
// is viewing, apply it to the local _obData and re-render. This
// replaces the 3s REST polling with instant WS updates.
function _handleObDelta(ticker, delta) {
  if (window._obPaused) return;
  if (ticker !== _obActiveOutcome) return;
  if (!_obData) return;
  // delta = { yes: [[price, qty], ...], no: [[price, qty], ...] }
  // qty=0 means remove that price level; qty>0 means set/update.
  // We need to rebuild the parsed orderbook from deltas. For now,
  // apply deltas to a local depth map and re-derive asks/bids.
  if (!window._obDepth) window._obDepth = { yes: {}, no: {} };
  for (var side in delta) {
    if (side !== "yes" && side !== "no") continue;
    var levels = delta[side];
    for (var i = 0; i < levels.length; i++) {
      var p = levels[i][0], q = levels[i][1];
      if (q <= 0) {
        delete window._obDepth[side][p];
      } else {
        window._obDepth[side][p] = q;
      }
    }
  }
  // Rebuild _obData from depth map.
  function _toLevels(map) {
    var out = [];
    for (var p in map) { out.push({price: parseInt(p), qty: map[p]}); }
    return out;
  }
  var yesLevels = _toLevels(window._obDepth.yes);
  var noLevels = _toLevels(window._obDepth.no);
  var yesAsks = noLevels.filter(function(l){return l.price<100;}).map(function(l){return {price:100-l.price, qty:l.qty};});
  yesAsks.sort(function(a,b){return a.price-b.price;});
  var yesBids = yesLevels.slice().sort(function(a,b){return b.price-a.price;});
  var noAsks = yesLevels.filter(function(l){return l.price<100;}).map(function(l){return {price:100-l.price, qty:l.qty};});
  noAsks.sort(function(a,b){return a.price-b.price;});
  var noBids = noLevels.slice().sort(function(a,b){return b.price-a.price;});
  function _addTotals(levels) {
    var rq = 0;
    for (var i = 0; i < levels.length; i++) {
      rq += levels[i].qty;
      levels[i].total = Math.round(rq * levels[i].price / 100 * 100) / 100;
      levels[i].cum_qty = Math.round(rq * 100) / 100;
    }
    return levels;
  }
  _obData = {
    ticker: ticker,
    yes: { asks: _addTotals(yesAsks), bids: _addTotals(yesBids) },
    no: { asks: _addTotals(noAsks), bids: _addTotals(noBids) },
  };
  renderOrderbook();
}

// ── Live trade handler ──────────────────────────────────────────
// When the server sends a trade for the ticker the user is viewing,
// prepend it to the existing whale trades list if it meets the
// min-amount threshold. No need to re-fetch the whole list.
function _handleLiveTrade(ticker, trade) {
  if (window._wsPaused) return;
  if (ticker !== _wsActiveOutcome) return;
  if (!_wsData) return;
  // Only show if trade cost >= user's min-amount filter.
  if (trade.cost < _wsMinAmount) return;
  // Prepend to trades list.
  _wsData.trades = _wsData.trades || [];
  _wsData.trades.unshift(trade);
  // Update summary stats.
  if (trade.side === "YES") {
    _wsData.yes_volume = (_wsData.yes_volume || 0) + trade.cost;
    _wsData.yes_count = (_wsData.yes_count || 0) + 1;
  } else {
    _wsData.no_volume = (_wsData.no_volume || 0) + trade.cost;
    _wsData.no_count = (_wsData.no_count || 0) + 1;
  }
  _wsData.total_volume = (_wsData.total_volume || 0) + trade.cost;
  _wsData.whale_count = (_wsData.whale_count || 0) + 1;
  _wsData.sentiment = _wsData.yes_volume > _wsData.no_volume ? "Bullish"
                    : _wsData.no_volume > _wsData.yes_volume ? "Bearish"
                    : "Neutral";
  renderWhaleSentiment();
}

// Seed the depth map when REST loads the initial orderbook.
function _seedObDepth(obData) {
  window._obDepth = { yes: {}, no: {} };
  if (!obData) return;
  var sides = ["yes", "no"];
  for (var s = 0; s < sides.length; s++) {
    var side = sides[s];
    var data = obData[side] || {};
    var asks = data.asks || [], bids = data.bids || [];
    for (var a = 0; a < asks.length; a++) {
      // Convert from Trade-view back to raw: yes_ask comes from no-side levels
      if (side === "yes") window._obDepth.no[100 - asks[a].price] = asks[a].qty;
      else window._obDepth.yes[100 - asks[a].price] = asks[a].qty;
    }
    for (var b = 0; b < bids.length; b++) {
      window._obDepth[side][bids[b].price] = bids[b].qty;
    }
  }
}

PriceStream.connect();

// ── Snap/Pause + Export (Bloomberg-style per-section freeze) ──────
// Each section (markets, orderbook, capital flow) has its own snap
// state. When snapped, the section stops receiving live updates
// and shows CSV/JSON export buttons. Resume by clicking Live again.
window._mkPaused = false;
window._obPaused = false;
window._wsPaused = false;
var _snapState = { markets: null, orderbook: null, capflow: null };

function _snapTs() {
  var d = new Date();
  var pad = function(n) { return n < 10 ? "0" + n : String(n); };
  return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate())
       + " " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
}

window.toggleSnap = function(btn) {
  var wrap = btn.closest(".snap-controls");
  if (!wrap) return;
  var section = wrap.getAttribute("data-snap-section");
  var label = btn.querySelector(".snap-label");
  var tsEl = wrap.querySelector(".snap-ts");
  var exports = wrap.querySelectorAll(".snap-export");
  var isSnapped = btn.classList.contains("snapped");
  if (isSnapped) {
    // Resume
    btn.classList.remove("snapped");
    wrap.classList.remove("snapped");
    if (label) label.textContent = "Live";
    if (tsEl) { tsEl.hidden = true; tsEl.textContent = ""; }
    for (var i = 0; i < exports.length; i++) exports[i].hidden = true;
    _setSectionPaused(section, false);
    _snapState[section] = null;
  } else {
    // Snap — capture current data
    var snap = _captureSnapshot(section);
    _snapState[section] = snap;
    btn.classList.add("snapped");
    wrap.classList.add("snapped");
    if (label) label.textContent = "Snapped";
    if (tsEl) { tsEl.textContent = _snapTs(); tsEl.hidden = false; }
    for (var j = 0; j < exports.length; j++) exports[j].hidden = false;
    _setSectionPaused(section, true);
  }
};

function _setSectionPaused(section, paused) {
  if (section === "markets") window._mkPaused = paused;
  else if (section === "orderbook") window._obPaused = paused;
  else if (section === "capflow") window._wsPaused = paused;
}

function _captureSnapshot(section) {
  if (section === "markets") {
    var rows = document.querySelectorAll(".ed-markets-table tbody tr[data-mk-row]");
    var out = [];
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      out.push({
        ticker: r.getAttribute("data-mk-row"),
        outcome: (r.querySelector(".ed-mk-label") || {}).textContent || "",
        probability: (r.querySelector('[data-mk-field="chance"]') || {}).textContent || "",
        yes: (r.querySelector('[data-mk-field="yes"]') || {}).textContent || "",
        no: (r.querySelector('[data-mk-field="no"]') || {}).textContent || "",
        last: (r.querySelector('[data-mk-field="last"]') || {}).textContent || "",
        volume_24h: (r.querySelector('[data-mk-field="vol24"]') || {}).textContent || "",
        volume: (r.querySelector('[data-mk-field="vol"]') || {}).textContent || "",
        open_interest: (r.querySelector('[data-mk-field="oi"]') || {}).textContent || "",
      });
    }
    return { section: "markets", taken_at: _snapTs(), rows: out };
  }
  if (section === "orderbook") {
    return {
      section: "orderbook",
      taken_at: _snapTs(),
      ticker: _obActiveOutcome || "",
      side: _obActiveSide || "yes",
      data: _obData ? JSON.parse(JSON.stringify(_obData)) : null,
    };
  }
  if (section === "capflow") {
    return {
      section: "capflow",
      taken_at: _snapTs(),
      ticker: _wsActiveOutcome || "",
      min_amount: _wsMinAmount,
      hours: _wsHours,
      data: _wsData ? JSON.parse(JSON.stringify(_wsData)) : null,
    };
  }
  return null;
}

function _toCSV(section, snap) {
  if (!snap) return "";
  var lines = [];
  lines.push("# Stochverse snapshot - " + section);
  lines.push("# Taken at: " + snap.taken_at);
  lines.push("");
  if (section === "markets") {
    lines.push("ticker,outcome,probability,yes,no,last,volume_24h,volume,open_interest");
    for (var i = 0; i < snap.rows.length; i++) {
      var r = snap.rows[i];
      lines.push([r.ticker, r.outcome, r.probability, r.yes, r.no, r.last, r.volume_24h, r.volume, r.open_interest]
        .map(_csvEscape).join(","));
    }
  } else if (section === "orderbook") {
    lines.push("# ticker: " + snap.ticker + " side: " + snap.side);
    lines.push("side,price_cents,qty,cumulative_qty,total_dollars");
    var sides = ["yes", "no"];
    if (snap.data) {
      for (var s = 0; s < sides.length; s++) {
        var v = snap.data[sides[s]] || {};
        var asks = v.asks || [], bids = v.bids || [];
        for (var a = 0; a < asks.length; a++) {
          lines.push([sides[s]+"_ask", asks[a].price, asks[a].qty, asks[a].cum_qty || "", asks[a].total || ""].map(_csvEscape).join(","));
        }
        for (var b = 0; b < bids.length; b++) {
          lines.push([sides[s]+"_bid", bids[b].price, bids[b].qty, bids[b].cum_qty || "", bids[b].total || ""].map(_csvEscape).join(","));
        }
      }
    }
  } else if (section === "capflow") {
    lines.push("# ticker: " + snap.ticker + " min_amount: $" + snap.min_amount + " window: " + (snap.hours || "all") + "h");
    var d = snap.data || {};
    lines.push("# sentiment: " + (d.sentiment || ""));
    lines.push("# total_volume: $" + (d.total_volume || 0));
    lines.push("# yes_volume: $" + (d.yes_volume || 0));
    lines.push("# no_volume: $" + (d.no_volume || 0));
    lines.push("");
    lines.push("side,price_cents,contracts,cost_dollars,time");
    var tr = d.trades || [];
    for (var t = 0; t < tr.length; t++) {
      lines.push([tr[t].side, tr[t].price, tr[t].contracts, tr[t].cost, tr[t].time].map(_csvEscape).join(","));
    }
  }
  return lines.join("\n");
}

function _csvEscape(v) {
  if (v == null) return "";
  var s = String(v);
  if (s.indexOf(",") >= 0 || s.indexOf('"') >= 0 || s.indexOf("\n") >= 0) {
    s = '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

window.exportSnap = function(btn, format) {
  var wrap = btn.closest(".snap-controls");
  if (!wrap) return;
  var section = wrap.getAttribute("data-snap-section");
  var snap = _snapState[section];
  if (!snap) return;
  var blob, filename;
  var tsPart = (snap.taken_at || _snapTs()).replace(/[: ]/g, "-");
  if (format === "csv") {
    blob = new Blob([_toCSV(section, snap)], {type: "text/csv;charset=utf-8"});
    filename = "stochverse-" + section + "-" + tsPart + ".csv";
  } else {
    blob = new Blob([JSON.stringify(snap, null, 2)], {type: "application/json"});
    filename = "stochverse-" + section + "-" + tsPart + ".json";
  }
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function() {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
};

window.copySnap = function(btn) {
  var wrap = btn.closest(".snap-controls");
  if (!wrap) return;
  var section = wrap.getAttribute("data-snap-section");
  var snap = _snapState[section];
  if (!snap) return;
  // Copy CSV by default — pastes directly into Excel / Sheets /
  // Notion as a parseable table.
  var text = _toCSV(section, snap);
  var origLabel = btn.textContent;
  var done = function(ok) {
    btn.textContent = ok ? "Copied!" : "Failed";
    setTimeout(function() { btn.textContent = origLabel; }, 1200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      function() { done(true); },
      function() { done(false); }
    );
  } else {
    // Fallback for older browsers / non-secure contexts.
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); done(true); }
    catch (e) { done(false); }
    document.body.removeChild(ta);
  }
};

// Share a snapshot: upload to the server and copy the resulting URL
// to the user's clipboard. Creates a permanent URL (30-day TTL) that
// renders this exact frozen state to anyone who opens it.
window.shareSnap = async function(btn) {
  var wrap = btn.closest(".snap-controls");
  if (!wrap) return;
  var section = wrap.getAttribute("data-snap-section");
  var snap = _snapState[section];
  if (!snap) return;
  var origLabel = btn.textContent;
  btn.textContent = "Sharing\u2026";
  btn.disabled = true;
  try {
    var payload = {
      section: section,
      event_ticker: (state && state._eventTicker) || "",
      data: snap,
    };
    var r = await fetch("/api/snapshot", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    var d = await r.json();
    if (!r.ok || !d.url) {
      btn.textContent = "Failed";
      setTimeout(function() { btn.textContent = origLabel; btn.disabled = false; }, 1500);
      return;
    }
    var fullUrl = location.origin + d.url;
    // Copy the URL to clipboard so user can paste into Slack/email.
    var copyDone = function(ok) {
      btn.textContent = ok ? "Link copied!" : fullUrl;
      setTimeout(function() { btn.textContent = origLabel; btn.disabled = false; }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(fullUrl).then(
        function() { copyDone(true); },
        function() { copyDone(false); }
      );
    } else {
      copyDone(false);
    }
  } catch (ex) {
    btn.textContent = "Failed";
    setTimeout(function() { btn.textContent = origLabel; btn.disabled = false; }, 1500);
  }
};

// ── Read-only snapshot mode ─────────────────────────────────────
// When the page loads via /s/{slug}, the server injects a
// <meta name="stochverse-snapshot" content="SLUG"> tag. Fetch the
// snapshot, render a banner, and populate the relevant section
// in read-only mode (live updates disabled).
(function _maybeLoadSharedSnapshot() {
  var meta = document.querySelector('meta[name="stochverse-snapshot"]');
  if (!meta) return;
  var slug = meta.getAttribute("content");
  if (!slug) return;
  fetch("/api/snapshot/" + encodeURIComponent(slug))
    .then(function(r) { return r.json().then(function(d){ return {ok: r.ok, d: d}; }); })
    .then(function(wrap) {
      if (!wrap.ok || wrap.d.error) {
        _renderSharedBanner("Snapshot not found or expired.", null);
        return;
      }
      var d = wrap.d;
      _renderSharedBanner(
        "Viewing a shared " + _sectionLabel(d.section) + " snapshot from "
          + _fmtSnapDate(d.created_at) + ".",
        d.expires_at
      );
      // If the snapshot references an event, navigate there first
      // so the regular event-detail DOM renders; then overlay the
      // frozen snapshot data.
      if (d.event_ticker) {
        showEventDetail(d.event_ticker, true);
        // Apply snapshot once the event has rendered. Poll briefly
        // until the relevant DOM node is present.
        _applySnapshotWhenReady(d);
      } else if (d.section === "markets" && d.data && d.data.rows) {
        // No event context — render a standalone frozen markets
        // table in the main content area.
        _renderStandaloneSnapshot(d);
      } else {
        _renderStandaloneSnapshot(d);
      }
    })
    .catch(function() {
      _renderSharedBanner("Snapshot failed to load.", null);
    });
})();

function _sectionLabel(s) {
  if (s === "markets") return "Markets";
  if (s === "orderbook") return "Order Book";
  if (s === "capflow") return "Large Capital Flow";
  return s || "";
}

function _fmtSnapDate(iso) {
  if (!iso) return "";
  try {
    var d = new Date(iso);
    return d.toLocaleString();
  } catch (e) { return iso; }
}

function _renderSharedBanner(msg, expires) {
  // Idempotent — replace any existing banner so a later render
  // (e.g. an error after a success) doesn't stack two stripes.
  var existing = document.querySelector(".shared-banner");
  if (existing) existing.remove();
  var b = document.createElement("div");
  b.className = "shared-banner";
  var exp = "";
  if (expires) {
    exp = ' · expires ' + _fmtSnapDate(expires);
  }
  b.innerHTML = '<span class="shared-banner-dot"></span>'
              + '<span>' + msg + exp + '</span>'
              + '<a href="/" class="shared-banner-exit">exit snapshot view</a>';
  document.body.insertBefore(b, document.body.firstChild);
  document.body.classList.add("has-shared-banner");
}

function _applySnapshotWhenReady(d, attempt) {
  attempt = attempt || 0;
  if (attempt > 30) return;
  setTimeout(function() {
    var ready = false;
    if (d.section === "markets") {
      ready = document.querySelector(".ed-markets-table") != null;
    } else if (d.section === "orderbook") {
      ready = document.getElementById("ob-body") != null;
    } else if (d.section === "capflow") {
      ready = document.getElementById("ws-body") != null;
    }
    if (!ready) return _applySnapshotWhenReady(d, attempt + 1);
    _overlaySnapshot(d);
  }, 400);
}

function _overlaySnapshot(d) {
  // Freeze the appropriate section in the UI and paint the snapshot
  // data on top, so what the user sees matches what was shared.
  var section = d.section;
  var data = d.data || {};
  var selector = '.snap-controls[data-snap-section="' + section + '"]';
  var wrap = document.querySelector(selector);
  if (wrap) {
    var btn = wrap.querySelector(".snap-btn");
    if (btn && !btn.classList.contains("snapped")) {
      // Programmatically snap so live updates stop flowing.
      _snapState[section] = data;
      btn.classList.add("snapped");
      wrap.classList.add("snapped");
      var lbl = btn.querySelector(".snap-label");
      if (lbl) lbl.textContent = "Snapped";
      var ts = wrap.querySelector(".snap-ts");
      if (ts) { ts.textContent = data.taken_at || ""; ts.hidden = false; }
      var exports = wrap.querySelectorAll(".snap-export");
      for (var i = 0; i < exports.length; i++) exports[i].hidden = false;
      _setSectionPaused(section, true);
    }
  }
  if (section === "markets" && data.rows) {
    for (var r = 0; r < data.rows.length; r++) {
      var row = data.rows[r];
      var rowEl = document.querySelector('tr[data-mk-row="' + row.ticker + '"]');
      if (!rowEl) continue;
      var setField = function(field, val) {
        var el = rowEl.querySelector('[data-mk-field="' + field + '"]');
        if (el && val != null) el.textContent = val;
      };
      setField("chance", row.probability);
      setField("yes", row.yes);
      setField("no", row.no);
      setField("last", row.last);
      setField("vol24", row.volume_24h);
      setField("vol", row.volume);
      setField("oi", row.open_interest);
    }
  } else if (section === "orderbook" && data.data) {
    // Hydrate the order book panel from the frozen payload.
    _obData = data.data;
    _obActiveSide = data.side || "yes";
    _obActiveOutcome = data.ticker;
    // Expand the section so the snapshot is visible.
    var obToggle = document.querySelector(".ob-toggle");
    if (obToggle && !obToggle.classList.contains("open")) obToggle.click();
    setTimeout(function() { renderOrderbook(); }, 50);
  } else if (section === "capflow" && data.data) {
    _wsData = data.data;
    _wsActiveOutcome = data.ticker;
    _wsMinAmount = data.min_amount || _wsMinAmount;
    _wsHours = data.hours || _wsHours;
    var wsToggle = document.querySelector(".ws-toggle");
    if (wsToggle && !wsToggle.classList.contains("open")) wsToggle.click();
    setTimeout(function() { renderWhaleSentiment(); }, 50);
  }
}

function _renderStandaloneSnapshot(d) {
  // Fallback: no event context. Drop a simple preview into the
  // main content area.
  var el = document.getElementById("cards-grid") || document.body;
  var pre = document.createElement("pre");
  pre.className = "shared-standalone";
  pre.textContent = JSON.stringify(d, null, 2);
  if (el) el.appendChild(pre);
}

boot();
</script>
