async function _augmentEventCapabilities(panel, ticker, sportStTypes) {
  try {
    // Fire /capabilities and /normalized in parallel. /capabilities
    // is the per-event probe but bails for future events where FL
    // hasn't loaded the match yet. /normalized has tournament-level
    // fallback and still reports has_bracket / has_standings via
    // the league's stage data — so for a future Bayern vs PSG, we
    // still know there's a bracket to expose.
    var capsPromise = fetch("/api/event/" + encodeURIComponent(ticker) + "/capabilities").then(function(r) { return r.json(); }).catch(function() { return null; });
    var normPromise = fetch("/api/event/" + encodeURIComponent(ticker) + "/normalized").then(function(r) { return r.json(); }).catch(function() { return null; });
    var capsRes = await capsPromise;
    var normRes = await normPromise;
    var caps = (capsRes && !capsRes.error && capsRes.capabilities) || {};
    // Inject MATCH sub-tabs (Player Stats, Predicted, Highlights,
    // Points, Darts, Golf) UNCONDITIONALLY before the standings logic
    // — the standings code below has early-returns that would
    // short-circuit this work otherwise. Each tab is a no-op if the
    // capability is false or already injected, so this is safe.
    _injectMatchCapabilityTabs(panel, caps);
    // Filter the sport-default standings sub-tab strip down to the
    // sub-types the per-event probe actually confirmed have data.
    // Without this, a Soccer match with only caps.standings.away=true
    // still shows "LIVE STANDINGS | STANDINGS | FORM | TOP SCORERS"
    // (sport defaults), and clicking each shows "No standings
    // available." Better to expose only the sub-tabs that have data.
    // We keep the union (sport-default + per-event caps) only when
    // /normalized's has_standings/has_bracket fall-back signals
    // success — see the perEventTypes block below for the reverse
    // case. If the per-event probe returned NO standings flags AND
    // /normalized signals nothing either, sportStTypes wins (existing
    // behavior — better than showing zero standings tabs).
    var hasAnyStCap = false;
    var ALL_ST = ["overall_live", "overall", "home", "away", "form", "top_scores", "draw"];
    var stCaps = caps.standings || {};
    for (var k = 0; k < ALL_ST.length; k++) {
      if (stCaps[ALL_ST[k]] === true) { hasAnyStCap = true; break; }
    }
    if (hasAnyStCap) {
      // Per-event probe returned at least one true flag → trust it.
      // Filter sportStTypes down to only the types confirmed by caps
      // so empty "No standings available" panels don't appear.
      var filtered = [];
      for (var m = 0; m < sportStTypes.length; m++) {
        if (stCaps[sportStTypes[m]] === true) filtered.push(sportStTypes[m]);
      }
      sportStTypes = filtered;
      // Refresh the visible standings sub-tab strip + main button
      // label to match the filtered set, in case the user already
      // opened Standings.
      var stPanelEl = panel.querySelector('.ed-sb-main[data-main="standings"]');
      if (stPanelEl) {
        stPanelEl.dataset.stTypes = sportStTypes.join(",");
        if (stPanelEl.dataset.loaded) _hydrateStandingsTabs(stPanelEl, ticker);
      }
      var stBtnEl = panel.querySelector('.ed-sb-main-tabs [data-main="standings"]');
      if (stBtnEl) stBtnEl.textContent = _standingsTabLabel(sportStTypes);
    }
    var st = caps.standings || {};
    // Preserve canonical render order so a sport that gains "draw"
    // mid-session ends up with the same tab order as a sport that had
    // it from the start.
    var ORDER = ["overall_live", "overall", "home", "away", "form", "draw", "top_scores"];
    var perEventTypes = [];
    for (var i = 0; i < ORDER.length; i++) {
      if (st[ORDER[i]]) perEventTypes.push(ORDER[i]);
    }
    // Fold /normalized's has_bracket / has_standings into the set
    // even when /capabilities failed. has_bracket → draw sub-tab;
    // has_standings → overall sub-tab so the user can at least see
    // the league table for a future fixture.
    if (normRes && !normRes.error && normRes.capabilities) {
      if (normRes.capabilities.has_bracket && perEventTypes.indexOf("draw") < 0) perEventTypes.push("draw");
      if (normRes.capabilities.has_standings && perEventTypes.indexOf("overall") < 0) perEventTypes.unshift("overall");
    }
    if (!perEventTypes.length) return;
    var combined = sportStTypes.slice();
    for (var j = 0; j < perEventTypes.length; j++) {
      if (combined.indexOf(perEventTypes[j]) < 0) combined.push(perEventTypes[j]);
    }
    if (combined.length === sportStTypes.length) return;  // nothing new
    var mainTabsBar = panel.querySelector(".ed-sb-main-tabs");
    if (!mainTabsBar) return;
    var stBtn = mainTabsBar.querySelector('[data-main="standings"]');
    var stPanel = panel.querySelector('.ed-sb-main[data-main="standings"]');
    var newLabel = _standingsTabLabel(combined);
    if (stBtn) {
      stBtn.textContent = newLabel;
    } else {
      // Inject the parent tab. Insert before News if present, else at
      // the end of the main-tabs strip.
      var newsBtn = mainTabsBar.querySelector('[data-main="news"]');
      var btnHtml = '<button class="ed-sb-tab" data-main="standings" onclick="window.switchMainTab(this)">' + escH(newLabel) + '</button>';
      if (newsBtn) newsBtn.insertAdjacentHTML('beforebegin', btnHtml);
      else mainTabsBar.insertAdjacentHTML('beforeend', btnHtml);
    }
    if (stPanel) {
      stPanel.dataset.stTypes = combined.join(",");
      // If the user already opened Standings before the upgrade
      // arrived, re-hydrate so the sub-tab strip picks up the new
      // ceiling (e.g. a Draw sub-tab that wasn't there before).
      if (stPanel.dataset.loaded) {
        _hydrateStandingsTabs(stPanel, ticker);
      }
    } else {
      // Build the standings panel inline. Mirrors the markup at the
      // hydrateGameStats build site so subsequent _hydrateStandingsTabs
      // calls find the structure they expect.
      var ph = '<div class="ed-sb-main" data-main="standings" data-debug-ticker="' + escH(ticker) + '" data-st-types="' + escH(combined.join(",")) + '">';
      ph += '<div class="ed-debug-st-tabs"></div>';
      ph += '<div class="ed-debug-st-filter">';
      ph += '<button class="ed-sb-tab active" data-st-filter="overall" onclick="window._dbgStFilter(this)">Overall</button>';
      ph += '<button class="ed-sb-tab" data-st-filter="home" onclick="window._dbgStFilter(this)">Home</button>';
      ph += '<button class="ed-sb-tab" data-st-filter="away" onclick="window._dbgStFilter(this)">Away</button>';
      ph += '</div>';
      ph += '<div class="ed-debug-st-content"><div class="ed-stats-loading">Loading standings…</div></div>';
      ph += '</div>';
      // Insert as the last main panel so tab order in the DOM follows
      // tab order in the strip.
      var mains = panel.querySelectorAll(".ed-sb-main");
      if (mains.length) mains[mains.length - 1].insertAdjacentHTML("afterend", ph);
    }
  } catch (e) { /* augmentation is best-effort — silent on error */ }
}

// Main tab switcher (MATCH / H2H / STANDINGS / NEWS)
window.switchMainTab = function(btn) {
  var panel = btn.closest(".ed-stats-panel");
  if (!panel) return;
  var target = btn.getAttribute("data-main");
  var tabs = panel.querySelectorAll(".ed-sb-main-tabs .ed-sb-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle("active", tabs[i].getAttribute("data-main") === target);
  }
  var mains = panel.querySelectorAll(".ed-sb-main");
  for (var j = 0; j < mains.length; j++) {
    mains[j].classList.toggle("active", mains[j].getAttribute("data-main") === target);
  }
  // Lazy-load on first click
  var lazy = panel.querySelector('.ed-sb-lazy[data-lazy="' + target + '"]');
  if (lazy && !lazy.dataset.loaded) {
    lazy.dataset.loaded = "1";
    var ticker = panel.dataset.ticker;
    if (target === "h2h") _loadH2H(lazy, ticker);
    else if (target === "news") _loadNews(lazy, ticker);
  }
  // Auto-load Standings on first switch into that tab. We probe
  // /standings_tabs first to learn which sub-tabs FlashLive
  // actually supports for this league (e.g. Argentine Liga
  // Profesional has no Live Standings / Over-Under / HT-FT, while
  // a European cup might) and rebuild the sub-tab strip to only
  // include those, then load the first one.
  if (target === "standings") {
    var stPanel = panel.querySelector('.ed-sb-main[data-main="standings"]');
    if (stPanel && !stPanel.dataset.loaded) {
      stPanel.dataset.loaded = "1";
      var ticker3 = panel.dataset.ticker;
      if (ticker3) _hydrateStandingsTabs(stPanel, ticker3);
    }
  }
};

// FlashLive standings_tabs codes (from /v1/tournaments/standings
// /tabs) → the standing_type query param the data endpoint takes,
// plus the visible label. Order below = display order.
//
// The valid StandingsType enum from the OpenAPI spec is exactly:
//   home, away, overall, form, top_scores, draw, overall_live
// There is no over_under or ht_ft in the API — FlashScore.com
// surfaces those tabs from internal endpoints we don't have access
// to, so we don't render them here.
var _STANDINGS_TAB_MAP = [
  {code: "LIVE_TABLE",  type: "overall_live", label: "Live Standings"},
  {code: "TABLE",       type: "overall",      label: "Standings",     hasFilter: true},
  {code: "TABLE_FORM",  type: "form",         label: "Form"},
  {code: "TABLE_DRAW",  type: "draw",         label: "Draw"},
  {code: "TOP_SCORERS", type: "top_scores",   label: "Top Scorers"},
];

async function _hydrateStandingsTabs(stPanel, ticker) {
  var tabsRow = stPanel.querySelector(".ed-debug-st-tabs");
  var filterRow = stPanel.querySelector(".ed-debug-st-filter");
  var content = stPanel.querySelector(".ed-debug-st-content");
  if (!tabsRow || !content) return;
  // Sport-level ceiling — values_with_data from /api/debug_fl_capabilities
  // is the authoritative list of standing_types FlashLive returns rows
  // for. Tennis tournaments expose ["draw"], soccer leagues expose 5
  // types, etc. The ceiling is non-negotiable: never render a sub-tab
  // for a type the cap-scan says is empty.
  var stTypesCsv = stPanel.dataset.stTypes || "";
  var allowedTypes = stTypesCsv ? stTypesCsv.split(",").filter(Boolean) : [];
  var allowedSet = null;
  if (allowedTypes.length) {
    allowedSet = {};
    for (var ki = 0; ki < allowedTypes.length; ki++) allowedSet[allowedTypes[ki]] = true;
  }
  // Probe FlashLive's per-tournament tab inventory to refine the
  // ceiling further (a sport may expose 5 types overall while a given
  // tournament only surfaces 3). If the probe fails we keep the
  // sport-level ceiling.
  var advertised = null;
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/standings_tabs");
    var d = await r.json();
    if (d && Array.isArray(d.tabs)) advertised = d.tabs;
  } catch (e) { /* keep sport-level ceiling */ }

  var tabs = _STANDINGS_TAB_MAP.slice();
  if (allowedSet) {
    tabs = tabs.filter(function(t) { return allowedSet[t.type]; });
  }
  if (advertised && advertised.length) {
    var advSet = {};
    for (var ai = 0; ai < advertised.length; ai++) advSet[advertised[ai]] = true;
    tabs = tabs.filter(function(t) { return advSet[t.code]; });
  }
  // Dedupe defensively in case a future map entry repeats a type.
  var seen = {};
  tabs = tabs.filter(function(t) {
    if (seen[t.type]) return false;
    seen[t.type] = true;
    return true;
  });
  // Fall back to the full map ONLY when we have no ceiling at all —
  // i.e. the sport-level cap-scan didn't reach this sport yet. With a
  // ceiling in place an empty result is meaningful (sport genuinely
  // has no standings) and we leave the strip empty.
  if (!tabs.length && !allowedSet) tabs = _STANDINGS_TAB_MAP.slice();
  // Pick the default active tab — prefer overall (the standings
  // table itself). If the league doesn't have it, use the first
  // available.
  var defaultTab = null;
  for (var di = 0; di < tabs.length; di++) {
    if (tabs[di].type === "overall") { defaultTab = tabs[di]; break; }
  }
  if (!defaultTab) defaultTab = tabs[0];
  // Render the strip — skip when there's only one sub-tab, since the
  // parent tab's label already adapts to that single type (e.g. tennis
  // brackets render as parent="Draw" with no redundant "Draw" sub-tab).
  if (tabs.length <= 1) {
    tabsRow.style.display = "none";
    tabsRow.innerHTML = "";
  } else {
    tabsRow.style.display = "";
    var th = "";
    for (var ti = 0; ti < tabs.length; ti++) {
      var t = tabs[ti];
      var active = (t === defaultTab) ? " active" : "";
      th += '<button class="ed-sb-tab' + active + '" data-st-type="' + t.type
          + '" onclick="window._dbgStSwitch(this)">' + escH(t.label) + '</button>';
    }
    tabsRow.innerHTML = th;
  }
  // Build the Overall/Home/Away filter dynamically — only expose
  // Home / Away buttons if TABLE_HOME / TABLE_AWAY are advertised.
  if (filterRow && advertised) {
    var fh = '<button class="ed-sb-tab active" data-st-filter="overall" onclick="window._dbgStFilter(this)">Overall</button>';
    if (advertised.indexOf("TABLE_HOME") !== -1) {
      fh += '<button class="ed-sb-tab" data-st-filter="home" onclick="window._dbgStFilter(this)">Home</button>';
    }
    if (advertised.indexOf("TABLE_AWAY") !== -1) {
      fh += '<button class="ed-sb-tab" data-st-filter="away" onclick="window._dbgStFilter(this)">Away</button>';
    }
    filterRow.innerHTML = fh;
  }
  // Show / hide the Overall/Home/Away filter based on the default
  // tab's hasFilter property.
  if (filterRow) {
    filterRow.style.display = (defaultTab && defaultTab.hasFilter) ? "flex" : "none";
  }
  // Auto-load the default tab.
  if (defaultTab) _loadStandingsType(content, ticker, defaultTab.type);
}

// Standings sub-tab switcher (Standings / Form / Top Scorers)
var _stCurrentType = {};
window.switchStTab = function(btn, standingType) {
  var mainPanel = btn.closest(".ed-sb-main");
  if (!mainPanel) return;
  var tabs = mainPanel.querySelectorAll(".ed-sb-sub-tabs .ed-sb-tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  btn.classList.add("active");
  var ticker = (mainPanel.closest(".ed-stats-panel") || {}).dataset;
  ticker = ticker ? ticker.ticker : "";
  if (!ticker) return;
  _stCurrentType[ticker] = standingType;
  var container = document.getElementById("st-content-" + ticker);
  if (container) _loadStandingsType(container, ticker, standingType);
};

// Standings Overall/Home/Away filter
window.switchStFilter = function(btn) {
  var row = btn.closest(".ed-sb-filter-tabs");
  if (!row) return;
  var tabs = row.querySelectorAll(".ed-sb-tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  btn.classList.add("active");
  var filter = btn.getAttribute("data-filter");
  var mainPanel = btn.closest(".ed-sb-main");
  if (!mainPanel) return;
  var ticker = (mainPanel.closest(".ed-stats-panel") || {}).dataset;
  ticker = ticker ? ticker.ticker : "";
  if (!ticker) return;
  var container = document.getElementById("st-content-" + ticker);
  if (!container) return;
  // For filter: overall=overall, home=home, away=away
  var baseType = _stCurrentType[ticker] || "overall";
  // Form doesn't have home/away variant — use overall for form
  if (baseType === "form" || baseType === "top_scorers") {
    _loadStandingsType(container, ticker, baseType);
  } else {
    _loadStandingsType(container, ticker, filter);
  }
};

// H2H: shared cache on the h2h main panel so all sub-tabs use one fetch
var _h2hCache = {};        // ticker → {tabs, homeName, awayName}
var _h2hPending = {};      // ticker → in-flight Promise (dedup parallel clicks)
// Pin the cache to the deployed bundle version. Any new deploy
// changes window.StochverseBundle.version, which invalidates the
// session-scoped cache so users don't keep seeing pre-deploy
// responses (e.g. wrong home/away orientation on H2H tabs).
var _h2hCacheBundleVersion = (window.StochverseBundle && window.StochverseBundle.version) || "";

async function _ensureH2HCache(ticker) {
  // Re-evaluate bundle version each call so cache invalidates if
  // the bundle hot-reloads mid-session.
  var ver = (window.StochverseBundle && window.StochverseBundle.version) || "";
  if (ver !== _h2hCacheBundleVersion) {
    _h2hCache = {};
    _h2hPending = {};
    _h2hCacheBundleVersion = ver;
  }
  if (_h2hCache[ticker]) return _h2hCache[ticker];
  if (_h2hPending[ticker]) return _h2hPending[ticker];
  _h2hPending[ticker] = (async function() {
    try {
      var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/h2h");
      var d = await r.json();
      if (d.error) return {error: d.error};
      var data = d.data || {};
      // FlashLive H2H: DATA → array of tabs (Overall, Home, Away).
      // Each tab has GROUPS → ITEMS.
      var tabs = data.DATA || data.data || [];
      if (!Array.isArray(tabs)) tabs = [];
      _h2hCache[ticker] = {
        tabs: tabs,
        homeName: d.home_name || "",
        awayName: d.away_name || "",
      };
      return _h2hCache[ticker];
    } catch (e) {
      return {error: "Failed to load H2H."};
    } finally {
      delete _h2hPending[ticker];
    }
  })();
  return _h2hPending[ticker];
}

async function _loadH2H(container, ticker) {
  // Phase 3 H2H migration. Bundle owns the entire flow: fetch,
  // sub-tab strip building (with abbreviation matcher for FL TAB_NAMEs
  // like "BAY"/"PSG"), focal-team mapping, and the Show more/less
  // toggle with scroll-back. Falls through to the legacy inline
  // renderer when the bundle isn't available, so older clients and
  // stale HTML still work. The lazy mount we receive (.ed-sb-lazy)
  // sits inside the H2H main panel but the bundle replaces the
  // surrounding sub-tab strip too, since it owns sub-tab rendering.
  if (window.StochverseBundle && window.StochverseBundle.renderH2H) {
    var mainPanelForBundle = container.closest('.ed-sb-main[data-main="h2h"]');
    var bundleMount = mainPanelForBundle || container;
    try {
      await window.StochverseBundle.renderH2H(ticker, bundleMount);
      return;
    } catch (ex) {
      console.warn("[stochverse] h2h bundle render failed, falling back", ex);
    }
  }
  container.innerHTML = '<div class="ed-stats-loading">Loading H2H…</div>';
  var cached = await _ensureH2HCache(ticker);
  if (!cached || cached.error) {
    container.innerHTML = '<div class="ed-stats-loading">' + escH((cached && cached.error) || "Failed to load H2H.") + '</div>';
    return;
  }
  // FlashLive's H2H sub-tabs aren't always Overall/Home/Away. They
  // vary by sport: cricket ships Overall/Test/ODI/T20 (by format),
  // tennis ships Overall/Singles/Doubles, etc. The hardcoded
  // Overall/Home/Away buttons therefore mislabelled formats as
  // "TeamA - Home" / "TeamB - Away" and silently dropped any 4th tab
  // (e.g. T20, the one with the actual IPL data). Rebuild the sub-tab
  // strip from cached.tabs[].TAB_NAME so the labels and indices match
  // what FlashLive actually returned.
  var mainPanel = container.closest('.ed-sb-main[data-main="h2h"]');
  if (mainPanel && Array.isArray(cached.tabs) && cached.tabs.length) {
    _rebuildH2HSubTabs(mainPanel, cached);
    var firstLazy = mainPanel.querySelector('[data-panel="h2h-tab-0"] .ed-sb-lazy');
    if (firstLazy) {
      firstLazy.dataset.loaded = "1";
      _renderH2HTab(firstLazy, cached.tabs, 0, cached.homeName, cached.awayName);
      return;
    }
  }
  // Fallback: render into the original container.
  _renderH2HTab(container, cached.tabs, 0, cached.homeName, cached.awayName);
}

function _rebuildH2HSubTabs(mainPanel, cached) {
  var _tabNames = (cached.tabs || []).map(function(t) { return t && t.TAB_NAME; });
  console.log("[stochverse] h2h-rebuild v3", {
    home: cached.homeName,
    away: cached.awayName,
    tabNames: JSON.stringify(_tabNames),
  });
  // Expose the latest H2H cache for ad-hoc console inspection.
  window._h2hLastCached = cached;
  var tabsRow = mainPanel.querySelector('.ed-sb-tabs, .ed-sb-sub-tabs');
  if (!tabsRow) return;
  // Drop the hardcoded Overall/Home/Away panels — we'll replace them
  // with one panel per actual TAB_NAME.
  var existingPanels = mainPanel.querySelectorAll(':scope > .ed-sb-panel');
  for (var ep = 0; ep < existingPanels.length; ep++) existingPanels[ep].remove();

  // FL ships TAB_NAME pre-formatted with the queried event's
  // home/away orientation built in (e.g. "PSG - Home" because the
  // past Bayern-vs-PSG event we sourced the H2H from had PSG at
  // home). For future fixtures we want the CURRENT fixture's
  // orientation (Bayern home, PSG away). Match each tab's TAB_NAME
  // against the title teams, then render in fixture order:
  //   Overall → home team's tab → away team's tab.
  var hLow = (cached.homeName || "").toLowerCase();
  var aLow = (cached.awayName || "").toLowerCase();
  var hKey = hLow.split(" ")[0];
  var aKey = aLow.split(" ")[0];
  // 3-letter prefix fallback: FL sometimes ships TAB_NAME with the
  // team's broadcast short form ("BAY" for Bayern Munich, "MUN" for
  // Manchester United) rather than the full name. None of "bayern
  // munich" / "bayern" is a substring of "bay", so the strict
  // matchers miss it. Drop to the first 3 chars of the team's
  // first word — wide enough to catch "BAY"/"PSG" while still
  // being narrow enough to avoid cross-team collisions in the same
  // fixture.
  var hPrefix = (hKey || hLow).substring(0, 3);
  var aPrefix = (aKey || aLow).substring(0, 3);
  var matchesTeam = function(rawLow, full, key, prefix) {
    if (!full) return false;
    if (full && rawLow.indexOf(full) >= 0) return true;
    if (key && rawLow.indexOf(key) >= 0) return true;
    return !!(prefix && prefix.length >= 3 && rawLow.indexOf(prefix) >= 0);
  };
  var overallIdx = -1, homeIdx = -1, awayIdx = -1;
  var classified = {};
  for (var ti = 0; ti < cached.tabs.length; ti++) {
    var raw = ((cached.tabs[ti] && cached.tabs[ti].TAB_NAME) || "").toLowerCase();
    if (overallIdx < 0 && (raw === "overall" || raw === "all" || raw === "")) {
      overallIdx = ti; classified[ti] = 1; continue;
    }
    var mH = matchesTeam(raw, hLow, hKey, hPrefix);
    var mA = matchesTeam(raw, aLow, aKey, aPrefix);
    if (mH && !mA && homeIdx < 0) { homeIdx = ti; classified[ti] = 1; }
    else if (mA && !mH && awayIdx < 0) { awayIdx = ti; classified[ti] = 1; }
  }
  // Tab 0 is reliably "Overall" in every FL response we've observed
  // — fall back to that when the regex matchers don't catch it.
  if (overallIdx < 0 && cached.tabs.length > 0) {
    overallIdx = 0; classified[0] = 1;
  }

  var displayOrder = [];
  if (overallIdx >= 0) displayOrder.push({idx: overallIdx, label: "Overall"});
  if (homeIdx >= 0)    displayOrder.push({idx: homeIdx,    label: (cached.homeName || "Home") + " - Home"});
  if (awayIdx >= 0)    displayOrder.push({idx: awayIdx,    label: (cached.awayName || "Away") + " - Away"});
  // Append any remaining tabs in their original order so we don't
  // hide sport-specific surfaces (tennis Clay/Hard/Grass, etc.).
  for (var ti2 = 0; ti2 < cached.tabs.length; ti2++) {
    if (classified[ti2]) continue;
    var raw2 = (cached.tabs[ti2] && cached.tabs[ti2].TAB_NAME) || ("Tab " + (ti2 + 1));
    displayOrder.push({idx: ti2, label: raw2});
  }

  var btnHtml = '';
  var panelHtml = '';
  for (var di = 0; di < displayOrder.length; di++) {
    var entry = displayOrder[di];
    var key = "h2h-tab-" + entry.idx;
    var active = (di === 0) ? ' active' : '';
    btnHtml += '<button class="ed-sb-tab' + active + '" data-panel="' + key + '" data-tab-idx="' + entry.idx + '" onclick="window.switchSBTab(this)">' + escH(entry.label) + '</button>';
    panelHtml += '<div class="ed-sb-panel' + active + '" data-panel="' + key + '"><div class="ed-sb-lazy" data-lazy="' + key + '"></div></div>';
  }
  tabsRow.innerHTML = btnHtml;
  tabsRow.insertAdjacentHTML('afterend', panelHtml);
  // Cache the home/away tab idx so _renderH2HTab can pick the right
  // focal team without hardcoding ti===1/ti===2.
  mainPanel._h2hHomeTabIdx = homeIdx;
  mainPanel._h2hAwayTabIdx = awayIdx;
}

async function _loadH2HSubTab(container, ticker, tabIdx) {
  // Auto-trigger the H2H fetch when a sub-tab is clicked first —
  // previously we showed "Load Overall first" which forced the user
  // back to a different tab just to populate the cache.
  container.innerHTML = '<div class="ed-stats-loading">Loading…</div>';
  var cached = await _ensureH2HCache(ticker);
  if (!cached || cached.error) {
    container.innerHTML = '<div class="ed-stats-loading">' + escH((cached && cached.error) || "Failed to load H2H.") + '</div>';
    return;
  }
  _renderH2HTab(container, cached.tabs, tabIdx, cached.homeName, cached.awayName);
}

function _renderH2HRow(m, homeName, awayName, focalTeam) {
  // Strip the leading "*" FlashLive uses to mark the actual home team —
  // the field naming already conveys that, so the asterisk is noise.
  var home = (m.HOME_PARTICIPANT_NAME_ONE || m.HOME_PARTICIPANT || "").replace(/^\*/, "");
  var away = (m.AWAY_PARTICIPANT_NAME_ONE || m.AWAY_PARTICIPANT || "").replace(/^\*/, "");
  var hs = m.HOME_SCORE_FULL != null ? m.HOME_SCORE_FULL : "";
  var as2 = m.AWAY_SCORE_FULL != null ? m.AWAY_SCORE_FULL : "";
  var result = (m.H_RESULT || "").toUpperCase();
  // FlashLive populates H_RESULT for "Last matches" sections (every row
  // involves one focal team so W/L/D is unambiguous) but leaves it
  // empty in the head-to-head section, where both event participants
  // appear. Derive it from the score relative to the tab's focal team.
  if (!result && focalTeam) {
    var fhs = parseInt(hs, 10), fas = parseInt(as2, 10);
    if (!isNaN(fhs) && !isNaN(fas)) {
      var focalLow = focalTeam.toLowerCase();
      var focalIsHome = home.toLowerCase().indexOf(focalLow) >= 0;
      var focalIsAway = away.toLowerCase().indexOf(focalLow) >= 0;
      if (focalIsHome || focalIsAway) {
        if (fhs === fas) result = "DRAW";
        else if ((focalIsHome && fhs > fas) || (focalIsAway && fas > fhs)) result = "WIN";
        else result = "LOSS";
      }
    }
  }
  var league = m.EVENT_NAME || "";
  // EVENT_ACRONYM is FlashLive's compact tournament code (LPF, COP, CLP,
  // CF, PN, etc). Render it directly — it's always 2-4 chars and fits
  // the cell without truncation.
  var acronym = m.EVENT_ACRONYM || "";
  var leagueLabel = acronym || (league.length > 6 ? league.substring(0, 5) + "…" : league);
  // STAGE = AFTER_PENALTIES / AFTER_EXTRA_TIME flags get a (P) / (AET)
  // suffix on the score; FINISHED has no suffix.
  var stage = (m.STAGE || "").toUpperCase();
  var stageSuffix = "";
  if (stage === "AFTER_PENALTIES" || stage === "AP") stageSuffix = ' <span class="h2h-stage">(P)</span>';
  else if (stage === "AFTER_EXTRA_TIME" || stage === "AET") stageSuffix = ' <span class="h2h-stage">(AET)</span>';
  var homeImg = (m.HOME_IMAGES && m.HOME_IMAGES[0]) || "";
  var awayImg = (m.AWAY_IMAGES && m.AWAY_IMAGES[0]) || "";
  var dateStr = "";
  if (m.START_TIME) {
    try {
      var dt = new Date(m.START_TIME * 1000);
      dateStr = ("0" + dt.getDate()).slice(-2) + "." + ("0" + (dt.getMonth()+1)).slice(-2) + "." + String(dt.getFullYear()).slice(-2);
    } catch(e) {}
  }
  var homeHL = homeName && home.toLowerCase().indexOf(homeName.toLowerCase()) >= 0;
  var awayHL = awayName && away.toLowerCase().indexOf(awayName.toLowerCase()) >= 0;
  var hsNum = parseInt(hs, 10), asNum = parseInt(as2, 10);
  var homeWon = !isNaN(hsNum) && !isNaN(asNum) && hsNum > asNum;
  var awayWon = !isNaN(hsNum) && !isNaN(asNum) && asNum > hsNum;
  var badgeHTML = "";
  if (result === "WIN") badgeHTML = '<span class="h2h-badge h2h-win">W</span>';
  else if (result === "LOSS" || result === "LOST") badgeHTML = '<span class="h2h-badge h2h-loss">L</span>';
  else if (result === "DRAW") badgeHTML = '<span class="h2h-badge h2h-draw">D</span>';
  var h = '<div class="h2h-row">';
  h += '<span class="h2h-date">' + escH(dateStr) + '</span>';
  h += '<span class="h2h-league" title="' + escH(league) + '">' + escH(leagueLabel) + '</span>';
  // Home side: name (right-aligned), then crest closest to score
  h += '<span class="h2h-team h2h-home' + (homeHL ? ' h2h-hl' : '') + '">';
  h += '<span class="h2h-name' + (homeWon ? ' h2h-winner' : '') + '">' + escH(home) + '</span>';
  if (homeImg) h += '<img class="h2h-crest" src="' + escH(homeImg) + '" alt="" loading="lazy">';
  h += '</span>';
  h += '<span class="h2h-score">' + escH(String(hs)) + '-' + escH(String(as2)) + stageSuffix + '</span>';
  // Away side: crest closest to score, then name
  h += '<span class="h2h-team h2h-away' + (awayHL ? ' h2h-hl' : '') + '">';
  if (awayImg) h += '<img class="h2h-crest" src="' + escH(awayImg) + '" alt="" loading="lazy">';
  h += '<span class="h2h-name' + (awayWon ? ' h2h-winner' : '') + '">' + escH(away) + '</span>';
  h += '</span>';
  h += badgeHTML;
  h += '</div>';
  return h;
}

function _renderH2HTab(container, allTabs, tabIdx, homeName, awayName) {
  var tab = allTabs[tabIdx];
  if (!tab) { container.innerHTML = '<div class="ed-stats-loading">No data for this tab.</div>'; return; }
  var groups = tab.GROUPS || [];
  if (!groups.length) { container.innerHTML = '<div class="ed-stats-loading">No H2H data available.</div>'; return; }
  var sections = [];
  for (var gi = 0; gi < groups.length; gi++) {
    var grp = groups[gi];
    var title = grp.GROUP_LABEL || grp.NAME || "";
    var items = grp.ITEMS || [];
    if (items.length) sections.push({title: title, items: items, idx: gi});
  }
  if (!sections.length) { container.innerHTML = '<div class="ed-stats-loading">No matches found.</div>'; return; }
  // Tab → focal team for the result-badge perspective in head-to-head
  // rows. _rebuildH2HSubTabs caches the FL tab index for each side
  // on the main panel because the home/away tabs aren't reliably at
  // FL indices 1/2 anymore: when the H2H is sourced from a past
  // event with flipped home/away (e.g. PSG hosted Bayern previously
  // but the current fixture has Bayern at home), we re-order the
  // display tabs while keeping FL's original indices for content
  // lookup. Use those cached indices instead of a hardcoded 1/2.
  var focalTeam = "";
  var mp = container.closest && container.closest('.ed-sb-main[data-main="h2h"]');
  if (mp && tabIdx === mp._h2hHomeTabIdx) focalTeam = homeName;
  else if (mp && tabIdx === mp._h2hAwayTabIdx) focalTeam = awayName;
  else if (tabIdx === 1) focalTeam = homeName;  // legacy fallback
  else if (tabIdx === 2) focalTeam = awayName;
  container._h2hSections = sections;
  container._h2hHome = homeName;
  container._h2hAway = awayName;
  container._h2hFocal = focalTeam;
  var h = '';
  for (var si = 0; si < sections.length; si++) {
    var sec = sections[si];
    var secTitle = sec.title;
    if (!secTitle) {
      // Section ordering inside each tab:
      //   Overall (tabIdx 0) → [home_matches, away_matches, h2h]
      //   Home    (tabIdx 1) → [home_matches, h2h]
      //   Away    (tabIdx 2) → [away_matches, h2h]
      // The Away tab's first section is the AWAY team's matches, not
      // home — synthesize accordingly when FlashLive omits a label.
      var firstFocal = (tabIdx === 2) ? awayName : homeName;
      if (si === 0) secTitle = "Last matches: " + firstFocal;
      else if (si === 1 && tabIdx === 0) secTitle = "Last matches: " + awayName;
      else secTitle = "Head-to-head matches";
    }
    h += '<div class="h2h-section">';
    h += '<div class="h2h-section-title">' + escH(secTitle) + '</div>';
    h += '<div class="h2h-rows">';
    var max = Math.min(sec.items.length, 5);
    for (var mi = 0; mi < max; mi++) {
      h += _renderH2HRow(sec.items[mi], homeName, awayName, focalTeam);
    }
    h += '</div>';
    if (sec.items.length > 5) {
      h += '<div class="h2h-show-more-wrap"><button class="h2h-show-more" data-expanded="0" onclick="window._h2hShowMore(this,' + si + ')">Show more matches</button></div>';
    }
    h += '</div>';
  }
  container.innerHTML = h;
}

window._h2hShowMore = function(btn, sectionIdx) {
  var container = btn.closest(".ed-sb-lazy") || btn.closest(".ed-sb-panel");
  if (!container || !container._h2hSections) return;
  var sec = container._h2hSections[sectionIdx];
  if (!sec) return;
  // Button is now wrapped in .h2h-show-more-wrap for centering, so
  // the rows container is the wrapper's previous sibling, not the
  // button's. Walk up if we hit the wrap.
  var rowsDiv = btn.previousElementSibling;
  if (!rowsDiv && btn.parentElement && btn.parentElement.classList.contains("h2h-show-more-wrap")) {
    rowsDiv = btn.parentElement.previousElementSibling;
  }
  if (!rowsDiv) return;
  var homeName = container._h2hHome || "";
  var awayName = container._h2hAway || "";
  var focalTeam = container._h2hFocal || "";
  var expanded = btn.getAttribute("data-expanded") === "1";
  var limit = expanded ? Math.min(sec.items.length, 5) : sec.items.length;
  var h = '';
  for (var mi = 0; mi < limit; mi++) {
    h += _renderH2HRow(sec.items[mi], homeName, awayName, focalTeam);
  }
  rowsDiv.innerHTML = h;
  btn.setAttribute("data-expanded", expanded ? "0" : "1");
  btn.textContent = expanded ? "Show more matches" : "Show less";
  // On collapse, scroll the section header back into view — otherwise
  // the user stays scrolled where the expanded list used to end and
  // the now-shorter section is above the viewport.
  if (expanded) {
    var section = btn.closest(".h2h-section");
    if (section && section.scrollIntoView) section.scrollIntoView({behavior: "smooth", block: "start"});
  }
};

async function _loadStandings(container, ticker) {
  container.innerHTML = '<div class="ed-stats-loading">Loading standings…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/standings");
    var d = await r.json();
    if (d.error) {
      container.innerHTML = '<div class="ed-stats-loading">' + escH(d.error) + '</div>';
      return;
    }
    var data = d.data || {};
    var homeName = (d.home_name || "").toLowerCase();
    var awayName = (d.away_name || "").toLowerCase();
    var rows = [];
    if (data.ROWS && Array.isArray(data.ROWS)) {
      rows = data.ROWS;
    } else {
      var groups = data.DATA || data.data || [];
      if (!Array.isArray(groups)) groups = [groups];
      for (var gi = 0; gi < groups.length; gi++) {
        var grp = groups[gi];
        var grpRows = grp.ROWS || grp.rows || [];
        if (!Array.isArray(grpRows)) continue;
        for (var ri = 0; ri < grpRows.length; ri++) rows.push(grpRows[ri]);
      }
    }
    if (!rows.length) {
      // Show raw data for debugging
      container.innerHTML = '<div class="ed-stats-loading">No standings rows found.</div><pre style="font-size:9px;color:var(--text-muted);overflow-x:auto;white-space:pre-wrap;max-height:300px">' + escH(JSON.stringify(data, null, 2).substring(0, 3000)) + '</pre>';
      return;
    }
    container._standingsRows = rows;
    container._homeName = homeName;
    container._awayName = awayName;
    _renderStandingsTable(container, rows, homeName, awayName);
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load standings.</div>';
  }
}

function _stVal(row) {
  for (var i = 1; i < arguments.length; i++) {
    var v = row[arguments[i]];
    if (v !== undefined && v !== null && v !== "") return v;
  }
  return "";
}

// Form window-button click handler. `count` is the group index key
// stashed on container._formWindows by _loadStandingsType.
window._stFormCount = function(btn, count) {
  var row = btn.closest(".ed-sb-filter-tabs");
  if (row) {
    var tabs = row.querySelectorAll(".ed-sb-tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
    btn.classList.add("active");
  }
  // The standings render container is `.ed-debug-st-content` —
  // the older `[id^='st-content-']` selector was a leftover from a
  // sidebar variant we removed, which is why clicks did nothing.
  var container = btn.closest(".ed-debug-st-content");
  if (!container || !container._formWindows) return;
  var tableDiv = container.querySelector("#st-form-table");
  if (tableDiv && container._formWindows[count]) {
    _renderStandingsTable(tableDiv, container._formWindows[count], container._homeName || "", container._awayName || "", container._meta || null);
  }
};

// Map of FlashLive field patterns to display column headers
// NOTE: FlashLive does NOT always return D/L — many leagues only have MP, W, G, PTS
var _ST_COL_MAP = [
  {keys: ["RANKING","ranking","rank","RANK"], hdr: "#", align: "left", w: "20px"},
  {keys: ["TEAM_NAME","team_name","name"], hdr: "Team", align: "left", w: null},
  {keys: ["MATCHES_PLAYED","MATCHES","matches","played","MP"], hdr: "MP", align: "center"},
  {keys: ["WINS","wins","W","WON"], hdr: "W", align: "center"},
  {keys: ["DRAWS","DRAWN","draws","drawn","D","DRAW"], hdr: "D", align: "center", optional: true},
  {keys: ["LOSSES","LOST","losses","lost","L","LOSE"], hdr: "L", align: "center", optional: true},
  {keys: ["GOALS","goals","GF_GA"], hdr: "G", align: "center"},
  {keys: ["POINTS","points","PTS"], hdr: "PTS", align: "center", bold: true},
];

function _findKey(row, candidates) {
  for (var i = 0; i < candidates.length; i++) {
    if (row[candidates[i]] !== undefined && row[candidates[i]] !== null) return candidates[i];
  }
  return null;
}

function _renderStandingsTable(container, rows, homeName, awayName, meta) {
  var sample = rows[0] || {};
  // Resolve which actual key maps to each column
  var cols = [];
  for (var ci = 0; ci < _ST_COL_MAP.length; ci++) {
    var col = _ST_COL_MAP[ci];
    var foundKey = _findKey(sample, col.keys);
    // Skip optional columns (D, L) when the API doesn't provide them
    if (!foundKey && col.optional) continue;
    cols.push({hdr: col.hdr, key: foundKey, keys: col.keys, align: col.align || "center", w: col.w, bold: col.bold});
  }
  // Calculate D/L from W, MP, PTS when API doesn't provide them
  var hasDcol = false, hasLcol = false;
  for (var dc = 0; dc < cols.length; dc++) {
    if (cols[dc].hdr === "D") hasDcol = true;
    if (cols[dc].hdr === "L") hasLcol = true;
  }
  var wKey = _findKey(sample, ["WINS","wins","W"]);
  var mpKey = _findKey(sample, ["MATCHES_PLAYED","MATCHES","MP"]);
  var ptsKey = _findKey(sample, ["POINTS","points","PTS"]);
  var canCalcDL = !hasDcol && !hasLcol && wKey && mpKey && ptsKey;
  if (canCalcDL) {
    // Insert D and L after W column
    var wIdx = -1;
    for (var wi = 0; wi < cols.length; wi++) { if (cols[wi].hdr === "W") { wIdx = wi; break; } }
    if (wIdx >= 0) {
      cols.splice(wIdx + 1, 0,
        {hdr: "D", key: "_calc_d", align: "center"},
        {hdr: "L", key: "_calc_l", align: "center"}
      );
    }
  }
  // Split GOALS "51:13" into GF, GA, GD columns
  var goalsKey = _findKey(sample, ["GOALS","goals"]);
  if (goalsKey && typeof sample[goalsKey] === "string" && String(sample[goalsKey]).indexOf(":") >= 0) {
    var gIdx = -1;
    for (var gi = 0; gi < cols.length; gi++) { if (cols[gi].hdr === "G") { gIdx = gi; break; } }
    if (gIdx >= 0) {
      cols.splice(gIdx, 1,
        {hdr: "GF", key: "_gf", align: "center"},
        {hdr: "GA", key: "_ga", align: "center"},
        {hdr: "GD", key: "_gd", align: "center"}
      );
    }
  }
  // Also scan for any numeric keys we missed
  var usedKeys = {};
  for (var ci2 = 0; ci2 < cols.length; ci2++) { if (cols[ci2].key) usedKeys[cols[ci2].key] = true; }
  var extraKeys = Object.keys(sample);
  for (var ek = 0; ek < extraKeys.length; ek++) {
    var k = extraKeys[ek];
    if (usedKeys[k]) continue;
    // Skip our own internal tagging fields (prefixed with `_`) and
    // any IDs / flags / country codes the API tacks on.
    if (k.charAt(0) === "_") continue;
    if (k.indexOf("IMAGE") >= 0 || k.indexOf("ID") >= 0 || k.indexOf("FLAG") >= 0 || k.indexOf("COUNTRY") >= 0) continue;
    var v = sample[k];
    if (typeof v === 'number' || (typeof v === 'string' && /^\d+$/.test(v))) {
      cols.push({hdr: k.replace(/_/g," "), key: k, align: "center"});
    }
  }
  // Qualification color legend lookup. META.QUALIFICATION_INFO is
  // shaped like {"004682": ["q1", "Promotion - Liga Profesional...",
  // "004682"]} where the key is a hex color code (no #) the team
  // row's TUC field references. We use it both to paint the left
  // bar on each row and to render the legend block underneath.
  var qInfo = (meta && meta.QUALIFICATION_INFO) || {};
  var h = '<div style="overflow-x:auto">';
  h += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
  h += '<thead><tr style="color:var(--text-muted);border-bottom:1px solid var(--border)">';
  // Empty header for the qualification color bar column.
  h += '<th style="width:3px;padding:0"></th>';
  for (var hi = 0; hi < cols.length; hi++) {
    var c = cols[hi];
    var st = 'text-align:' + c.align + ';padding:4px 2px';
    if (c.w) st += ';width:' + c.w;
    if (c.bold) st += ';font-weight:700';
    h += '<th style="' + st + '">' + escH(c.hdr) + '</th>';
  }
  h += '</tr></thead><tbody>';
  // Detect whether the row set spans multiple league groups (e.g.
  // Argentine Liga's "Group A" / "Group B"). If so, emit a section
  // header row whenever _GROUP_NAME changes so the user sees where
  // each group's ranking restarts.
  var distinctGroups = {};
  for (var dgi = 0; dgi < rows.length; dgi++) {
    var gn = rows[dgi]._GROUP_NAME;
    if (gn) distinctGroups[gn] = true;
  }
  var hasMultipleGroups = Object.keys(distinctGroups).length > 1;
  // Total column span = qualification band (1) + cols.length.
  var totalColSpan = cols.length + 1;
  var prevGroupName = null;
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var groupName = row._GROUP_NAME || "";
    if (hasMultipleGroups && groupName && groupName !== prevGroupName) {
      h += '<tr><td colspan="' + totalColSpan + '" style="padding:10px 4px 4px;font-weight:700;color:var(--text-muted);font-size:10px;letter-spacing:0.6px;text-transform:uppercase;background:var(--bg2)">' + escH(groupName) + '</td></tr>';
      prevGroupName = groupName;
    }
    var teamName = _stVal(row, "TEAM_NAME", "team_name", "name") || "";
    var isHL = (homeName && teamName.toLowerCase().indexOf(homeName) >= 0) ||
              (awayName && teamName.toLowerCase().indexOf(awayName) >= 0);
    var rs = 'border-bottom:1px solid var(--border);' + (isHL ? 'background:rgba(74,144,226,0.15);font-weight:600' : '');
    h += '<tr style="' + rs + '">';
    // Left-most column: 3px-wide qualification color band (matches
    // FlashScore). Uses the row's TUC hex code; no qualification =
    // transparent.
    var qHex = row.TUC || "";
    var bandStyle = qHex
      ? 'background:#' + escH(qHex) + ';width:3px;padding:0'
      : 'width:3px;padding:0';
    h += '<td style="' + bandStyle + '"></td>';
    for (var ci3 = 0; ci3 < cols.length; ci3++) {
      var c2 = cols[ci3];
      var val = "";
      var cellInner = "";
      if (c2.hdr === "#") val = _stVal(row, "RANKING", "ranking", "rank", "RANK") || String(i + 1);
      else if (c2.hdr === "Team") {
        // Team cell: crest (TEAM_IMAGE_PATH) + name.
        var crest = row.TEAM_IMAGE_PATH || row.team_image_path || "";
        if (crest) {
          cellInner = '<img class="ed-st-crest" src="' + escH(crest) + '" alt="" loading="lazy">';
        }
        cellInner += '<span class="ed-st-team">' + escH(teamName) + '</span>';
      }
      else if (c2.key === "_calc_d" || c2.key === "_calc_l") {
        var rw = parseInt(_stVal(row, "WINS", "wins", "W") || 0);
        var rmp = parseInt(_stVal(row, "MATCHES_PLAYED", "MATCHES", "MP") || 0);
        var rpts = parseInt(_stVal(row, "POINTS", "points", "PTS") || 0);
        var rd = rpts - rw * 3;
        var rl = rmp - rw - rd;
        val = c2.key === "_calc_d" ? String(rd) : String(rl);
      }
      else if (c2.key === "_gf" || c2.key === "_ga" || c2.key === "_gd") {
        var gStr = String(_stVal(row, "GOALS", "goals") || "");
        var gParts = gStr.split(":");
        var gf = parseInt(gParts[0]) || 0, ga = parseInt(gParts[1]) || 0;
        if (c2.key === "_gf") val = String(gParts[0] || "");
        else if (c2.key === "_ga") val = String(gParts[1] || "");
        else val = (gf - ga) >= 0 ? "+" + (gf - ga) : String(gf - ga);
      }
      else if (c2.key) val = String(row[c2.key] !== undefined && row[c2.key] !== null ? row[c2.key] : "");
      else if (c2.keys) {
        for (var ki = 0; ki < c2.keys.length; ki++) {
          var rv = row[c2.keys[ki]];
          if (rv !== undefined && rv !== null) { val = String(rv); break; }
        }
      }
      var st2 = 'text-align:' + c2.align + ';padding:4px 2px';
      if (c2.bold) st2 += ';font-weight:700';
      if (c2.hdr === "#") st2 += ';color:var(--text-muted)';
      h += '<td style="' + st2 + '">' + (cellInner || escH(val)) + '</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  // Qualification legend block. One row per distinct hex code in
  // QUALIFICATION_INFO with the human-readable label.
  var legendKeys = Object.keys(qInfo);
  if (legendKeys.length) {
    h += '<div class="ed-st-legend">';
    for (var li = 0; li < legendKeys.length; li++) {
      var lk = legendKeys[li];
      var info = qInfo[lk] || [];
      var lbl = info[1] || "";
      if (!lbl) continue;
      h += '<div class="ed-st-legend-item">'
         + '<span class="ed-st-legend-swatch" style="background:#' + escH(lk) + '"></span>'
         + '<span class="ed-st-legend-text">' + escH(lbl) + '</span>'
         + '</div>';
    }
    h += '</div>';
  }
  container.innerHTML = h;
}

async function _loadTopScorers(container, ticker) {
  container.innerHTML = '<div class="ed-stats-loading">Loading top scorers…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/topscorers");
    var d = await r.json();
    if (d.error) {
      container.innerHTML = '<div class="ed-stats-loading">' + escH(d.error) + '</div>';
      return;
    }
    var data = d.data || {};
    var groups = data.DATA || data.data || [];
    if (!Array.isArray(groups)) groups = [groups];
    var players = [];
    for (var gi = 0; gi < groups.length; gi++) {
      var grpRows = groups[gi].ROWS || groups[gi].rows || [];
      if (!Array.isArray(grpRows)) continue;
      for (var ri = 0; ri < grpRows.length; ri++) players.push(grpRows[ri]);
    }
    if (!players.length) {
      container.innerHTML = '<div class="ed-stats-loading">No top scorers data available.</div>';
      return;
    }
    var h = '<div style="overflow-x:auto">';
    h += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
    h += '<thead><tr style="color:var(--text-muted);border-bottom:1px solid var(--border)">';
    h += '<th style="text-align:left;padding:4px 2px;width:20px">#</th>';
    h += '<th style="text-align:left;padding:4px 2px">Player</th>';
    h += '<th style="text-align:left;padding:4px 2px">Team</th>';
    h += '<th style="text-align:center;padding:4px 2px">G</th>';
    h += '<th style="text-align:center;padding:4px 2px">A</th>';
    h += '</tr></thead><tbody>';
    for (var i = 0; i < players.length; i++) {
      var p = players[i];
      var name = p.TS_PLAYER_NAME || p.PLAYER_NAME || p.player_name || p.name || "";
      var team = p.TEAM_NAME || p.team_name || "";
      var goals = p.TS_PLAYER_GOALS || p.GOALS || p.goals || p.SCORE || p.score || "";
      var assists = p.ASSISTS || p.assists || "";
      var rank = p.TS_RANK || p.RANKING || p.ranking || (i + 1);
      h += '<tr style="border-bottom:1px solid var(--border)">';
      h += '<td style="text-align:left;padding:4px 2px;color:var(--text-muted)">' + escH(String(rank)) + '</td>';
      h += '<td style="text-align:left;padding:4px 2px">' + escH(name) + '</td>';
      h += '<td style="text-align:left;padding:4px 2px;color:var(--text-muted)">' + escH(team) + '</td>';
      h += '<td style="text-align:center;padding:4px 2px;font-weight:700">' + escH(String(goals)) + '</td>';
      h += '<td style="text-align:center;padding:4px 2px">' + escH(String(assists)) + '</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';
    container.innerHTML = h;
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load top scorers.</div>';
  }
}

// Translate the raw "no X data available" backend errors into
// per-standing-type messages users can actually parse.
function _stEmptyMsg(standingType) {
  if (standingType === "overall_live") {
    return "No live standings — round isn't in progress.";
  }
  if (standingType === "draw") return "Draw standings not tracked for this league.";
  if (standingType === "top_scores") {
    return "Top scorers haven't been published yet for this stage.";
  }
  return "No data available.";
}

// FlashLive bracket renderer. Consumes the shape returned by
// standing_type=draw — TABS holds index → participant lookup tables,
// ROUNDS[] holds the per-round matchups. Handles tennis singles/doubles
// today; the same shape works for any sport that surfaces a knockout
// draw (soccer cup rounds, basketball playoffs, MMA tournaments).
//
// STAGE_ID semantics observed in real responses:
//   "1"  scheduled        "8"  retired          "19" in-progress (live)
//   "3"  finished          "9"  walkover
//
// INFO field markers (parens-wrapped, may stack with seed):
//   (Bye) (WC) (Q) (LL) (Alt)         entry conditions
//   (RET.)        (WO.)               outcome modifiers
//   (1) (15) (33)                     seed numbers
function _renderBracket(container, data, currentEventId) {
  var tabs = data.TABS || {};
  var participants = tabs.DRAW_EVENT_PARTICIPANTS || {};
  var roundLabels = tabs.DRAW_ROUNDS || {};
  var rounds = Array.isArray(data.ROUNDS) ? data.ROUNDS : [];
  if (!rounds.length) {
    container.innerHTML = '<div class="ed-bracket-empty">No bracket published yet.</div>';
    return;
  }
  var STAGE_BYE = {"Bye": 1};
  var fmtTime = function(ts) {
    if (!ts) return "";
    var d = new Date(ts * 1000);
    var now = new Date();
    var sameDay = d.toDateString() === now.toDateString();
    var time = d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
    if (sameDay) return time;
    var date = d.toLocaleDateString([], {month: "short", day: "numeric"});
    return date + " " + time;
  };
  var resolveName = function(idx) {
    if (idx == null || idx === "") return "";
    var n = participants[String(idx)];
    return n == null ? "" : n;
  };
  var isByeBlock = function(b) {
    var hi = b.DRAW_EVENT_PARTICIPANT_INFO_HOME || "";
    var ai = b.DRAW_EVENT_PARTICIPANT_INFO_AWAY || "";
    if (/\(Bye\)/i.test(hi) || /\(Bye\)/i.test(ai)) return true;
    var hn = resolveName(b.DRAW_ROUND_HOME_EVENT_PARTICIPANT);
    var an = resolveName(b.DRAW_ROUND_AWAY_EVENT_PARTICIPANT);
    return !hn || !an;
  };
  var renderPlayer = function(name, info, score, isWinner, isBye) {
    var cls = "ed-bracket-player";
    if (isWinner) cls += " ed-bracket-winner";
    var label = isBye ? (name || "Bye") : (name || "TBD");
    var infoHTML = info ? '<span class="ed-bracket-info">' + escH(info) + '</span>' : "";
    var scoreHTML = (score != null && score !== "") ? '<span class="ed-bracket-score">' + escH(String(score)) + '</span>' : "";
    return '<div class="' + cls + '">'
         + infoHTML
         + '<span class="ed-bracket-name">' + escH(label) + '</span>'
         + scoreHTML
         + '</div>';
  };
  var renderMatch = function(b) {
    var homeName = resolveName(b.DRAW_ROUND_HOME_EVENT_PARTICIPANT);
    var awayName = resolveName(b.DRAW_ROUND_AWAY_EVENT_PARTICIPANT);
    var homeInfo = b.DRAW_EVENT_PARTICIPANT_INFO_HOME || "";
    var awayInfo = b.DRAW_EVENT_PARTICIPANT_INFO_AWAY || "";
    var homeScore = b.DRAW_ROUND_HOME_RESULT;
    var awayScore = b.DRAW_ROUND_AWAY_RESULT;
    var winner = b.DRAW_ROUND_EVENT_WINNER_OVERALL || "";
    var stageId = String(b.DRAW_ROUND_EVENT_STAGE_ID || "");
    var bye = isByeBlock(b);
    var hasResult = (homeScore != null && homeScore !== "") || (awayScore != null && awayScore !== "");
    var classes = ["ed-bracket-match"];
    var statusBadge = "";
    if (bye) {
      classes.push("ed-bracket-bye");
    } else if (stageId === "9" || /\(WO\.\)/i.test(homeInfo + awayInfo)) {
      statusBadge = '<div class="ed-bracket-status">Walkover</div>';
    } else if (stageId === "8" || /\(RET\.\)/i.test(homeInfo + awayInfo)) {
      statusBadge = '<div class="ed-bracket-status">Retired</div>';
    } else if (!hasResult) {
      classes.push("ed-bracket-future");
    }
    if (currentEventId && b.DRAW_ROUND_EVENT_ID === currentEventId) {
      classes.push("ed-bracket-current");
    }
    var html = '<div class="' + classes.join(" ") + '">';
    html += renderPlayer(homeName, homeInfo, homeScore, winner === "H" && !bye, bye && !homeName);
    html += renderPlayer(awayName, awayInfo, awayScore, winner === "A" && !bye, bye && !awayName);
    html += statusBadge;
    if (!hasResult && !bye && !statusBadge && b.DRAW_ROUND_EVENT_START) {
      html += '<div class="ed-bracket-time">' + escH(fmtTime(b.DRAW_ROUND_EVENT_START)) + '</div>';
    }
    html += '</div>';
    return html;
  };
  // Find which round contains the current match — used to highlight
  // the active nav button so the user immediately sees "you are here"
  // without needing to read every round column.
  var currentRoundIdx = -1;
  if (currentEventId) {
    for (var crI = 0; crI < rounds.length; crI++) {
      var crBlocks = (rounds[crI] && rounds[crI].BLOCKS) || [];
      var hit = false;
      for (var crJ = 0; crJ < crBlocks.length; crJ++) {
        if (crBlocks[crJ].DRAW_ROUND_EVENT_ID === currentEventId) { hit = true; break; }
      }
      if (hit) { currentRoundIdx = crI; break; }
    }
  }
  // Round-jump nav strip. Renders before the bracket so the user can
  // scrub to any round (1/64 → Final) without manually scrolling
  // through 64 first-round matchups.
  var navHtml = '<div class="ed-bracket-nav">';
  for (var ni = 0; ni < rounds.length; ni++) {
    var nlabel = roundLabels[String(rounds[ni].DRAW_ROUND)] || ("Round " + rounds[ni].DRAW_ROUND);
    var ncls = "ed-bracket-nav-btn" + (ni === currentRoundIdx ? " active" : "");
    navHtml += '<button class="' + ncls + '" data-round-idx="' + ni + '" onclick="window._bracketJumpToRound(this)">' + escH(nlabel) + '</button>';
  }
  navHtml += '</div>';
  var html = '<div class="ed-bracket">';
  for (var ri = 0; ri < rounds.length; ri++) {
    var round = rounds[ri] || {};
    var label = roundLabels[String(round.DRAW_ROUND)] || ("Round " + round.DRAW_ROUND);
    var blocks = Array.isArray(round.BLOCKS) ? round.BLOCKS : [];
    html += '<div class="ed-bracket-round" data-round-idx="' + ri + '">';
    html += '<div class="ed-bracket-round-label">' + escH(label) + '</div>';
    for (var bi = 0; bi < blocks.length; bi++) {
      html += renderMatch(blocks[bi]);
    }
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = '<div class="ed-bracket-wrap">' + navHtml + html + '</div>';
  // Auto-scroll to the current match if we tagged one — saves the user
  // from hunting through 64 first-round matchups to find their bet.
  if (currentEventId) {
    var current = container.querySelector(".ed-bracket-current");
    if (current) {
      try {
        current.scrollIntoView({behavior: "instant", block: "nearest", inline: "center"});
      } catch (e) {
        // Older browsers — fall back to no smooth scroll.
        current.scrollIntoView();
      }
    }
  }
}

window._bracketJumpToRound = function(btn) {
  var nav = btn.closest(".ed-bracket-nav");
  var wrap = nav && nav.parentElement;
  var bracket = wrap && wrap.querySelector(".ed-bracket");
  if (!bracket) return;
  var idx = parseInt(btn.getAttribute("data-round-idx"), 10);
  if (isNaN(idx)) return;
  var target = bracket.querySelector('.ed-bracket-round[data-round-idx="' + idx + '"]');
  if (!target) return;
  // Update active state on nav buttons.
  var btns = nav.querySelectorAll(".ed-bracket-nav-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.toggle("active", btns[i] === btn);
  // Scroll the round column to the start of the bracket viewport.
  // Computed scroll on the bracket element directly avoids the page
  // jumping vertically when a child uses scrollIntoView.
  bracket.scrollTo({left: target.offsetLeft - bracket.offsetLeft, behavior: "smooth"});
};

async function _loadStandingsType(container, ticker, standingType) {
  // Phase 3: route every standings sub-type through the TS bundle
  // when available. The new path uses /normalized — same data
  // source for Overall / Home / Away / Form / Top Scorers / Draw —
  // which has tournament-level fallback so future fixtures
  // (Bayern vs PSG a week away) still render their league
  // standings, top scorers, and bracket. Falls through to the
  // legacy per-tab fetch below when the bundle isn't loaded.
  if (window.StochverseBundle && window.StochverseBundle.renderStandingsType) {
    try {
      await window.StochverseBundle.renderStandingsType(ticker, container, standingType);
      return;
    } catch (ex) {
      console.warn("[stochverse] standings bundle render failed, falling back", ex);
    }
  }
  container.innerHTML = '<div class="ed-stats-loading">Loading…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/standings?standing_type=" + encodeURIComponent(standingType));
    var d = await r.json();
    if (d.error) {
      // Backend errors like "no live_table data available" are
      // technical — replace them with the per-tab message so the
      // user sees a sentence, not a path-like string.
      var msg = /no .* data available/i.test(d.error) ? _stEmptyMsg(standingType) : d.error;
      container.innerHTML = '<div class="ed-stats-loading">' + escH(msg) + '</div>';
      return;
    }
    var data = d.data || {};
    // Bracket dispatch — FlashLive's standing_type=draw response is
    // shape-distinct from the league-table response. TABS holds the
    // participant index → name lookup and ROUNDS[] is an array of
    // round groups with BLOCKS[] of matchups. Route to the bracket
    // renderer; the existing table renderer below handles every
    // other standing_type.
    var bracketData = data.DATA && data.DATA.TABS && Array.isArray(data.DATA.ROUNDS) ? data.DATA : null;
    if (bracketData) {
      _renderBracket(container, bracketData, d.current_event_id || "");
      return;
    }
    var rows = [];
    if (data.ROWS && Array.isArray(data.ROWS)) {
      rows = data.ROWS;
    } else {
      var groups = data.DATA || data.data || [];
      if (!Array.isArray(groups)) groups = [groups];
      for (var gi = 0; gi < groups.length; gi++) {
        var grp = groups[gi];
        var grpRows = grp.ROWS || grp.rows || [];
        if (!Array.isArray(grpRows)) continue;
        // Tag each row with its source-group label so consumers can
        // render section headers when a league has multiple groups
        // (e.g. Argentine Liga's "Group A" / "Group B"). The API uses
        // GROUP for league groups and GROUP_NAME for some other shapes.
        var grpName = grp.GROUP || grp.GROUP_NAME || grp.NAME || grp.STAGE_NAME || "";
        // Form responses concatenate N windows (Last 5/10/15) inside
        // each group's ROWS — same teams repeated, no explicit window
        // delimiter. Distinct-team count gives the chunk size, so
        // floor(ri / chunk) is a stable window index even when a
        // team's MP or DYNAMIC_COLUMNS_DATA drifts (e.g. MP=14 inside
        // the Last 15 window for a team with a postponed match).
        var seenTeams = {};
        for (var ti = 0; ti < grpRows.length; ti++) {
          var tn = grpRows[ti] && (grpRows[ti].TEAM_NAME || grpRows[ti].team_name || grpRows[ti].name);
          if (tn) seenTeams[tn] = true;
        }
        var teamsPerWindow = Math.max(1, Object.keys(seenTeams).length);
        for (var ri = 0; ri < grpRows.length; ri++) {
          var rr = grpRows[ri];
          if (rr && typeof rr === "object") {
            rr._GROUP_INDEX = gi;
            rr._GROUP_NAME = grpName;
            rr._WINDOW_INDEX = Math.floor(ri / teamsPerWindow);
          }
          rows.push(rr);
        }
      }
    }
    if (!rows.length) {
      container.innerHTML = '<div class="ed-stats-loading">' + escH(_stEmptyMsg(standingType)) + '</div>';
      return;
    }
    // META carries column legend + qualification color codes for
    // promotion / Champions League / relegation bands. Pass it
    // through so _renderStandingsTable can paint the bars and
    // append the legend at the bottom.
    var meta = data.META || data.meta || null;
    var homeName = (d.home_name || "").toLowerCase();
    var awayName = (d.away_name || "").toLowerCase();
    if (standingType === "top_scores" || standingType === "top_scorers" || standingType === "TOP_SCORERS") {
      _renderTopScorersFromStandings(container, rows);
    } else if (standingType === "form") {
      // Form data ships N windows (Last 5 / Last 10 / Last 15)
      // concatenated inside each league-group's ROWS — same teams
      // repeated, no explicit delimiter. The flatten step tagged
      // each row with _WINDOW_INDEX (computed from position-within-
      // group ÷ distinct team count), which is stable even when a
      // team's MATCHES_PLAYED or DYNAMIC_COLUMNS_DATA drifts (e.g.
      // MP=14 inside the Last 15 window after a postponed match —
      // that previously spawned a phantom "Last 14" button).
      var windows = {};
      for (var fi = 0; fi < rows.length; fi++) {
        var wi = rows[fi]._WINDOW_INDEX;
        if (wi === undefined || wi === null) wi = 0;
        if (!windows[wi]) windows[wi] = [];
        windows[wi].push(rows[fi]);
      }
      var winKeys = Object.keys(windows).sort(function(a,b) { return parseInt(a) - parseInt(b); });
      // FlashLive's form windows are canonically Last 5 / Last 10 /
      // Last 15. Use that by window index so labels stay correct
      // early in a season — using max MP within a bucket
      // underestimates when no team has played enough yet (e.g. 5
      // matchdays in, bucket 1's max MP = 8 but the window is still
      // "Last 10"). Beyond 3 windows, fall back to max MP.
      var CANONICAL_FORM_WINDOWS = [5, 10, 15];
      var labelByKey = {};
      for (var lk = 0; lk < winKeys.length; lk++) {
        var widx = parseInt(winKeys[lk]);
        var canonical = CANONICAL_FORM_WINDOWS[widx];
        if (canonical) {
          labelByKey[winKeys[lk]] = String(canonical);
          continue;
        }
        var bucket = windows[winKeys[lk]];
        var maxMP = 0;
        for (var bi = 0; bi < bucket.length; bi++) {
          var mp = parseInt(bucket[bi].MATCHES_PLAYED || 0);
          if (mp > maxMP) maxMP = mp;
        }
        labelByKey[winKeys[lk]] = maxMP > 0 ? String(maxMP) : ("Window " + (widx + 1));
      }
      var h = '<div class="ed-sb-tabs ed-sb-filter-tabs" style="margin-bottom:8px">';
      for (var wk = 0; wk < winKeys.length; wk++) {
        var k = winKeys[wk];
        h += '<button class="ed-sb-tab' + (wk === 0 ? ' active' : '') + '" onclick="window._stFormCount(this,\'' + k + '\')">' + escH("Last " + labelByKey[k]) + '</button>';
      }
      h += '</div><div id="st-form-table"></div>';
      container.innerHTML = h;
      container._formWindows = windows;
      container._homeName = homeName;
      container._awayName = awayName;
      container._meta = meta;
      var tableDiv = container.querySelector("#st-form-table");
      if (tableDiv && winKeys.length) _renderStandingsTable(tableDiv, windows[winKeys[0]], homeName, awayName, meta);
    } else {
      _renderStandingsTable(container, rows, homeName, awayName, meta);
    }
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load data.</div>';
  }
}

// Dead-simple match tab switcher — uses display:block/none, no CSS classes
window.switchMatchTab = function(btn) {
  var main = btn.closest('[data-main="match"]');
  if (!main) return;
  var target = btn.getAttribute('data-mt');
  // Toggle buttons
  var btns = main.querySelectorAll('[data-mt]');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].tagName === 'BUTTON') btns[i].classList.toggle('active', btns[i].getAttribute('data-mt') === target);
  }
  // Toggle panels
  var panels = main.querySelectorAll('div[data-mt]');
  for (var j = 0; j < panels.length; j++) {
    panels[j].style.display = (panels[j].getAttribute('data-mt') === target) ? 'block' : 'none';
  }
  // Switching tabs always stops the commentary auto-poll. The
  // commentary branch below restarts it if we're switching INTO
  // commentary; otherwise we want it off so we don't keep polling
  // while the user is on Stats / Lineups / etc.
  _stopCommentaryPoll();
  // Also stop the bundle-driven commentary poll when switching away.
  // The bundle's stopCommentary clears the interval per-mount; safe
  // to call even if the bundle wasn't running its own poll.
  try {
    if (window.StochverseBundle && window.StochverseBundle.stopCommentary) {
      var allCommMounts = main.querySelectorAll('[data-lazy="commentary"]');
      for (var ci = 0; ci < allCommMounts.length; ci++) {
        window.StochverseBundle.stopCommentary(allCommMounts[ci]);
      }
    }
  } catch (e) {}
  // Lazy-load player-stats and commentary
  var activePanel = main.querySelector('div[data-mt="' + target + '"]');
  if (activePanel) {
    var lazy = activePanel.querySelector('.ed-sb-lazy');
    var ticker = (main.closest('.ed-stats-panel') || {}).dataset;
    ticker = ticker ? ticker.ticker : '';
    if (lazy && !lazy.dataset.loaded) {
      lazy.dataset.loaded = '1';
      if (target === 'commentary' && window.StochverseBundle && window.StochverseBundle.renderCommentary) {
        // Phase 3 commentary migration. Bundle owns the poll loop
        // entirely — the legacy _startCommentaryPoll path below is
        // bypassed when the bundle is loaded. Falls through to the
        // inline _loadCommentary + _startCommentaryPoll if the
        // bundle isn't available (older client / cached HTML).
        window.StochverseBundle.renderCommentary(ticker, lazy);
      }
      else if (target === 'commentary') _loadCommentary(lazy, ticker);
      else if (target === 'player-stats') _loadPlayerStats(lazy, ticker);
      else if (target === 'missing-players') _loadMissingPlayers(lazy, ticker);
      else if (target === 'predicted-lineups') _loadPredictedLineups(lazy, ticker);
      else if (target === 'highlights') _loadHighlights(lazy, ticker);
      else if (target === 'points-history') _loadPointsHistory(lazy, ticker);
      else if (target === 'darts') _loadDarts(lazy, ticker);
      else if (target === 'golf') _loadGolf(lazy, ticker);
      else if (target === 'lineups' && window.StochverseBundle && window.StochverseBundle.renderLineups) {
        window.StochverseBundle.renderLineups(ticker, lazy);
      }
      else if (target === 'match-stats' && window.StochverseBundle && window.StochverseBundle.renderStats) {
        // Phase 3 stats migration. The bundle's renderStats fetches
        // /normalized and renders into the lazy placeholder — same
        // pattern as Standings / Bracket. If the bundle isn't loaded
        // (older client / cached HTML), we never injected the lazy
        // placeholder in the first place; the inline panel rendered
        // at hydrateGameStats time still shows.
        window.StochverseBundle.renderStats(ticker, lazy);
      }
    }
    // Auto-poll commentary every 15 s while the tab is open. New
    // commentary lines (kicks, goals, fouls, sub-50 ms updates from
    // FL) appear without the user having to click around. Backend
    // /commentary has no cache so each poll lands fresh data.
    // Skip when the bundle is driving commentary — its renderCommentary
    // already runs its own 15s poll, and starting both would
    // double the request rate against /commentary.
    var _bundleHasComm = !!(window.StochverseBundle && window.StochverseBundle.renderCommentary);
    if (target === 'commentary' && lazy && ticker && !_bundleHasComm) {
      _startCommentaryPoll(lazy, ticker);
    }
  }
};

// Commentary auto-poll. Single timer at a time — tab switches and
// detail-page exits clear it.
var _commentaryPollTimer = null;
function _startCommentaryPoll(container, ticker) {
  _stopCommentaryPoll();
  _commentaryPollTimer = setInterval(function() {
    // Bail if the detail page is no longer showing this event, or
    // the container got removed from the DOM.
    if (!state || !state._eventTicker || state._eventTicker !== ticker) {
      _stopCommentaryPoll();
      return;
    }
    if (!document.body.contains(container)) {
      _stopCommentaryPoll();
      return;
    }
    _loadCommentary(container, ticker);
  }, 15000);
}
function _stopCommentaryPoll() {
  if (_commentaryPollTimer) {
    clearInterval(_commentaryPollTimer);
    _commentaryPollTimer = null;
  }
}

async function _loadCommentary(container, ticker) {
  container.innerHTML = '<div class="ed-stats-loading">Loading commentary…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/commentary");
    var d = await r.json();
    if (d.error) { container.innerHTML = '<div class="ed-stats-loading">' + escH(d.error) + '</div>'; return; }
    var data = d.data || {};
    var items = data.DATA || data.data || [];
    if (!Array.isArray(items)) items = [];
    // Flatten: items can be stages with ITEMS inside
    var comments = [];
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      if (item.ITEMS) {
        for (var j = 0; j < item.ITEMS.length; j++) comments.push(item.ITEMS[j]);
      } else {
        comments.push(item);
      }
    }
    if (!comments.length) { container.innerHTML = '<div class="ed-stats-loading">No commentary available.</div>'; return; }
    var h = '<div style="font-size:11px">';
    for (var ci = 0; ci < comments.length; ci++) {
      var c = comments[ci];
      var minute = c.COMMENT_TIME || c.TIME || c.INCIDENT_TIME || "";
      var text = c.COMMENT_TEXT || c.COMMENT || c.TEXT || c.BODY || "";
      var isImportant = c.COMMENT_IS_IMPORTANT || c.IS_IMPORTANT || false;
      if (!text) continue;
      h += '<div style="padding:8px 0;border-bottom:1px solid var(--border)">';
      h += '<div style="font-weight:700;color:var(--text);margin-bottom:3px">' + escH(String(minute)) + (minute ? "'" : "") + '</div>';
      h += '<div style="color:' + (isImportant ? 'var(--text)' : 'var(--text-dim)') + ';line-height:1.4">' + escH(text) + '</div>';
      h += '</div>';
    }
    h += '</div>';
    container.innerHTML = h;
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load commentary.</div>';
  }
}
async function _loadMissingPlayers(container, ticker) {
  // Prefer the TS bundle's MissingPlayers block — reads /normalized
  // so it shares the cross-block cache. Falls back to the inline
  // path below if the bundle didn't load.
  if (window.StochverseBundle && window.StochverseBundle.renderMissingPlayers) {
    try {
      await window.StochverseBundle.renderMissingPlayers(ticker, container);
      return;
    } catch (e) {
      // Fall through to legacy renderer.
    }
  }
  container.innerHTML = '<div class="ed-stats-loading">Loading missing players…</div>';
  try {
    var r = await fetch("/api/event/" + encodeURIComponent(ticker) + "/missing-players");
    var d = await r.json();
    if (d.error) {
      container.innerHTML = '<div class="ed-stats-loading">' + escH(d.error) + '</div>';
      return;
    }
    var data = d.data || {};
    var players = data.DATA || [];
    if (!Array.isArray(players) || !players.length) {
      container.innerHTML = '<div class="ed-stats-loading">No missing players reported.</div>';
      return;
    }
    var homeName = d.home_name || "Home";
    var awayName = d.away_name || "Away";
    var homeList = players.filter(function(p) { return p.TEAM === 1; });
    var awayList = players.filter(function(p) { return p.TEAM === 2; });
    function chanceColor(chance) {
      var c = String(chance || "").toLowerCase();
      if (c.indexOf("some chance") >= 0 || c.indexOf("doubt") >= 0 || c.indexOf("uncertain") >= 0) return "#ffb74d";
      if (c.indexOf("will not") >= 0 || c.indexOf("won't") >= 0) return "#f44336";
      if (c.indexOf("miss") >= 0) return "#f44336";
      if (c === "out" || c.indexOf(" out") >= 0 || c.indexOf("out ") === 0) return "#f44336";
      if (c.indexOf("expected") >= 0 || c.indexOf("likely") >= 0 || c.indexOf("will play") >= 0) return "#4caf50";
      return "var(--text-dim)";
    }
    function chanceTerse(chance) {
      var c = String(chance || "").toLowerCase();
      if (!c) return "";
      if (c.indexOf("will not play") >= 0 || c.indexOf("won't play") >= 0) return "OUT";
      if (c.indexOf("miss") >= 0) return "OUT";
      if (c === "out" || c.indexOf("out ") === 0) return "OUT";
      if (c.indexOf("some chance") >= 0 || c.indexOf("chance of playing") >= 0) return "DOUBTFUL";
      if (c.indexOf("doubt") >= 0 || c.indexOf("uncertain") >= 0) return "DOUBTFUL";
      if (c.indexOf("expected") >= 0 || c.indexOf("likely") >= 0 || c.indexOf("will play") >= 0) return "EXPECTED";
      return chance.toUpperCase();
    }
    function renderTeam(name, list) {
      if (!list.length) return '';
      var h = '<div class="ed-stats-title" style="margin-top:14px">' + escH(name) + '</div>';
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        var chanceRaw = p.CHANCE_TO_PLAY || "";
        var chanceLabel = chanceTerse(chanceRaw);
        var reason = p.ABSENCE_REASON || "";
        h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px">';
        h += '<div style="flex:1;color:var(--text)">' + escH(p.PLAYER_NAME || "") + '</div>';
        if (reason) h += '<div style="color:var(--text-muted);font-size:10px">' + escH(reason) + '</div>';
        if (chanceLabel) h += '<div style="color:' + chanceColor(chanceRaw) + ';font-size:10px;font-weight:700;text-transform:uppercase" title="' + escH(chanceRaw) + '">' + escH(chanceLabel) + '</div>';
        h += '</div>';
      }
      return h;
    }
    var html = renderTeam(homeName, homeList) + renderTeam(awayName, awayList);
    if (!html) html = '<div class="ed-stats-loading">No missing players reported.</div>';
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="ed-stats-loading">Failed to load missing players.</div>';
  }
}
