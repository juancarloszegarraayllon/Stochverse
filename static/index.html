<!DOCTYPE html>
<html>
<head><title>OddsIQ Test</title></head>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:20px">
<h1 style="color:#00ff00">OddsIQ</h1>
<button onclick="testAPI()" style="padding:10px;background:#111;color:#fff;border:1px solid #333;cursor:pointer">Test API</button>
<button onclick="loadCats()" style="padding:10px;background:#111;color:#fff;border:1px solid #333;cursor:pointer;margin-left:10px">Load Categories</button>
<div id="out" style="margin-top:20px;white-space:pre-wrap;font-size:12px;color:#aaa"></div>

<script>
function log(msg) {
  document.getElementById("out").textContent += msg + "\n";
  console.log(msg);
}

async function testAPI() {
  log("Testing /api/categories...");
  try {
    var r = await fetch("/api/categories");
    log("Status: " + r.status);
    var t = await r.text();
    log("Response: " + t.substring(0, 500));
  } catch(e) {
    log("ERROR: " + e.toString());
  }
}

async function loadCats() {
  log("Loading events...");
  try {
    var r = await fetch("/api/events?limit=3&offset=0&date_filter=all&include_undated=true&sort=earliest");
    log("Status: " + r.status);
    var t = await r.text();
    log("Response: " + t.substring(0, 1000));
  } catch(e) {
    log("ERROR: " + e.toString());
  }
}

log("Page loaded OK");
</script>
</body>
</html>
