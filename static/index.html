<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OddsIQ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--border:#1a1a1a;--green:#00ff00;--green-dim:#00aa00;--green-bg:#001500;--red:#ff3333;--text:#fff;--text-dim:#888;--text-muted:#444}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Helvetica,Arial,sans-serif}
#header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.95);border-bottom:1px solid var(--border);padding:12px 24px 0}
#logo{font-size:2.4rem;font-weight:900;color:var(--green);text-align:center;padding:8px 0 12px}
#controls{display:flex;gap:10px;align-items:center;padding-bottom:10px;flex-wrap:wrap}
#search-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
#search-input:focus{border-color:var(--green)}
#search-input::placeholder{color:var(--text-muted)}
#date-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
#undated-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap}
#undated-toggle{width:32px;height:18px;appearance:none;background:var(--bg3);border:1px solid var(--border);border-radius:9px;cursor:pointer;position:relative;transition:background 0.2s}
#undated-toggle:checked{background:var(--green);border-color:var(--green)}
#undated-toggle::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:left 0.2s}
#undated-toggle:checked::after{left:16px}
#refresh-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
#refresh-btn:hover{border-color:var(--green);color:var(--green)}
#cat-tabs{display:flex;gap:0;border-bottom:1px solid var(--green);overflow-x:auto;scrollbar-width:none}
#cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:8px 16px;font-size:12px;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.2s;margin-bottom:-1px}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{color:var(--green);background:var(--green-bg);border-radius:6px 6px 0 0;border-bottom:2px solid var(--green)}
#main{display:flex;min-height:calc(100vh - 140px)}
#nav{width:200px;min-width:200px;padding:12px 8px;position:sticky;top:140px;height:calc(100vh - 140px);overflow-y:auto;border-right:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent;display:none}
.nav-item{display:block;width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;text-align:left;padding:5px 6px;cursor:pointer;border-radius:4px;line-height:1.4}
.nav-item:hover{color:var(--text-dim)}
.nav-item.active{color:var(--green);font-weight:700}
.nav-child{display:block;width:100%;background:transparent;border:none;color:var(--text-muted);font-family:inherit;font-size:12px;text-align:left;padding:3px 6px 3px 18px;cursor:pointer;border-radius:4px;line-height:1.4}
.nav-child:hover{color:var(--text-dim)}
.nav-child.active{color:var(--green);font-weight:600}
#content{flex:1;padding:16px 20px;min-width:0}
#cards-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.market-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
.market-card:hover{border-color:#333}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cat-pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim)}
.card-date{font-size:11px;color:var(--text-muted);white-space:nowrap}
.card-icon{font-size:20px}
.card-title{font-size:13px;font-weight:600;line-height:1.4;color:var(--text)}
.card-ticker a{font-size:10px;color:var(--text-muted);text-decoration:none;font-family:monospace}
.card-ticker a:hover{color:var(--green)}
.card-ticker span{font-size:10px;color:var(--text-muted);font-family:monospace}
.outcome-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-top:1px solid var(--border)}
.outcome-label{flex:1;font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.outcome-chance{font-size:11px;color:var(--text-dim);width:32px;text-align:right;flex-shrink:0}
.outcome-odds{display:flex;gap:4px;flex-shrink:0}
.odds-box{display:flex;flex-direction:column;align-items:center;padding:3px 6px;border-radius:4px;min-width:36px}
.odds-yes{background:#001a00;border:1px solid #003300}
.odds-no{background:#1a0000;border:1px solid #330000}
.odds-label{font-size:8px;font-weight:700;letter-spacing:0.5px}
.odds-yes .odds-label{color:var(--green-dim)}
.odds-no .odds-label{color:var(--red)}
.odds-price{font-size:11px;font-weight:700}
.odds-yes .odds-price{color:var(--green)}
.odds-no .odds-price{color:var(--red)}
#home-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
#home-screen h2{font-size:1.4rem;color:var(--green);font-weight:700}
#home-screen p{font-size:14px;color:var(--text-muted)}
#loader{display:none;justify-content:center;padding:20px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sentinel{height:40px}
#count-bar{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0}
</style>
</head>
<body>
<div id="header">
  <div id="logo">OddsIQ</div>
  <div id="controls">
    <input id="search-input" type="text" placeholder="Search team, player, market...">
    <select id="date-sel">
      <option value="all">All dates</option>
      <option value="today">Today</option>
      <option value="week">This week</option>
    </select>
    <label id="undated-label">
      <input type="checkbox" id="undated-toggle" checked>
      Include undated
    </label>
    <button id="refresh-btn">Refresh</button>
  </div>
  <div id="cat-tabs"></div>
</div>
<div id="main">
  <div id="nav"></div>
  <div id="content">
    <div id="home-screen">
      <h2>Welcome to OddsIQ</h2>
      <p>Select a category above to browse markets.</p>
    </div>
    <div id="cards-grid"></div>
    <div id="loader"><div class="spinner"></div></div>
    <div id="count-bar"></div>
    <div id="sentinel"></div>
  </div>
</div>
<script>
var state = {category:null,sport:null,soccerComp:null,search:"",dateFilter:"all",includeUndated:true,offset:0,total:0,loading:false,allLoaded:false,categories:[],sports:[],soccerComps:[]};
var SPORT_ICONS = {Soccer:"soccer",Basketball:"basketball",Baseball:"baseball",Football:"football",Hockey:"hockey",Tennis:"tennis",Golf:"golf",MMA:"mma",Cricket:"cricket",Esports:"esports",Motorsport:"motorsport",Boxing:"boxing",Rugby:"rugby",Lacrosse:"lacrosse",Chess:"chess",Darts:"darts","Aussie Rules":"aussie","Other Sports":"other"};
var SPORT_EMOJI = {Soccer:"soccer",Basketball:"bball",Baseball:"base",Football:"football",Hockey:"hockey",Tennis:"tennis",Golf:"golf",MMA:"mma",Cricket:"cricket",Esports:"esports",Motorsport:"moto",Boxing:"boxing",Rugby:"rugby",Lacrosse:"lax",Chess:"chess",Darts:"darts","Aussie Rules":"afl","Other Sports":"sport"};

function sportEmoji(s) {
  var m = {Soccer:"26BD",Basketball:"1F3C0",Baseball:"26BE",Football:"1F3C8",Hockey:"1F3D2",Tennis:"1F3BE",Golf:"26F3",MMA:"1F94A",Cricket:"1F3CF",Esports:"1F3AE",Motorsport:"1F3CE",Boxing:"1F94A",Rugby:"1F3C9",Lacrosse:"1F94D",Chess:"265F",Darts:"1F3AF","Aussie Rules":"1F3C9","Other Sports":"1F3C6"};
  return m[s] ? String.fromCodePoint(parseInt(m[s],16)) : "";
}
function catEmoji(c) {
  var m = {Sports:"1F3DF",Elections:"1F5F3",Politics:"1F3DB",Economics:"1F4C8",Financials:"1F4B0",Crypto:"20BF",Companies:"1F3E2",Entertainment:"1F3AC","Climate and Weather":"1F30D","Science and Technology":"1F52C",Health:"1F3E5",Social:"1F465",World:"1F310",Transportation:"2708",Mentions:"1F4AC"};
  return m[c] ? String.fromCodePoint(parseInt(m[c],16)) : "X";
}

async function boot() {
  try {
    var r1 = await fetch("/api/categories");
    var d1 = await r1.json();
    state.categories = d1.categories || [];
    var r2 = await fetch("/api/sports");
    var d2 = await r2.json();
    state.sports = d2.sports || [];
    state.soccerComps = d2.soccer_comps || [];
    renderCatTabs();
  } catch(ex) { console.error("boot",ex); }
}

function renderCatTabs() {
  var el = document.getElementById("cat-tabs");
  var h = "";
  h += "<button class="cat-tab" + (state.category===null?" active":"") + "" onclick="selectCat(null)"></button>";
  h += "<button class="cat-tab" + (state.category==="All"?" active":"") + "" onclick="selectCat(null2)">All</button>";
  for (var i=0;i<state.categories.length;i++) {
    var c = state.categories[i];
    var esc = c.name.replace(/\/g,"\\").replace(/"/g,"&quot;").replace(/'/g,"\'");
    h += "<button class="cat-tab" + (state.category===c.name?" active":"") + "" onclick="selectCat('" + esc + "')">" + c.name + "</button>";
  }
  el.innerHTML = h;
}

function selectCat(key) {
  if (key === "null2") key = "All";
  state.category = key;
  state.sport = null;
  state.soccerComp = null;
  state.offset = 0;
  state.allLoaded = false;
  renderCatTabs();
  renderNav();
  if (key === null) {
    document.getElementById("home-screen").style.display = "flex";
    document.getElementById("cards-grid").style.display = "none";
    document.getElementById("nav").style.display = "none";
    document.getElementById("count-bar").textContent = "";
    return;
  }
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("cards-grid").style.display = "grid";
  document.getElementById("cards-grid").innerHTML = "";
  document.getElementById("count-bar").textContent = "";
  loadMore();
}

function renderNav() {
  var nav = document.getElementById("nav");
  if (state.category !== "Sports") { nav.style.display = "none"; return; }
  nav.style.display = "block";
  var h = "";
  var total = 0;
  for (var i=0;i<state.sports.length;i++) total += state.sports[i].count;
  h += "<button class="nav-item" + (!state.sport?" active":"") + "" onclick="selectSport(null)">All sports (" + total + ")</button>";
  for (var i=0;i<state.sports.length;i++) {
    var s = state.sports[i];
    var isActive = state.sport === s.name;
    var esc = s.name.replace(/'/g,"\'");
    h += "<button class="nav-item" + (isActive?" active":"") + "" onclick="selectSport('" + esc + "')">" + s.name + " (" + s.count + ")" + (isActive?" ▾":" ▸") + "</button>";
    if (isActive && s.name === "Soccer" && state.soccerComps.length) {
      h += "<button class="nav-child" + (!state.soccerComp?" active":"") + "" onclick="selectComp(null)">All</button>";
      for (var j=0;j<state.soccerComps.length;j++) {
        var comp = state.soccerComps[j];
        var cesc = comp.replace(/'/g,"\'");
        h += "<button class="nav-child" + (state.soccerComp===comp?" active":"") + "" onclick="selectComp('" + cesc + "')">" + (state.soccerComp===comp?">> ":"") + comp + "</button>";
      }
    }
  }
  nav.innerHTML = h;
}

function selectSport(name) {
  if (state.sport === name && name !== null) state.sport = null;
  else state.sport = name;
  state.soccerComp = null;
  state.offset = 0;
  state.allLoaded = false;
  document.getElementById("cards-grid").innerHTML = "";
  renderNav();
  loadMore();
}

function selectComp(comp) {
  state.soccerComp = comp;
  state.offset = 0;
  state.allLoaded = false;
  document.getElementById("cards-grid").innerHTML = "";
  renderNav();
  loadMore();
}

async function loadMore() {
  if (state.loading || state.allLoaded || state.category === null) return;
  state.loading = true;
  document.getElementById("loader").style.display = "flex";
  var url = "/api/events?offset=" + state.offset + "&limit=24&date_filter=" + state.dateFilter + "&include_undated=" + state.includeUndated + "&sort=earliest";
  if (state.category && state.category !== "All") url += "&category=" + encodeURIComponent(state.category);
  if (state.sport) url += "&sport=" + encodeURIComponent(state.sport);
  if (state.soccerComp) url += "&soccer_comp=" + encodeURIComponent(state.soccerComp);
  if (state.search) url += "&search=" + encodeURIComponent(state.search);
  try {
    var r = await fetch(url);
    var d = await r.json();
    state.total = d.total || 0;
    var evs = d.events || [];
    state.offset += evs.length;
    if (evs.length === 0 || state.offset >= state.total) state.allLoaded = true;
    appendCards(evs);
    updateCountBar();
  } catch(ex) { console.error("loadMore",ex); }
  state.loading = false;
  document.getElementById("loader").style.display = "none";
}

function appendCards(evs) {
  var grid = document.getElementById("cards-grid");
  for (var i=0;i<evs.length;i++) {
    var d = document.createElement("div");
    d.innerHTML = buildCard(evs[i]);
    if (d.firstChild) grid.appendChild(d.firstChild);
  }
}

function buildCard(ev) {
  var sport = ev._sport || "";
  var cat = ev.category || "Other";
  var icon = sport ? (sportEmoji(sport) || catEmoji(cat)) : catEmoji(cat);
  var label = sport || cat;
  var dt = ev._display_dt || "";
  var ticker = ev.event_ticker || "";
  var series = ev.series_ticker || "";
  var url = series ? "https://kalshi.com/markets/" + series.toLowerCase() + "/" + series.toLowerCase().replace("kx","") + "/" + ticker.toLowerCase() : "";
  var outcomes = ev.outcomes || [];
  var h = "<div class="market-card">";
  h += "<div class="card-top"><span class="cat-pill">" + label + "</span>";
  if (dt) h += "<span class="card-date">" + dt + "</span>";
  h += "</div>";
  if (icon) h += "<div class="card-icon">" + icon + "</div>";
  h += "<div class="card-title">" + ev.title + "</div>";
  h += "<div class="card-ticker">";
  if (url) h += "<a href="" + url + "" target="_blank">" + ticker + "</a>";
  else h += "<span>" + ticker + "</span>";
  h += "</div>";
  for (var i=0;i<Math.min(outcomes.length,5);i++) {
    var o = outcomes[i];
    h += "<div class="outcome-row">";
    h += "<div class="outcome-label">" + o.label + "</div>";
    h += "<div class="outcome-chance">" + o.chance + "</div>";
    h += "<div class="outcome-odds">";
    h += "<div class="odds-box odds-yes"><div class="odds-label">YES</div><div class="odds-price">" + o.yes + "</div></div>";
    h += "<div class="odds-box odds-no"><div class="odds-label">NO</div><div class="odds-price">" + o.no + "</div></div>";
    h += "</div></div>";
  }
  h += "</div>";
  return h;
}

function updateCountBar() {
  var bar = document.getElementById("count-bar");
  if (state.category === null) { bar.textContent = ""; return; }
  bar.textContent = state.allLoaded ? (state.total + " markets") : (state.offset + " of " + state.total);
}

new IntersectionObserver(function(entries) {
  if (entries[0].isIntersecting) loadMore();
}, {rootMargin:"300px"}).observe(document.getElementById("sentinel"));

var st;
document.getElementById("search-input").addEventListener("input", function(e) {
  clearTimeout(st);
  st = setTimeout(function() {
    state.search = e.target.value.trim();
    state.offset = 0; state.allLoaded = false;
    document.getElementById("cards-grid").innerHTML = "";
    loadMore();
  }, 350);
});
document.getElementById("date-sel").addEventListener("change", function(e) {
  state.dateFilter = e.target.value;
  state.offset = 0; state.allLoaded = false;
  document.getElementById("cards-grid").innerHTML = "";
  loadMore();
});
document.getElementById("undated-toggle").addEventListener("change", function(e) {
  state.includeUndated = e.target.checked;
  state.offset = 0; state.allLoaded = false;
  document.getElementById("cards-grid").innerHTML = "";
  loadMore();
});
document.getElementById("refresh-btn").addEventListener("click", function() {
  fetch("/api/refresh").then(function() {
    state.offset = 0; state.allLoaded = false;
    document.getElementById("cards-grid").innerHTML = "";
    boot().then(function() { if (state.category) loadMore(); });
  });
});

boot();
</script>
</body>
</html>
