function _formatDataValue(val, key) {
  if (val === null || val === undefined || val === "") return "\u2014";
  var dateKeys = {"open_time":1,"close_time":1,"created_time":1,"updated_time":1,"expected_expiration_time":1,"expiration_time":1,"latest_expiration_time":1,"fee_waiver_expiration_time":1,"settlement_ts":1,"strike_date":1,"last_updated_ts":1};
  if (dateKeys[key] && typeof val === "string") {
    if (val.startsWith("0001-01-01")) return "\u2014";
    try {
      var d = new Date(val);
      if (isNaN(d.getTime())) return escH(val);
      return d.toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",timeZone:"America/New_York"});
    } catch(e) { return escH(val); }
  }
  if (key === "last_price_dollars") {
    var pNum = parseFloat(val);
    return isNaN(pNum) ? escH(String(val)) : (pNum*100).toFixed(1).replace(/\.0$/,"") + "%";
  }
  var dollarKeys = {"yes_bid_dollars":1,"yes_ask_dollars":1,"no_bid_dollars":1,"no_ask_dollars":1,"previous_price_dollars":1,"previous_yes_bid_dollars":1,"previous_yes_ask_dollars":1,"notional_value_dollars":1,"liquidity_dollars":1};
  if (dollarKeys[key]) {
    var num = parseFloat(val);
    return isNaN(num) ? escH(String(val)) : "$" + num.toFixed(4).replace(/0+$/,"").replace(/\.$/,"");
  }
  var countKeys = {"volume_fp":1,"volume_24h_fp":1,"open_interest_fp":1,"yes_bid_size_fp":1,"yes_ask_size_fp":1};
  if (countKeys[key]) {
    var n = parseFloat(val);
    return isNaN(n) ? escH(String(val)) : Math.round(n).toLocaleString();
  }
  if (typeof val === "boolean") return val ? "Yes" : "No";
  if (typeof val === "number") return String(val);
  if (typeof val === "object") {
    try { return escH(JSON.stringify(val)); } catch(e) { return "\u2014"; }
  }
  return escH(String(val));
}

async function hydrateMarketDataGrid(el) {
  if (!el) return;
  var tkr = el.getAttribute("data-ticker");
  var body = el.querySelector(".ed-data-grid-body");
  if (!tkr || !body) return;
  try {
    var r = await fetch("/api/kalshi_event_raw?ticker=" + encodeURIComponent(tkr));
    var d = await r.json();
    if (d.error) {
      body.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:11px">Failed to load: ' + escH(d.error) + '</div>';
      return;
    }
    var ev = d.event_top_level_only || {};
    var allMk = d.all_markets_compact || [];
    var fullMk = d.sample_active_market || {};
    ev.__markets_count = d.market_count || "\u2014";
    // Build a full-field map per outcome.
    var outcomes = [];
    for (var mi = 0; mi < allMk.length; mi++) {
      var m = allMk[mi];
      if (mi === 0 && fullMk && fullMk.ticker === m.ticker) {
        var merged = {};
        for (var fk in fullMk) merged[fk] = fullMk[fk];
        for (var mk2 in m) merged[mk2] = m[mk2];
        outcomes.push(merged);
      } else {
        outcomes.push(m);
      }
    }
    if (!outcomes.length && fullMk) outcomes.push(fullMk);
    // Compute synthetic spread fields (same logic as screener):
    // Yes Spread = yes_ask - yes_bid, No Spread = no_ask - no_bid.
    for (var si = 0; si < outcomes.length; si++) {
      var o = outcomes[si];
      var yb = parseFloat(o.yes_bid_dollars);
      var ya = parseFloat(o.yes_ask_dollars);
      var nb = parseFloat(o.no_bid_dollars);
      var na = parseFloat(o.no_ask_dollars);
      o.__yes_spread = (!isNaN(ya) && !isNaN(yb)) ? "$" + (ya - yb).toFixed(2) : null;
      o.__no_spread  = (!isNaN(na) && !isNaN(nb)) ? "$" + (na - nb).toFixed(2) : null;
    }
    var outLabels = outcomes.map(function(o) {
      return o.yes_sub_title || o.ticker || "?";
    });
    // Load saved checkbox state from localStorage.
    var storageKey = "dg_checked";
    var savedChecked = {};
    try { savedChecked = JSON.parse(localStorage.getItem(storageKey) || "{}"); } catch(e) {}
    // Render checkbox groups as vertical columns side-by-side.
    var html = '<div class="ed-dg-picker">';
    for (var gi = 0; gi < DATA_FIELD_GROUPS.length; gi++) {
      var grp = DATA_FIELD_GROUPS[gi];
      html += '<div class="ed-dg-col">';
      html += '<div class="ed-dg-group-title">' + escH(grp.name) + '</div>';
      html += '<div class="ed-dg-fields">';
      for (var fi = 0; fi < grp.fields.length; fi++) {
        var f = grp.fields[fi];
        var fid = f[1];
        var checked = savedChecked[fid] ? " checked" : "";
        html += '<label class="ed-dg-field">'
             + '<input type="checkbox" data-key="' + escH(fid) + '"'
             + ' data-label="' + escH(f[0]) + '"'
             + ' data-src="' + escH(f[2]) + '"'
             + checked + '>'
             + escH(f[0]) + '</label>';
      }
      html += '</div></div>';
    }
    html += '</div>';
    html += '<div class="ed-dg-actions">'
         + '<button class="ed-dg-btn" onclick="window._dgSelectAll(this)">Select All</button>'
         + '<button class="ed-dg-btn ed-dg-btn-dim" onclick="window._dgReset(this)">Reset</button>'
         + '</div>';
    html += '<div class="ed-dg-result"></div>';
    body.innerHTML = html;
    // Rebuild comparison table on checkbox change.
    function rebuildTable() {
      var boxes = body.querySelectorAll('input[type="checkbox"]');
      var checked = [];
      var saveObj = {};
      for (var bi = 0; bi < boxes.length; bi++) {
        if (boxes[bi].checked) {
          checked.push({ key: boxes[bi].dataset.key, label: boxes[bi].dataset.label, src: boxes[bi].dataset.src });
          saveObj[boxes[bi].dataset.key] = 1;
        }
      }
      try { localStorage.setItem(storageKey, JSON.stringify(saveObj)); } catch(e) {}
      var result = body.querySelector(".ed-dg-result");
      if (!result) return;
      if (!checked.length) {
        result.innerHTML = '<div class="ed-dg-result-empty">Check fields above to compare values across outcomes.</div>';
        return;
      }
      var evFields = checked.filter(function(c) { return c.src === "event"; });
      var mkFields = checked.filter(function(c) { return c.src === "market"; });
      var tbl = '';
      // Event-level: transposed — field names as column headers,
      // single value row below (shared across all outcomes).
      if (evFields.length) {
        tbl += '<table class="ed-data-table" style="margin-bottom:10px"><thead><tr>';
        for (var ei = 0; ei < evFields.length; ei++) {
          tbl += '<th>' + escH(evFields[ei].label) + '</th>';
        }
        tbl += '</tr></thead><tbody><tr>';
        for (var ei2 = 0; ei2 < evFields.length; ei2++) {
          var val = ev[evFields[ei2].key];
          var fmt = _formatDataValue(val, evFields[ei2].key);
          var cls = fmt === "\u2014" ? "ed-dv ed-dv-muted" : "ed-dv";
          tbl += '<td class="' + cls + '">' + fmt + '</td>';
        }
        tbl += '</tr></tbody></table>';
      }
      // Market-level: transposed — field names as column headers,
      // one row per outcome for side-by-side comparison.
      if (mkFields.length && outcomes.length) {
        tbl += '<table class="ed-data-table"><thead><tr><th>Outcome</th>';
        for (var mhi = 0; mhi < mkFields.length; mhi++) {
          tbl += '<th>' + escH(mkFields[mhi].label) + '</th>';
        }
        tbl += '</tr></thead><tbody>';
        for (var oi = 0; oi < outcomes.length; oi++) {
          tbl += '<tr><td class="ed-dl">' + escH(outLabels[oi]) + '</td>';
          for (var mfi = 0; mfi < mkFields.length; mfi++) {
            var v = outcomes[oi][mkFields[mfi].key];
            var fv = _formatDataValue(v, mkFields[mfi].key);
            var vc = fv === "\u2014" ? "ed-dv ed-dv-muted" : "ed-dv";
            tbl += '<td class="' + vc + '">' + fv + '</td>';
          }
          tbl += '</tr>';
        }
        tbl += '</tbody></table>';
      }
      result.innerHTML = tbl;
    }
    var allBoxes = body.querySelectorAll('input[type="checkbox"]');
    for (var cb = 0; cb < allBoxes.length; cb++) {
      allBoxes[cb].addEventListener("change", rebuildTable);
    }
    // Select All / Reset handlers — scoped to THIS grid's body.
    window._dgSelectAll = function(btn) {
      var b = btn.closest(".ed-data-grid-body");
      if (!b) return;
      var boxes = b.querySelectorAll('input[type="checkbox"]');
      for (var i = 0; i < boxes.length; i++) boxes[i].checked = true;
      rebuildTable();
    };
    window._dgReset = function(btn) {
      var b = btn.closest(".ed-data-grid-body");
      if (!b) return;
      var boxes = b.querySelectorAll('input[type="checkbox"]');
      for (var i = 0; i < boxes.length; i++) boxes[i].checked = false;
      rebuildTable();
    };
    rebuildTable();
  } catch (ex) {
    body.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:11px">Failed to load market data.</div>';
    console.error("hydrateMarketDataGrid error", ex);
  }
}

// Color palette for price-history chart lines.
var CHART_COLORS = [
  "#4caf50", "#f44336", "#ffd54f", "#4fc3f7",
  "#ba68c8", "#ff8a65", "#81c784", "#e57373",
];

// Map market_ticker to human-readable label for chart legend use.
function _outcomeLabels(outcomes) {
  var m = {};
  for (var i = 0; i < outcomes.length; i++) {
    if (outcomes[i] && outcomes[i].ticker) {
      m[outcomes[i].ticker] = outcomes[i].label || outcomes[i].ticker;
    }
  }
  return m;
}

// Build a single SVG with all market lines overlaid. Y axis is
// 0-100% (probability), X axis is 0 to full window width. Returns
// "" when no series has data.
function renderPriceChartSvg(series, hoursWindow, volume) {
  if (!series || !series.length) return "";
  // Determine global time bounds so every line shares an X scale.
  var tMin = Infinity, tMax = -Infinity;
  var totalPoints = 0;
  for (var i = 0; i < series.length; i++) {
    var pts = series[i].points || [];
    totalPoints += pts.length;
    for (var j = 0; j < pts.length; j++) {
      if (pts[j].t < tMin) tMin = pts[j].t;
      if (pts[j].t > tMax) tMax = pts[j].t;
    }
  }
  if (!isFinite(tMin) || !isFinite(tMax) || totalPoints === 0) return "";
  // If every point shares a timestamp (common right after a fresh
  // DB where only one flush has happened), artificially widen the
  // X range so we can still plot a meaningful current-price dot.
  // Shows the latest value on the right edge with the full window
  // extending to the left as empty space.
  if (tMin === tMax) {
    var windowMs = (hoursWindow || 24) * 3600000;
    tMin = tMax - windowMs;
  }
  // Are there any non-zero volume buckets? If yes, reserve a small
  // panel below the price chart for volume bars; otherwise the
  // chart uses the full vertical space as before.
  var hasVolume = Array.isArray(volume) && volume.some(function(b) { return b && b.v > 0; });
  var volH = hasVolume ? 40 : 0;       // height of volume panel
  var volGap = hasVolume ? 6 : 0;      // gap between panels
  var dateRowH = 20;                   // strip for the crosshair date
  var W = 900, H = 220 + volH + volGap + dateRowH;
  var padL = 32, padR = 42, padT = 12, padB = 22 + dateRowH;
  var w = W - padL - padR;
  var h = 220 - padT - padB;           // price-panel inner height
  function sx(t) { return padL + ((t - tMin) / (tMax - tMin)) * w; }
  function sy(p) { return padT + (1 - (p / 100)) * h; }
  // preserveAspectRatio="xMidYMid meet" keeps everything square
  // when the viewBox grows (adding the volume panel makes H
  // change, so an aspect-preserving scale is what we want).
  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '"'
          + ' class="ed-chart-svg"'
          + ' preserveAspectRatio="xMidYMid meet"'
          + ' style="width:100%;aspect-ratio:' + W + '/' + H + '">';
  // Horizontal gridlines at 0, 25, 50, 75, 100%
  var grid = [0, 25, 50, 75, 100];
  for (var gi = 0; gi < grid.length; gi++) {
    var g = grid[gi];
    var y = sy(g);
    svg += '<line x1="' + padL + '" y1="' + y + '" x2="' + (padL + w) + '" y2="' + y + '" stroke="#1a1a1a" stroke-width="1"/>';
    svg += '<text x="' + (padL - 6) + '" y="' + (y + 3) + '" fill="#555" font-size="9" text-anchor="end">' + g + '%</text>';
  }
  // Lines (and single-point dots when a series only has one sample).
  var _endLabels = [];
  for (var k = 0; k < series.length; k++) {
    var s = series[k];
    var pts2 = s.points || [];
    if (pts2.length === 0) continue;
    var color = CHART_COLORS[k % CHART_COLORS.length];
    if (pts2.length === 1) {
      // Single point — draw a filled dot at the current price so
      // the user sees the latest value even with zero history.
      var cx = sx(pts2[0].t);
      var cy = sy(pts2[0].p);
      svg += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1)
          + '" r="4" fill="' + color + '"/>';
      continue;
    }
    var d = "";
    for (var m = 0; m < pts2.length; m++) {
      d += (m === 0 ? "M" : "L") + sx(pts2[m].t).toFixed(1) + " " + sy(pts2[m].p).toFixed(1) + " ";
    }
    svg += '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round"/>';
    var lastPt = pts2[pts2.length - 1];
    _endLabels.push({
      x: sx(lastPt.t),
      y: sy(lastPt.p),
      label: Math.round(lastPt.p) + '%',
      color: color,
    });
  }
  // De-overlap end labels: sort by Y, push apart if too close.
  _endLabels.sort(function(a, b) { return a.y - b.y; });
  for (var eli = 1; eli < _endLabels.length; eli++) {
    var gap = _endLabels[eli].y - _endLabels[eli - 1].y;
    if (gap < 14) _endLabels[eli].y = _endLabels[eli - 1].y + 14;
  }
  for (var eli2 = 0; eli2 < _endLabels.length; eli2++) {
    var el = _endLabels[eli2];
    svg += '<circle cx="' + el.x.toFixed(1) + '" cy="' + sy(parseFloat(el.label)).toFixed(1)
        + '" r="3" fill="' + el.color + '"/>';
    svg += '<text x="' + (el.x + 6).toFixed(1) + '" y="' + (el.y + 4).toFixed(1)
        + '" fill="' + el.color + '" font-size="11" font-weight="700" font-family="inherit">'
        + el.label + '</text>';
  }
  // X-axis tick labels in AM/PM format at regular intervals.
  var firstDate = new Date(tMin);
  var lastDate  = new Date(tMax);
  var spanHours = (tMax - tMin) / 3600000;
  function fmtTick(d) {
    return d.toLocaleTimeString("en-US", {
      hour: "numeric", minute: "2-digit",
      timeZone: "America/New_York",
    });
  }
  function fmtTickLong(d) {
    return d.toLocaleDateString("en-US", {
      month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit",
      timeZone: "America/New_York",
    });
  }
  function fmtTickMonth(d) {
    return d.toLocaleDateString("en-US", {
      month: "short",
      timeZone: "America/New_York",
    });
  }
  function fmtTickMonthYear(d) {
    return d.toLocaleDateString("en-US", {
      month: "short", year: "numeric",
      timeZone: "America/New_York",
    });
  }
  // Volume bars underneath the price panel. Bars share the same X
  // scale as the price chart. Height is normalized per-chart so
  // the tallest bar always fills the panel.
  if (hasVolume) {
    var volTop = 220 + volGap;
    var volMax = 0;
    for (var vi = 0; vi < volume.length; vi++) {
      if (volume[vi].v > volMax) volMax = volume[vi].v;
    }
    // Approximate bar width = 80% of one bucket-span in px.
    var bucketSpan = (volume.length > 1)
      ? sx(volume[1].t) - sx(volume[0].t)
      : 4;
    var barW = Math.max(1.5, bucketSpan * 0.8);
    for (var vj = 0; vj < volume.length; vj++) {
      var b = volume[vj];
      if (!b.v) continue;
      var bh = volMax > 0 ? (b.v / volMax) * volH : 0;
      var bx = sx(b.t) - barW / 2;
      var by = volTop + (volH - bh);
      svg += '<rect x="' + bx.toFixed(1) + '" y="' + by.toFixed(1)
           + '" width="' + barW.toFixed(1) + '" height="' + bh.toFixed(1)
           + '" fill="#4fc3f7" fill-opacity="0.55"/>';
    }
    // Faint label on the volume panel so users know what it is.
    svg += '<text x="' + padL + '" y="' + (volTop + 10) + '" fill="#444" '
         + 'font-size="9" letter-spacing="0.3">VOLUME</text>';
  }
  // Render time ticks at regular intervals. For intraday charts
  // (<=6h) use 10-minute intervals; for longer use hourly or daily.
  var tickIntervalMs;
  if (spanHours <= 2) tickIntervalMs = 10 * 60000;          // 10 min
  else if (spanHours <= 8) tickIntervalMs = 30 * 60000;     // 30 min
  else if (spanHours <= 48) tickIntervalMs = 3600000;       // 1 hour
  else if (spanHours <= 168) tickIntervalMs = 86400000;     // 1 day (up to 7D)
  else if (spanHours <= 4320) tickIntervalMs = 30 * 86400000; // ~1 month (7D to 6M)
  else tickIntervalMs = 60 * 86400000;                       // ~2 months (1Y+)
  var tickStart = Math.ceil(tMin / tickIntervalMs) * tickIntervalMs;
  for (var tt = tickStart; tt <= tMax; tt += tickIntervalMs) {
    var tx = sx(tt);
    if (tx < padL + 30 || tx > padL + w - 30) continue;
    var tickLabel;
    if (spanHours > 2160) tickLabel = fmtTickMonthYear(new Date(tt));      // 3M+: "Jan 2026"
    else if (spanHours > 168) tickLabel = fmtTickMonth(new Date(tt));      // 7D+: "Jan"
    else if (spanHours > 36) tickLabel = fmtTickLong(new Date(tt));        // 2D-7D: "Jan 5, 3 PM"
    else tickLabel = fmtTick(new Date(tt));                                 // <2D: "3:00 PM"
    svg += '<text x="' + tx.toFixed(1) + '" y="' + (H - 6) + '" fill="#555" font-size="9" text-anchor="middle">' + tickLabel + '</text>';
  }
  // Hover layer — an invisible rect that catches pointer events
  // across the entire plot area. Paired with a vertical crosshair
  // line and per-series dots (all hidden by default, toggled on
  // mousemove). Tooltip lives outside the SVG for easy positioning.
  // Y position for the crosshair date label — sits in the
  // dedicated strip between the chart area and the static x-axis
  // labels. Centered vertically in that strip.
  var dateRowY = H - padB + dateRowH / 2 + 4;
  svg += '<g class="ed-chart-hover-group" style="display:none">';
  svg += '<line class="ed-chart-crosshair" x1="0" x2="0"'
       + ' y1="' + padT + '" y2="' + (H - padB + dateRowH) + '"'
       + ' stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>';
  for (var ci = 0; ci < series.length; ci++) {
    var ccolor = CHART_COLORS[ci % CHART_COLORS.length];
    svg += '<circle class="ed-chart-hover-dot" data-idx="' + ci + '"'
         + ' r="4" fill="' + ccolor + '" stroke="#000" stroke-width="1.5"/>';
  }
  // Background pill + text for the crosshair date.
  svg += '<rect class="ed-chart-date-bg" rx="3" ry="3"'
       + ' fill="#111" stroke="#333" stroke-width="0.5"'
       + ' x="0" y="' + (dateRowY - 10) + '"'
       + ' width="120" height="16"/>';
  svg += '<text class="ed-chart-date-text"'
       + ' x="0" y="' + dateRowY + '"'
       + ' fill="#999" font-size="10" text-anchor="middle"'
       + ' font-family="Helvetica,Arial,sans-serif"></text>';
  svg += '</g>';
  svg += '<rect class="ed-chart-hover-area"'
       + ' x="' + padL + '" y="' + padT + '"'
       + ' width="' + w + '" height="' + h + '"'
       + ' fill="transparent" pointer-events="all"'
       + ' style="cursor:crosshair"/>';
  svg += '</svg>';
  // Stash the scale data as JSON in a sibling script tag so the
  // hover handler can map mouse X back to a timestamp without
  // recomputing the scale. Lives outside the SVG so it's parsed
  // as HTML, not SVG.
  var meta = {
    padL: padL, padR: padR, padT: padT, padB: padB,
    W: W, H: H,
    priceH: h,  // inner height of JUST the price panel (excl. volume panel)
    dateRowY: dateRowY,
    tMin: tMin, tMax: tMax,
    series: series.map(function(s) {
      return {
        label: s.label || s.market_ticker,
        points: s.points,
      };
    }),
  };
  // IMPORTANT: the closing tag below must be split so the HTML
  // parser doesn't prematurely end the outer script block. See
  // the README entry on inline script escaping; do not write the
  // tag name contiguously anywhere in this source file (not even
  // in comments — the HTML parser scans them too).
  svg += '<scr' + 'ipt type="application/json" class="ed-chart-meta">'
       + JSON.stringify(meta).replace(/</g, "\\u003c")
       + '<\/scr' + 'ipt>';
  return svg;
}

// Attaches the hover handler to every rendered chart. Called after
// hydratePriceCharts updates body.innerHTML, because innerHTML
// replacement wipes previous listeners.
function wireChartHover(chartEl) {
  var svg = chartEl.querySelector(".ed-chart-svg");
  var area = chartEl.querySelector(".ed-chart-hover-area");
  var hoverG = chartEl.querySelector(".ed-chart-hover-group");
  var crosshair = chartEl.querySelector(".ed-chart-crosshair");
  var dots = chartEl.querySelectorAll(".ed-chart-hover-dot");
  var dateBg = chartEl.querySelector(".ed-chart-date-bg");
  var dateText = chartEl.querySelector(".ed-chart-date-text");
  var metaEl = chartEl.querySelector(".ed-chart-meta");
  if (!svg || !area || !hoverG || !metaEl) return;
  var meta;
  try { meta = JSON.parse(metaEl.textContent); } catch (e) { return; }
  function pickClosestPoint(points, t) {
    // Binary search could work but these arrays are small (<300).
    var best = null;
    var bestDelta = Infinity;
    for (var i = 0; i < points.length; i++) {
      var d = Math.abs(points[i].t - t);
      if (d < bestDelta) {
        bestDelta = d;
        best = points[i];
      }
    }
    return best;
  }
  // Container for per-series floating labels (one "BOT 52%" style
  // pill per outcome, positioned next to its crosshair dot).
  // Created lazily the first time mousemove fires.
  function getLabelsContainer() {
    var c = chartEl.querySelector(".ed-chart-crosshair-labels");
    if (!c) {
      c = document.createElement("div");
      c.className = "ed-chart-crosshair-labels";
      chartEl.appendChild(c);
    }
    return c;
  }
  // First 3 letters of the longest word in the outcome label,
  // uppercased. "Bayern Munich" → "BAY", "Racing Avellaneda" →
  // "AVE", "Tie" → "TIE". Gives an unambiguous short code for the
  // inline label without crowding the chart.
  function labelAbbreviation(label) {
    var words = (label || "").split(/\s+/).filter(Boolean);
    if (!words.length) return "???";
    // For multi-word labels prefer the first word — matches how
    // viewers typically refer to teams ("Bayern", "Racing", "Real").
    var w = words[0];
    return w.slice(0, 3).toUpperCase();
  }
  area.addEventListener("mousemove", function(ev) {
    var rect = svg.getBoundingClientRect();
    // SVG CSS dimensions → viewBox units conversion factors.
    var scaleX = rect.width  / meta.W;
    var scaleY = rect.height / meta.H;
    // Map mouse X → viewBox coords.
    var px = (ev.clientX - rect.left) / scaleX;
    var innerX = Math.max(meta.padL, Math.min(meta.W - meta.padR, px));
    var t = meta.tMin + ((innerX - meta.padL) / (meta.W - meta.padL - meta.padR)) * (meta.tMax - meta.tMin);
    crosshair.setAttribute("x1", innerX);
    crosshair.setAttribute("x2", innerX);
    // priceH is the inner height of just the price panel (excludes
    // optional volume panel below it).
    var h = meta.priceH != null ? meta.priceH : (meta.H - meta.padT - meta.padB);
    // Update the SVG date label in the dedicated strip between
    // the chart area and the static x-axis labels.
    var crosshairDate = new Date(t);
    var spanH = (meta.tMax - meta.tMin) / 3600000;
    var dateStr;
    if (spanH > 36) {
      dateStr = crosshairDate.toLocaleDateString("en-US", {
        month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit",
        timeZone: "America/New_York",
      });
    } else {
      dateStr = crosshairDate.toLocaleTimeString("en-US", {
        hour: "numeric", minute: "2-digit", second: "2-digit",
        timeZone: "America/New_York",
      });
    }
    if (dateText) {
      dateText.textContent = dateStr;
      dateText.setAttribute("x", innerX);
    }
    if (dateBg) {
      // Measure text width approx and center the pill.
      var bgW = dateStr.length * 6.5 + 12;
      dateBg.setAttribute("x", innerX - bgW / 2);
      dateBg.setAttribute("width", bgW);
    }
    var labelsHtml = '';
    for (var si = 0; si < meta.series.length; si++) {
      var s = meta.series[si];
      var pts = s.points || [];
      if (!pts.length || si >= dots.length) continue;
      var closest = pickClosestPoint(pts, t);
      if (!closest) { dots[si].setAttribute("r", "0"); continue; }
      var cxVB = meta.padL + ((closest.t - meta.tMin) / (meta.tMax - meta.tMin)) * (meta.W - meta.padL - meta.padR);
      var cyVB = meta.padT + (1 - (closest.p / 100)) * h;
      dots[si].setAttribute("cx", cxVB);
      dots[si].setAttribute("cy", cyVB);
      dots[si].setAttribute("r", "4");
      // Floating label positioned in CSS pixels relative to the
      // chart container. To the right of the dot for most cases;
      // flips to the left near the right edge of the chart.
      var color = CHART_COLORS[si % CHART_COLORS.length];
      var cssX = cxVB * scaleX;
      var cssY = cyVB * scaleY;
      var flip = cssX > rect.width - 70;
      var sideCls = flip ? " flip" : "";
      labelsHtml += '<div class="ed-cr-label' + sideCls + '"'
                 + ' style="left:' + cssX + 'px;top:' + cssY + 'px">'
                 + '<span class="ed-cr-abbr">' + escH(labelAbbreviation(s.label)) + '</span>'
                 + '<span class="ed-cr-val" style="color:' + color + '">'
                 + closest.p.toFixed(1) + '%</span>'
                 + '</div>';
    }
    hoverG.setAttribute("style", "display:inline");
    getLabelsContainer().innerHTML = labelsHtml;
  });
  area.addEventListener("mouseleave", function() {
    hoverG.setAttribute("style", "display:none");
    var c = chartEl.querySelector(".ed-chart-crosshair-labels");
    if (c) c.innerHTML = '';
  });
}

// Selectable timeframe windows for the price-history chart.
var CHART_TIMEFRAMES = [
  { key: "1h",  hours: 1,    label: "1H",  src: "db",    period: null },
  { key: "6h",  hours: 6,    label: "6H",  src: "db",    period: null },
  { key: "24h", hours: 24,   label: "24H", src: "kalshi", period: 60   },
  { key: "7d",  hours: 168,  label: "7D",  src: "kalshi", period: 1440 },
  { key: "30d", hours: 720,  label: "30D", src: "kalshi", period: 1440 },
  { key: "3m",  hours: 2160, label: "3M",  src: "kalshi", period: 1440 },
  { key: "6m",  hours: 4320, label: "6M",  src: "kalshi", period: 1440 },

// Build the chart section shown above the markets table.
// Includes placeholder while the /api/event/{ticker}/prices fetch
// is in flight, then replaces itself with the rendered chart +
// legend once data arrives. Timeframe toggle re-fires the fetch
// with a different `hours` param.
function renderPriceHistoryPanel(evTicker, outcomeLabels) {
  var tabs = '<div class="ed-chart-tabs">';
  for (var i = 0; i < CHART_TIMEFRAMES.length; i++) {
    var t = CHART_TIMEFRAMES[i];
    var active = t.key === "1h" ? " active" : "";
    tabs += '<button class="ed-chart-tab' + active + '" data-tf="' + t.key
         + '" data-hours="' + t.hours + '"'

         + '>' + t.label + '</button>';

       +   '<div class="ed-section-title" style="margin:0">Price history</div>'

       + '</div>'

}

// Timeframe tab click handler — updates the active button, stamps
// the new hours onto the chart container, wipes the hydrated flag
// so hydratePriceCharts() re-fetches with the new window.
window.switchChartTimeframe = function(btn) {
  var chart = btn.closest(".ed-chart");
  if (!chart) return;
  var tabs = chart.querySelectorAll(".ed-chart-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle("active", tabs[i] === btn);
  }
  chart.setAttribute("data-hours", btn.getAttribute("data-hours"));
  chart.setAttribute("data-src", btn.getAttribute("data-src") || "db");
  if (btn.getAttribute("data-period")) {
    chart.setAttribute("data-period", btn.getAttribute("data-period"));
  } else {
    chart.removeAttribute("data-period");
  }
  chart.removeAttribute("data-hydrated");
  var body = chart.querySelector(".ed-chart-body");
  if (body) body.innerHTML = '<div class="ed-chart-loading">Loading…</div>';
  hydratePriceCharts();
};

// Tracks the last time each chart (keyed by ticker) finished
// hydrating. Used by the "Live · updated Xs ago" indicator that
// ticks every second without triggering re-fetches.
var _chartLastUpdate = {};
// Live chart streaming: cache each rendered chart's series + hours so
// we can append a new point when a WebSocket tick arrives for any of
// its tickers. Redraws throttle at ~2 fps to avoid thrashing the SVG
// on busy markets.
var _liveChartCache = {};
var _liveChartSeq = 0;
var _liveChartRedrawTimer = null;
function _scheduleLiveChartRedraw() {
  if (_liveChartRedrawTimer) return;
  _liveChartRedrawTimer = setTimeout(function() {
    _liveChartRedrawTimer = null;
    Object.keys(_liveChartCache).forEach(function(id) {
      var c = _liveChartCache[id];
      if (!c || !c.dirty) return;
      c.dirty = false;
      var body = c.el.querySelector(".ed-chart-body");
      if (!body) return;
      // Update the legend values for every window, regardless of
      // whether we redraw the SVG.
      var legendItems = body.querySelectorAll(".ed-chart-legend-item");
      for (var s = 0; s < c.series.length; s++) {
        var ser = c.series[s];
        if (!ser.points || !ser.points.length) continue;
        ser.last = ser.points[ser.points.length - 1].p;
        var item = legendItems[s];
        if (item) {
          var valEl = item.querySelector(".ed-chart-legend-val");
          if (valEl) valEl.textContent = ser.last.toFixed(0) + "¢";
          var delta = ser.last - ser.first;
          var dEl = item.querySelector(".ed-chart-legend-delta");
          if (dEl) {
            dEl.textContent = (delta >= 0 ? "+" : "") + delta.toFixed(0) + "¢";
            dEl.classList.remove("up", "down");
            dEl.classList.add(delta >= 0 ? "up" : "down");
          }
        }
      }
      if (c.allowRedraw) {
        // For short windows, redraw the SVG in place so the line
        // extends to the new tick. We preserve the legend DOM that
        // we just mutated by only swapping the SVG child.
        var newSvg = renderPriceChartSvg(c.series, c.hours, c.volume);
        var oldSvg = body.querySelector("svg");
        if (newSvg && oldSvg) {
          var tmp = document.createElement("div");
          tmp.innerHTML = newSvg;
          oldSvg.replaceWith(tmp.firstChild);
          wireChartHover(c.el);
        }
      }
    });
  }, 500);
}

// On every WebSocket tick, find any chart that plots this ticker
// and append a new point. Registered below where PriceStream is
// defined so the symbol order works.
function _liveChartOnTick(ticker, data) {
  if (window._mkPaused) return;
  // Use last_price for chart points (same as Markets table Probability).
  // Normalize to YES perspective. Fall back to bid/ask midpoint.
  var chartPrice = null;
  if (data.last_price != null) {
    var lp = data.last_price;
    var ref = data.yes_bid;
    if (ref == null) {
      // Try stored LIVE_PRICES via the row's YES cell
      var r = document.querySelector('tr[data-mk-row="' + ticker + '"]');
      if (r) { var yc = r.querySelector('[data-mk-field="yes"]'); if (yc) { var pp = parseInt(yc.textContent.split('/').pop()); if (!isNaN(pp)) ref = pp; } }
    }
    if (ref != null) {
      var fl = 100 - lp;
      if (Math.abs(fl - ref) < Math.abs(lp - ref)) lp = fl;
    }
    chartPrice = Math.round(lp);
  } else if (data.yes_bid != null && data.yes_ask != null) {
    chartPrice = Math.round((data.yes_bid + data.yes_ask) / 2);
  }
  if (chartPrice == null) return;
  var nowMs = Date.now();
  Object.keys(_liveChartCache).forEach(function(id) {
    var c = _liveChartCache[id];
    if (!c) return;
    for (var i = 0; i < c.series.length; i++) {
      var ser = c.series[i];
      if (ser.market_ticker !== ticker) continue;
      ser.points = ser.points || [];
      var lastPt = ser.points[ser.points.length - 1];
      if (lastPt && lastPt.p === chartPrice && (nowMs - lastPt.t) < 2000) return;
      ser.points.push({t: nowMs, p: chartPrice});
      if (ser.points.length > 3000) ser.points.splice(0, ser.points.length - 3000);
      c.dirty = true;
    }
  });
  _scheduleLiveChartRedraw();
}

// Auto-refresh every 30 seconds: re-hydrate any chart that's
// currently in the DOM. Skips when the detail page is hidden to
// avoid wasting /api/event/.../prices calls while user navigated
// away.
setInterval(function() {
  var ed = document.getElementById("event-detail");
  if (!ed || ed.style.display === "none") return;
  var charts = document.querySelectorAll(".ed-chart");
  if (!charts.length) return;
  for (var i = 0; i < charts.length; i++) {
    charts[i].removeAttribute("data-hydrated");
  }
  hydratePriceCharts();
}, 30000);

// Updates every "Live · updated Xs ago" timestamp in place once
// per second, without re-fetching anything. Keeps the UI feeling
// alive between auto-refreshes.
setInterval(function() {
  var live = document.querySelectorAll(".ed-chart-live-text");
  for (var i = 0; i < live.length; i++) {
    var chart = live[i].closest(".ed-chart");
    if (!chart) continue;
    var ticker = chart.getAttribute("data-ticker");
    var last = _chartLastUpdate[ticker];
    if (!last) {
      live[i].textContent = "Live";
      continue;
    }
    var age = Math.round((Date.now() - last) / 1000);
    live[i].textContent = "Live · updated " + age + "s ago";
  }
}, 1000);

// Fetch + populate every .ed-chart placeholder currently in the DOM.
// Called after the detail page renders so the chart appears after
// a brief loading state without blocking the rest of the page.
async function hydratePriceCharts() {
  var placeholders = document.querySelectorAll(".ed-chart");
  for (var i = 0; i < placeholders.length; i++) {
    var el = placeholders[i];
    if (el.dataset.hydrated) continue;
    el.dataset.hydrated = "1";
    var tkr = el.getAttribute("data-ticker");
    var hours = parseInt(el.getAttribute("data-hours") || "1", 10);
    var src = el.getAttribute("data-src") || "db";
    var period = el.getAttribute("data-period");
    // Wire up tab handlers (idempotent — only bind once per tab).
    var tabs = el.querySelectorAll(".ed-chart-tab");
    for (var ti = 0; ti < tabs.length; ti++) {
      if (!tabs[ti].dataset.bound) {
        tabs[ti].dataset.bound = "1";
        tabs[ti].addEventListener("click", function() {
          window.switchChartTimeframe(this);
        });
      }
    }
    var labels = {};
    try { labels = JSON.parse(el.getAttribute("data-labels") || "{}"); } catch (e) {}
    try {
      // Pick the right endpoint: real-time DB data for short
      // windows (1H, 6H), Kalshi historical API for long ones
      // (24H, 7D, 30D) where our DB has no data.
      var fetchUrl;
      if (src === "kalshi") {
        fetchUrl = "/api/event/" + encodeURIComponent(tkr)
                 + "/history?hours=" + hours
                 + (period ? "&period=" + period : "");
      } else {
        fetchUrl = "/api/event/" + encodeURIComponent(tkr)
                 + "/prices?hours=" + hours;
      }
      var r = await fetch(fetchUrl);
      var d = await r.json();
      var series = d.series || [];
      // Attach labels to each series for the legend. The Kalshi
      // history endpoint already includes labels from the cache;
      // the DB prices endpoint doesn't — use the stashed map.
      for (var j = 0; j < series.length; j++) {
        if (!series[j].label) {
          series[j].label = labels[series[j].market_ticker] || series[j].market_ticker;
        }
      }
      var body = el.querySelector(".ed-chart-body");
      if (!series.length) {
        // Different empty-state copy depending on why we got no
        // series — easier to diagnose from a glance at the page.
        var msg;
        if (d.transient) {
          // Postgres is restarting / in recovery — not a bug,
          // just retry in a moment. Auto-retry once after 30s.
          msg = "Price history is momentarily unavailable (database "
              + "is restarting). Retrying in 30 seconds…";
          setTimeout(function(elRef) {
            return function() {
              elRef.removeAttribute("data-hydrated");
              hydratePriceCharts();
            };
          }(el), 30000);
        } else if (d.note) {
          msg = d.note;
        } else if (d.error) {
          msg = "Failed to load price history: " + d.error;
        } else if (hours <= 6) {
          msg = "No price history recorded for the last " + hours
              + "h yet. Try a longer window (24H or 7D).";
        } else {
          msg = "No price history recorded yet for this event. "
              + "Data starts accumulating as soon as the market "
              + "is tracked — check back shortly.";
        }
        body.innerHTML = '<div class="ed-chart-empty">' + escH(msg) + '</div>';
        continue;
      }
      var svg = renderPriceChartSvg(series, hours, d.volume);
      if (!svg) {
        body.innerHTML = '<div class="ed-chart-empty">Price history is just starting to record for this event. The chart will fill in over the next few minutes as more snapshots arrive — try again shortly.</div>';
        continue;
      }
      var legend = '<div class="ed-chart-legend">';
      for (var s = 0; s < series.length; s++) {
        var color = CHART_COLORS[s % CHART_COLORS.length];
        var curr = series[s].last;
        var delta = (series[s].last - series[s].first);
        var deltaText = (delta >= 0 ? "+" : "") + delta.toFixed(0) + "¢";
        var deltaCls = delta >= 0 ? "up" : "down";
        legend += '<div class="ed-chart-legend-item">';
        legend += '<span class="ed-chart-swatch" style="background:' + color + '"></span>';
        legend += '<span class="ed-chart-legend-label">' + escH(series[s].label) + '</span>';
        legend += '<span class="ed-chart-legend-val">' + curr.toFixed(0) + '¢</span>';
        legend += '<span class="ed-chart-legend-delta ' + deltaCls + '">' + deltaText + '</span>';
        legend += '</div>';
      }
      legend += '</div>';
      body.innerHTML = svg + legend;
      _chartLastUpdate[tkr] = Date.now();
      // Cache the series for live streaming — only for short windows
      // where each new tick is visually meaningful. For 24H+ windows
      // we still update the legend value/delta without redrawing the
      // line (cheap, and a single tick on a day-long chart is a
      // rounding error).
      _liveChartCache[el.id || (el.id = "ed-chart-" + (++_liveChartSeq))] = {
        el: el,
        series: series,
        hours: hours,
        volume: d.volume,
        allowRedraw: hours <= 6,
        dirty: false,
      };
      // Wire the hover crosshair/tooltip on every fresh render —
      // innerHTML replacement wiped the previous listeners.
      wireChartHover(el);
    } catch (ex) {
      var body2 = el.querySelector(".ed-chart-body");
      if (body2) body2.innerHTML = '<div class="ed-chart-empty">Failed to load price history.</div>';
      console.error("hydratePriceCharts error", ex);
    }
  }
}

// Markets section title with an optional "LIVE" pill. Surfaces
// the live-game state at the section level so the table rows
// themselves stay neutral — previously we put a red dot on row 0
// which looked like it was singling out a specific outcome.

// Compute per-row "indicator" based on the live state — used only
// for tennis right now, where we show a green dot on the player
// who's currently serving. Returns a map of row-index → HTML
// snippet. For non-tennis events, returns an empty map so no
// indicator is rendered.
function marketRowIndicators(markets, live) {
  var out = {};
  if (!live || !live.tennis) return out;
  var tennis = live.tennis;
  var server = tennis.server;  // "row1" | "row2" | ""
  if (!server) return out;
  var serverName = server === "row1" ? tennis.row1_name : tennis.row2_name;
  if (!serverName) return out;
  // Try to find the market row whose label overlaps with the
  // serving player's name. Tennis outcomes are usually labeled
  // with the player's full name (e.g. "Carlos Alcaraz") while
  // SofaScore uses "Alcaraz C." or similar — compare on the last
  // name (longest token) which should be stable across sources.
  var serverLast = serverName.split(/[\s.,]+/).filter(function(w) { return w.length > 2; })
    .sort(function(a, b) { return b.length - a.length; })[0];
  if (!serverLast) return out;
  serverLast = serverLast.toLowerCase();
  for (var i = 0; i < markets.length; i++) {
    var label = (markets[i].label || "").toLowerCase();
    if (label.indexOf(serverLast) >= 0) {
      out[i] = '<span class="ed-mk-indicator" title="Currently serving">\u25CF</span>';
      break;  // only one server at a time
    }
  }
  return out;
}

function renderMarketsTable(markets, live) {
  if (!markets || !markets.length) {
    return '<div style="color:var(--text-muted);padding:20px;text-align:center">No markets.</div>';

  var h = '<table class="ed-markets-table"><thead><tr>';
  h += '<th>Outcome</th>';

  h += '<th style="text-align:center">Yes</th>';
  h += '<th style="text-align:center">No</th>';
  h += '<th style="text-align:center">Last</th>';
  h += '<th style="text-align:center">24h Vol</th>';
  h += '<th style="text-align:center">Volume</th>';
  h += '<th style="text-align:center">OI</th>';
  h += '</tr></thead><tbody>';
  for (var i = 0; i < markets.length; i++) {
    var m = markets[i];
    var tk = m.ticker || "";
    h += '<tr data-mk-row="' + escH(tk) + '">';
    h += '<td class="ed-mk-label" data-mk-ticker="' + escH(tk) + '" data-mk-label="' + escH(m.label || "") + '" onclick="window.openOrderbook(this)">'
       + (indicators[i] || '') + escH(m.label)

    h += '<td class="ed-no" data-mk-field="no">' + escH(m.no) + '</td>';

    h += '<td class="ed-num" data-mk-field="vol24" data-raw="' + (m.volume_24h != null ? m.volume_24h : '') + '">' + fmtNum(m.volume_24h) + '</td>';
    h += '<td class="ed-num" data-mk-field="vol" data-raw="' + (m.volume != null ? m.volume : '') + '">' + fmtNum(m.volume) + '</td>';
    h += '<td class="ed-num" data-mk-field="oi" data-raw="' + (m.open_interest != null ? m.open_interest : '') + '">' + fmtNum(m.open_interest) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}

function summaryStats(markets) {
  // Aggregate volume / OI / liquidity across every market in the
  // current group so the top-line "event level" stats give users
  // a quick read on overall activity.
  var totVol = 0, tot24 = 0, totOI = 0, nMarkets = 0;
  for (var i = 0; i < markets.length; i++) {
    var m = markets[i];
    if (m.volume != null) totVol += m.volume;
    if (m.volume_24h != null) tot24 += m.volume_24h;
    if (m.open_interest != null) totOI += m.open_interest;
    nMarkets += 1;
  }
  var h = '<div class="ed-summary">';
  h += '<div class="ed-stat"><div class="ed-stat-label">Markets</div><div class="ed-stat-val" data-sum="markets">' + nMarkets + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">24h Volume</div><div class="ed-stat-val" data-sum="vol24">' + fmtNum(tot24) + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">Total Volume</div><div class="ed-stat-val" data-sum="vol">' + fmtNum(totVol) + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">Open Interest</div><div class="ed-stat-val" data-sum="oi">' + fmtNum(totOI) + '</div></div>';
  h += '</div>';
  return h;
}

// Recompute the Markets summary stats (24h Volume, Total Volume,
// Open Interest) from the current Markets table. Called whenever a
// WebSocket price tick updates a row's volume so the aggregates at
// the top of the event page don't lag behind.
function _recomputeSummaryStats() {
  var rows = document.querySelectorAll(".ed-markets-table tbody tr[data-mk-row]");
  if (!rows.length) return;
  var tot24 = 0, totVol = 0, totOI = 0;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var c24 = r.querySelector('[data-mk-field="vol24"]');
    var cVol = r.querySelector('[data-mk-field="vol"]');
    var cOI = r.querySelector('[data-mk-field="oi"]');
    if (c24 && c24.dataset.raw) tot24 += parseFloat(c24.dataset.raw) || 0;
    if (cVol && cVol.dataset.raw) totVol += parseFloat(cVol.dataset.raw) || 0;
    if (cOI && cOI.dataset.raw) totOI += parseFloat(cOI.dataset.raw) || 0;
  }
  var set = function(key, val) {
    var el = document.querySelector('[data-sum="' + key + '"]');
    if (el) el.textContent = fmtNum(val);
  };
  set("vol24", tot24);
  set("vol", totVol);
  set("oi", totOI);
}

// renderStatsSidebar() removed \u2014 the per-event stats panel now
// lives inside the Detailed Event Stats collapsible above
// ed-layout, not in a fixed-position sidebar.

// FlashLive capability map, fetched once per page load and cached.
// Drives which detail-page tabs/sub-tabs we render per sport so the
// layout matches whatever FlashLive (and therefore FlashScore) actually
// exposes for that sport — Tennis hides STANDINGS, Hockey hides
// Top Scorers, etc. Falls back to the generous default if the fetch
// fails so we never silently strip the UI down to nothing.
var _flCaps = null;
var _flCapsPromise = null;
function fetchCapabilities() {
  if (_flCaps) return Promise.resolve(_flCaps);
  if (_flCapsPromise) return _flCapsPromise;
  _flCapsPromise = fetch("/api/debug_fl_capabilities")
    .then(function(r) { return r.json(); })
    .then(function(j) {
      _flCaps = (j && j.sports) ? j.sports : {};
      return _flCaps;
    })
    .catch(function() { _flCaps = {}; return _flCaps; });
  return _flCapsPromise;
}
function _capEpAvailable(sportCaps, epPath) {
  // Returns true when we have no data for this sport (graceful fallback
  // to the generous default), or when the endpoint reports available.
  if (!sportCaps) return true;
  var ep = (sportCaps.endpoints || {})[epPath];
  if (!ep) return true;
  return !!ep.available;
}
function _capStandingTypes(sportCaps, sportName) {
  // Fully data-driven. /api/debug_fl_capabilities probes every
  // standing_type per sport and reports which ones FlashLive returns
  // rows for in `values_with_data` — that's ground truth for what to
  // render. Tennis tournaments expose `["draw"]` (the bracket); soccer
  // leagues expose `["overall","home","away","form","top_scores"]`;
  // soccer cups add `"draw"`; sports with no league/bracket data at all
  // (Golf, Motorsport) end up with `available:false`.
  //
  // Fallback to the canonical team-sport defaults only when sportCaps
  // is missing entirely (cap-scan hasn't reached this sport yet) — an

    // ════════════════════════════════════════════════════
    if (hasNews) {
      h += '<div class="ed-sb-main" data-main="news">';
      h += '<div class="ed-sb-lazy" data-lazy="news">Loading news…</div>';
      h += '</div>';
    }

    panel.innerHTML = h;
    // Hand the Summary timeline off to the TS bundle when available —
    // it reads /normalized.data.incidents, which shares the cross-block
    // 5-min cache. Fallback: the inline timeline above already rendered
    // from /stats, so users on a stale/legacy bundle still see content.
    //
    // CRITICAL: query for `div[data-mt="summary"]` not `[data-mt="summary"]`
    // — the sub-tab button ALSO has data-mt="summary" and comes earlier
    // in DOM order, so a bare attribute selector hits the button and we'd
    // end up writing the timeline HTML inside the button (visible as an
    // unmovable "1st Half" stub above the sub-tab strip that persists
    // across tab switches).
    if (window.StochverseBundle && window.StochverseBundle.renderSummary) {
      var sumMount = panel.querySelector('div[data-mt="summary"]');
      if (sumMount) {
        try { window.StochverseBundle.renderSummary(evTicker, sumMount); }
        catch (e) { /* keep the inline render as fallback */ }
      }
    }
    // Async per-event capability probe — sport-level cap-scan only
    // samples 2 events per sport every 24 h, so a tennis match with a
    // published bracket can be missed if neither sample happened to
    // expose `draw`. The per-event probe knows authoritatively for
    // this specific match. We don't block hydration on it (it fires
    // 17 parallel FlashLive calls and adds 200-500 ms) — fire it
    // after the panel renders and upgrade the tab strip if it
    // surfaces standing types the sport-level cap-scan missed.
    _augmentEventCapabilities(panel, evTicker, stTypes);
  } catch (ex) {
    panel.innerHTML = '<div class="ed-stats-loading">Failed to load game stats.</div>';
    console.error("hydrateGameStats error", ex);
  }
}

// Inject MATCH sub-tabs based on per-event capabilities. Pulled out
// of _augmentEventCapabilities so it runs UNCONDITIONALLY (the
// standings logic in that function has early-returns that used to
// short-circuit this block — caused commit dfa7976's bundle bump
// to ship without the new tabs ever appearing). Each tab is a
// no-op if its panel/button already exists, so calling repeatedly
// is safe.
function _injectMatchCapabilityTabs(panel, caps) {
  var matchPanelForCaps = panel.querySelector('.ed-sb-main[data-main="match"]');
  if (!matchPanelForCaps) return;
  // Player Stats — top-tier league events only (probe v4)
  if (caps.player_stats === true) {
    var subTabsBar = matchPanelForCaps.querySelector('.ed-sb-sub-tabs');
    if (subTabsBar && !subTabsBar.querySelector('button[data-mt="player-stats"]')) {
      var psBtn = '<button class="ed-sb-tab" data-mt="player-stats" onclick="window.switchMatchTab(this)">Player Stats</button>';
      var anchor = subTabsBar.querySelector('button[data-mt="commentary"]')
                || subTabsBar.querySelector('button[data-mt="missing-players"]');
      if (anchor) anchor.insertAdjacentHTML('beforebegin', psBtn);
      else subTabsBar.insertAdjacentHTML('beforeend', psBtn);
    }
    if (!matchPanelForCaps.querySelector('div[data-mt="player-stats"]')) {
      var psPanel = '<div data-mt="player-stats" style="display:none">'
                  + '<div class="ed-sb-lazy" data-lazy="player-stats">Loading player stats…</div>'
                  + '</div>';
      matchPanelForCaps.insertAdjacentHTML('beforeend', psPanel);
    }
  }
  // Predicted Lineups — pre-match expected XI, universal across
  // team sports per probe v2 inventory.
  if (caps.predicted_lineups === true) {
    var subTabsBar2 = matchPanelForCaps.querySelector('.ed-sb-sub-tabs');
    if (subTabsBar2 && !subTabsBar2.querySelector('button[data-mt="predicted-lineups"]')) {
      var plBtn = '<button class="ed-sb-tab" data-mt="predicted-lineups" onclick="window.switchMatchTab(this)">Predicted</button>';
      var plAnchor = subTabsBar2.querySelector('button[data-mt="player-stats"]')
                  || subTabsBar2.querySelector('button[data-mt="commentary"]')
                  || subTabsBar2.querySelector('button[data-mt="missing-players"]');
      if (plAnchor) plAnchor.insertAdjacentHTML('beforebegin', plBtn);

  // Highlights — Soccer / Cricket / Aussie Rules / Rugby League
  if (caps.highlights === true) {
    var subTabsBar3 = matchPanelForCaps.querySelector('.ed-sb-sub-tabs');
    if (subTabsBar3 && !subTabsBar3.querySelector('button[data-mt="highlights"]')) {

      subTabsBar3.insertAdjacentHTML('beforeend', hlBtn);
    }
    if (!matchPanelForCaps.querySelector('div[data-mt="highlights"]')) {
      var hlPanel = '<div data-mt="highlights" style="display:none">'
                  + '<div class="ed-sb-lazy" data-lazy="highlights">Loading highlights…</div>'
                  + '</div>';
      matchPanelForCaps.insertAdjacentHTML('beforeend', hlPanel);
    }
  }
  // Points History — Tennis primary, also Basketball / Handball /
  // Volleyball / Snooker / Beach Volleyball / Aussie Rules.
  if (caps.points_history === true) {
    var subTabsBar4 = matchPanelForCaps.querySelector('.ed-sb-sub-tabs');
    if (subTabsBar4 && !subTabsBar4.querySelector('button[data-mt="points-history"]')) {
      var phBtn = '<button class="ed-sb-tab" data-mt="points-history" onclick="window.switchMatchTab(this)">Points</button>';
      var phAnchor = subTabsBar4.querySelector('button[data-mt="highlights"]')
                  || subTabsBar4.querySelector('button[data-mt="commentary"]')
                  || subTabsBar4.querySelector('button[data-mt="missing-players"]');
      if (phAnchor) phAnchor.insertAdjacentHTML('beforebegin', phBtn);
      else subTabsBar4.insertAdjacentHTML('beforeend', phBtn);
    }
    if (!matchPanelForCaps.querySelector('div[data-mt="points-history"]')) {
      var phPanel = '<div data-mt="points-history" style="display:none">'
                  + '<div class="ed-sb-lazy" data-lazy="points-history">Loading points…</div>'
                  + '</div>';
      matchPanelForCaps.insertAdjacentHTML('beforeend', phPanel);
    }
  }
  // Darts — combined statistics-alt + throw-by-throw
  if (caps.darts_stats === true || caps.throw_by_throw === true) {
    var subTabsBar5 = matchPanelForCaps.querySelector('.ed-sb-sub-tabs');
    if (subTabsBar5 && !subTabsBar5.querySelector('button[data-mt="darts"]')) {

                 + '</div>';
      matchPanelForCaps.insertAdjacentHTML('beforeend', gPanel);
