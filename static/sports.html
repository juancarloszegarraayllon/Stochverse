async function loadEvents() {
  const sid = activeSportId();
  const col1 = document.getElementById('sp-c1-list');
  const col2 = document.getElementById('sp-col2');
  col1.innerHTML = '<div style="padding:24px 14px;color:var(--text-muted);font-size:12px;text-align:center">Loading…</div>';
  col2.innerHTML = '<div class="sp-c2-empty">Loading events…</div>';
  // Capture diagnostic context outside try so the catch handler can
  // show HTTP status + a snippet of the response body. The previous
  // generic 'Failed to load events.' hid the actual failure and made
  // the bug undebuggable from the user side.
  let _httpStatus = null;
  let _bodySnippet = '';
  try {
    // Phase 2b: use the merged feed endpoint instead of raw FL list.
    // Response: {tournaments: [{TOURNAMENT_STAGE_ID, NAME, COUNTRY_NAME,
    //   events: [{...FL fields..., kalshi: {event_ticker} | null}]}]}.
    // Each event carries a .kalshi field — rich (matched market) vs
    // lite (FL-only, no markets yet).
    // Feature flags (URL query, mutually-exclusive — v3 wins if both):
    //   ?v3=1 → registry-based handler (Phase C2c-c2). Strict-date
    //           matching with timezone-aware local_date. Most correct.
    //   ?v2=1 → identity-based handler (kalshi_join). Pre-registry.
    //   default → v1 (legacy fuzzy-match handler).
    const _qs = new URLSearchParams(window.location.search);
    const _useV3 = _qs.get('v3') === '1';
    const _useV2 = !_useV3 && _qs.get('v2') === '1';
    const _vQs = _useV3 ? '&v=3' : (_useV2 ? '&v=2' : '');
    const r = await fetch('/api/sports/' + sid + '/feed?indent_days=' + _indentDays + _vQs);
    _httpStatus = r.status;
    const text = await r.text();
    _bodySnippet = (text || '').slice(0, 240);
    let json;
    try { json = JSON.parse(text); }
    catch (_pe) { throw new Error('non-JSON body'); }
    if (!r.ok) {
      throw new Error('HTTP ' + r.status);
    }
    if (json.error) {
      col2.innerHTML = '<div class="sp-c2-empty">' + escH(json.error) + '</div>';
      col1.innerHTML = '';
      return;
    }
    _eventsCache = json.tournaments || [];
    _matchedKalshiCount = json.matched_kalshi_count || 0;
    renderCol1();
    renderCol2();
  } catch (e) {
    console.error('[sports] feed load failed', {
      sid, status: _httpStatus, err: e && e.message,
      snippet: _bodySnippet,
    });
    const detail = (_httpStatus ? 'HTTP ' + _httpStatus : (e && e.message || 'fetch error'))
                 + (_bodySnippet ? ' — ' + _bodySnippet : '');
    col2.innerHTML = '<div class="sp-c2-empty" style="color:var(--red);white-space:pre-wrap">'
                   + 'Failed to load events.\n' + escH(detail) + '</div>';
    col1.innerHTML = '';
  }
}

function eventState(ev) {
  // STAGE_TYPE: SCHEDULED | LIVE | FINISHED. Falls back to
  // STAGE if not present (older payloads). Anything starting
  // with HALF/SET/QUARTER/INNING/PERIOD/EXTRA is live.
  const t = (ev.STAGE_TYPE || '').toUpperCase();
  // Synthetic Kalshi-only events have STAGE_TYPE hardcoded to
  // SCHEDULED (no FL state to flip them LIVE/FINISHED). Without
  // a time-derived override they'd be eaten by the Live filter
  // as soon as the game clock starts. Use START_TIME relative to
  // now: pre-kickoff = upcoming, within ~3h post-kickoff = live,
  // past that = finished. ~3h covers soccer comfortably and is
  // a permissive cap for other sports.
  if (ev._kalshi_h2h_only && t === 'SCHEDULED') {
    const ts = ev.START_TIME || ev.START_UTIME;
    if (ts) {
      const now = Date.now() / 1000;
      const elapsed = now - ts;
      if (elapsed < 0) return 'upcoming';
      if (elapsed < 3 * 3600) return 'live';
      return 'finished';
    }
    return 'upcoming';
  }
  if (t === 'LIVE') return 'live';
  if (t === 'FINISHED') return 'finished';
  if (t === 'SCHEDULED') return 'upcoming';
  return (ev.STAGE || '').toUpperCase().match(/HALF|SET|QUARTER|INNING|PERIOD|EXTRA|LIVE/)
    ? 'live' : 'upcoming';
}

function passesStateFilter(ev) {
  if (_activeStateFilter !== 'all' && eventState(ev) !== _activeStateFilter) {
    return false;
  }
  // 'On Kalshi' filter — toggled by clicking the summary pill.
  // When active, drops all FL-only (lite) events from the list.
  if (_onlyMatched && !(ev.kalshi && ev.kalshi.event_ticker)) {
    return false;
  }
  return true;
}

function passesDateFilter(ev) {
  // Date filter — compares the event's USER-LOCAL date to
  // (today + _indentDays) in the user's browser timezone. Without
  // this, the backend's UTC-based bucket leaks late-evening US
  // games into the next day's view (a 9 PM PT game = next-day UTC,
  // shows up under "Tomorrow" even though it's tonight in the
  // user's tz). Outrights and FL events without START_TIME are
  // always allowed through (they're date-independent).
  const ts = ev.START_TIME || ev.START_UTIME;
  if (!ts) return true;
  const evDate = new Date(ts * 1000);
  const target = new Date();
  target.setDate(target.getDate() + _indentDays);
  return evDate.getFullYear() === target.getFullYear() &&
         evDate.getMonth() === target.getMonth() &&
         evDate.getDate() === target.getDate();
}

function passesAllFilters(ev) {
  return passesStateFilter(ev) && passesDateFilter(ev);
}

function renderCol1() {
  const col1 = document.getElementById('sp-c1-list');
  if (!_eventsCache || !_eventsCache.length) {
    col1.innerHTML = '<div style="padding:24px 14px;color:var(--text-muted);font-size:12px;text-align:center">No leagues today.</div>';
    return;
  }
  // Group leagues by country (Sofascore-style). Each country gets
  // its own section header; leagues nest under. Eliminates the
  // repetitive 'ARGENTINA' subtitle on every row when the same
  // country has many leagues active.
  const byCountry = {};
  let totalEvents = 0;
  for (const t of _eventsCache) {
    const evs = (t.events || t.EVENTS || []).filter(passesAllFilters);
    if (!evs.length) continue;
    const country = bucketCountry(t);
    const leagueName = leagueDisplayName(t);
    totalEvents += evs.length;
    if (!byCountry[country]) byCountry[country] = [];
    byCountry[country].push({
      stageId: t.TOURNAMENT_STAGE_ID || '',
      name: leagueName,
      count: evs.length,
    });
  }

  let html = '';
  // 'All leagues' pseudo-entry at top (no country wrapper).
  const allCls = 'sp-c1-league sp-c1-all' + (_activeLeagueFilter == null ? ' active' : '');
  html += '<div class="' + allCls + '" data-stage-id="">';
  html += '<div class="sp-c1-league-info">';
  html += '<span class="sp-c1-league-name">All leagues</span>';
  html += '</div>';
  html += '<span class="sp-c1-league-count">' + totalEvents + '</span>';
  html += '</div>';

  // Country sections — alphabetical, each with its own collapsible
  // header. Leagues within a country sorted alphabetically too.
  // 'Outrights' is special-cased to the BOTTOM so live games take
  // priority in the user's eye-line; outright/season futures
  // (Champions League Winner, Super Bowl Winner, MVP) drop below.
  const countries = Object.keys(byCountry).sort();
  const orIdx = countries.indexOf('Outrights');
  if (orIdx !== -1) {
    countries.splice(orIdx, 1);
    countries.push('Outrights');
  }
  for (const country of countries) {
    const leagues = byCountry[country].sort((a, b) => a.name.localeCompare(b.name));
    const collapsed = _collapsedCountries.has(country);
    const total = leagues.reduce((s, l) => s + l.count, 0);
    const cls = 'sp-c1-country' + (collapsed ? ' collapsed' : '');
    html += '<div class="' + cls + '" data-country="' + escH(country) + '">';
    html += '<span class="sp-c1-country-arrow">▾</span>';
    html += '<span class="sp-c1-country-name">' + escH(country) + '</span>';
    html += '<span class="sp-c1-country-count">' + total + '</span>';
    html += '</div>';
    if (!collapsed) {
      for (const l of leagues) {
        const lcls = 'sp-c1-league' + (_activeLeagueFilter === l.stageId ? ' active' : '');
        html += '<div class="' + lcls + '" data-stage-id="' + escH(l.stageId) + '">';
        html += '<div class="sp-c1-league-info">';
        html += '<span class="sp-c1-league-name">' + escH(l.name) + '</span>';
        html += '</div>';
        html += '<span class="sp-c1-league-count">' + l.count + '</span>';
        html += '</div>';
      }
    }
  }
  col1.innerHTML = html;
  // Country header → toggle collapse
  col1.querySelectorAll('.sp-c1-country').forEach(el => {
    el.addEventListener('click', () => {
      const c = el.dataset.country;
      if (_collapsedCountries.has(c)) _collapsedCountries.delete(c);
      else _collapsedCountries.add(c);
      renderCol1();
    });
  });
  // League click → filter COL 2
  col1.querySelectorAll('.sp-c1-league').forEach(el => {
    el.addEventListener('click', () => {
      const sid = el.dataset.stageId || null;
      _activeLeagueFilter = sid || null;
      renderCol1();
      renderCol2();
    });
  });
}

function fmtTime(unixSec) {
  if (!unixSec) return '';
  const d = new Date(unixSec * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function leagueDisplayName(t) {
  // Prefer NAME_PART_2 (clean league name, e.g. "Premier League")
  // when FL ships it. Fall back to peeling the country prefix off
  // NAME (which arrives as "England: Premier League" for many
  // tournaments) so the league name still leads the row even when
  // FL omits the split fields. Final fallback: full NAME as-is.
  if (t.NAME_PART_2) return t.NAME_PART_2;
  const name = t.NAME || '';
  const country = t.COUNTRY_NAME || t.NAME_PART_1 || '';
  if (country && name.startsWith(country + ':')) {
    return name.substring(country.length + 1).trim();
  }
  const idx = name.indexOf(':');
  if (idx > 0 && idx < name.length - 1) return name.substring(idx + 1).trim();
  return name;
}

function renderCol2() {
  const col2 = document.getElementById('sp-col2');
  if (!_eventsCache || !_eventsCache.length) {
    col2.innerHTML = '<div class="sp-c2-empty">No events today.</div>';
    return;
  }
  let html = '';
  let any = false;
  // Header with match summary + Game/Market view toggle.
  // Pill counts are STATE-filter-aware but ignore the onlyMatched
  // toggle (since 'On Kalshi' IS that toggle — its own count
  // shouldn't change when it's clicked). This way Live → '5
  // events / 4 on Kalshi' shows you the state slice and the
  // Kalshi overlap inside that slice consistently.
  let totalEvents = 0;
  let filteredKalshiCount = 0;
  for (const t of _eventsCache) {
    for (const ev of (t.events || [])) {
      if (!passesAllFilters(ev)) continue;
      totalEvents += 1;
      if (ev.kalshi && ev.kalshi.event_ticker) filteredKalshiCount += 1;
    }
  }
  if (filteredKalshiCount > 0 || totalEvents > 0) {
    html += '<div class="sp-c2-summary">';
    // 'All events' and 'On Kalshi' are mutually-exclusive filter
    // pills — same shape, one always active. Default _onlyMatched
    // = false → 'All events' is the active one.
    const allCls = 'sp-c2-summary-pill' + (!_onlyMatched ? ' active' : '');
    html += '<button class="' + allCls + '" id="sp-c2-show-all" type="button">';
    html += totalEvents + ' events';
    html += '</button>';
    if (filteredKalshiCount > 0) {
      const pillCls = 'sp-c2-summary-pill' + (_onlyMatched ? ' active' : '');
      html += '<button class="' + pillCls + '" id="sp-c2-only-kalshi" type="button">';
      html += filteredKalshiCount + ' on Kalshi';
      html += '</button>';
    }
    // Game / Market view toggle — same pattern as the homepage's
    // GRID/LIST style switcher.
    html += '<div class="sp-c2-viewtoggle" role="tablist">';
    html += '<button class="sp-c2-vt-btn' + (_viewMode === 'game' ? ' active' : '') +
            '" data-view="game" type="button" role="tab">Game</button>';
    html += '<button class="sp-c2-vt-btn' + (_viewMode === 'market' ? ' active' : '') +
            '" data-view="market" type="button" role="tab">Markets</button>';
    html += '</div>';
    html += '</div>';

  }
  // Sort tournaments so outright/season-futures tournaments render
  // AFTER live game tournaments. Mirrors the side-nav 'Outrights at
  // the bottom' rule — games are higher priority in the user's
  // eye-line, outrights drop below as a secondary section.
  const sortedTournaments = [..._eventsCache].sort((a, b) => {
    const aOut = bucketCountry(a) === 'Outrights' ? 1 : 0;
    const bOut = bucketCountry(b) === 'Outrights' ? 1 : 0;
    return aOut - bOut;  // stable; only moves outrights down
  });
  for (const t of sortedTournaments) {
    const stageId = t.TOURNAMENT_STAGE_ID || '';
    if (_activeLeagueFilter && _activeLeagueFilter !== stageId) continue;
    const evs = (t.events || t.EVENTS || []).filter(passesAllFilters);
    if (!evs.length) continue;
    any = true;
    // Does this tournament have any matched (Kalshi-backed)
    // events? If so render the Score / Kalshi (PROB/YES/NO)
    // column header strip beneath the tournament name. If not,
    // skip the strip — there's nothing to label.
    const tournamentHasMatch = evs.some(e => e.kalshi && e.kalshi.event_ticker);
    // Show the SCORE column label only when at least one event in
    // this tournament is going to render scores in the score column
    // (Winner-shape outcomes / unmatched / no active market). For
    // tournaments where every visible event has its score baked
    // into the matchup line (sub-market views), the score column is
    // empty for every row and the label would be misleading.
    const tournamentNeedsScoreCol = evs.some(eventShowsScoreInColumn);
    html += '<div class="sp-c2-tournament">';
    html += '<div class="sp-c2-tournament-head">';
    html += '<span class="sp-c2-league-name">' + escH(leagueDisplayName(t)) + '</span>';
    if (t.COUNTRY_NAME) html += '<span class="sp-c2-country">' + escH(t.COUNTRY_NAME) + '</span>';
    html += '</div>';
    html += '<div class="sp-c2-events">';
    for (const ev of evs) {
      // In Market view, each Kalshi ticker becomes its own row;
      // in Game view, each match is one row with a +N badge if
      // multiple markets exist.
      if (_viewMode === 'market' && ev.kalshi && ev.kalshi.markets) {
        // Expand to one row per market — matched events only.
        // Lite events still get one row each (no markets to
        // expand into).
        for (const m of ev.kalshi.markets) {
          html += renderEventRow(ev, m, /*isMarketRow=*/true);
        }
      } else {
        html += renderEventRow(ev, null, /*isMarketRow=*/false);
      }
    }
    html += '</div></div>';
  }
  col2.innerHTML = any ? html :
    '<div class="sp-c2-empty">No events match the current filter.</div>';
  // Click event → select + populate COL 3
  col2.querySelectorAll('.sp-c2-event').forEach(el => {
    el.addEventListener('click', () => {
      col2.querySelectorAll('.sp-c2-event.selected').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      const evId = el.dataset.eventId;
      const ticker = el.dataset.ticker || null;
      _selectedEventId = evId;
      _selectedTicker = ticker;
      renderCol3(evId, ticker);
    });
  });
  // Load-more / show-less toggle inside the teams cell. stop
  // propagation so clicking the button doesn't also fire the
  // row-select handler above (which would steal focus).
  col2.querySelectorAll('.sp-c2-loadmore').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const evId = el.dataset.eventId;
      if (!evId) return;
      if (_expandedEvents.has(evId)) _expandedEvents.delete(evId);
      else _expandedEvents.add(evId);
      renderCol2();
    });
  });
  // 'All events' / 'On Kalshi' filter pills — mutual toggle.
  // Each sets _onlyMatched explicitly (rather than flipping)
  // so a click on the active pill is a no-op rather than
  // accidentally turning off the filter the user already picked.
  const allPill = col2.querySelector('#sp-c2-show-all');
  if (allPill) {
    allPill.addEventListener('click', () => {
      if (_onlyMatched) {
        _onlyMatched = false;
        renderCol1();
        renderCol2();
      }
    });
  }
  const matchedPill = col2.querySelector('#sp-c2-only-kalshi');
  if (matchedPill) {
    matchedPill.addEventListener('click', () => {
      if (!_onlyMatched) {
        _onlyMatched = true;
        renderCol1();
        renderCol2();
      }
    });
  }
  // Game / Market view toggle.
  col2.querySelectorAll('.sp-c2-vt-btn').forEach(el => {
    el.addEventListener('click', () => {
      _viewMode = el.dataset.view;
      try { localStorage.setItem(VIEW_LS_KEY, _viewMode); } catch (e) {}
      renderCol2();
    });
  });
  // Per-event market-type tabs — one strip per matched event.
  // Updates the per-event map then re-renders so just this event's
  // outcomes and chips swap. stopPropagation so the row's click
  // handler doesn't also fire selection.
  col2.querySelectorAll('.sp-c2-event-tab').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      // 'More Markets' / 'Less' toggle — flips the per-event tab
      // expansion state and re-renders. Doesn't change the active
      // market.
      if (el.classList.contains('sp-c2-event-tab-more')) {
        const evId = el.dataset.eventId;
        if (!evId) return;
        if (_expandedTabs.has(evId)) _expandedTabs.delete(evId);
        else _expandedTabs.add(evId);
        renderCol2();
        return;
      }
      const wrap = el.closest('.sp-c2-event');
      if (!wrap) return;
      const evId = wrap.dataset.eventId;
      _eventActiveMarketType.set(evId, el.dataset.mtype || '');
      renderCol2();
    });
  });
}


// Series-ticker suffixes that get a card-tab in Game view.
// Mirrors the homepage's _SIBLING_SUFFIXES whitelist (main.py
// line 848) so /sports and the homepage card agree on which
// markets are 'card-class' vs which only appear in the
// all-markets-flat view (Markets toggle here on /sports).
//
// What this filters OUT — NBA/NHL/MLB-heavy player-prop markets
// that would otherwise pad the strip with 8-10 entries per game:
//   ASSISTS, PLAYERGOAL, POINTS, REBOUNDS, STEALS, BLOCKS,
//   STRIKEOUTS, FIRSTGOAL, OVERTIME, etc. They still show as
//   their own row when the user toggles into Markets view —
//   nothing's lost, it just stops cluttering the card.
const _CARD_TAB_SERIES_SUFFIXES = [
  'GAME', 'MATCH',                          // primary (Winner)
  'SPREAD', 'TOTAL', 'BTTS', 'TEAMTOTAL',
  '1H', '1HWINNER', '1HSPREAD', '1HTOTAL',
  '2HWINNER',
  'RFI', 'F5', 'F5SPREAD', 'F5TOTAL',
  'SETWINNER', 'MAP', 'TOTALMAPS', 'ADVANCE',
];

function _isCardTabMarket(seriesTicker) {
  const s = (seriesTicker || '').toUpperCase();
  for (const suf of _CARD_TAB_SERIES_SUFFIXES) {
    if (s.endsWith(suf)) return true;
  }
  return false;
}

function eventMarketTypes(ev) {
  // Card-tab market types for this event, ordered with headline
  // Winner ('') first, then alphabetical. Filtered to the
  // homepage's card-class whitelist so player-prop markets
  // don't pollute the tab strip — those still show in Markets
  // view (each market = its own row).
  //
  // Special case: the headline Winner (market_type === '') always
  // counts as a card-class market regardless of its series_ticker
  // suffix. NHL playoff games sometimes use KXNHLPLAYOFF /
  // KXSTANLEYCUP / etc. instead of KXNHLGAME for the primary
  // winner market — same applies for KXWORLDSERIES on MLB and
  // KXNBAFINALS on NBA. The whitelist only filters sub-markets.
  if (!ev.kalshi || !ev.kalshi.markets) return [];
  const set = new Set();
  for (const m of ev.kalshi.markets) {
    const mt = m.market_type || '';
    if (mt === '') {
      set.add('');
      continue;
    }
    if (!_isCardTabMarket(m.series_ticker)) continue;
    set.add(mt);
  }
  const arr = Array.from(set);
  arr.sort((a, b) => {
    if (a === b) return 0;
    if (a === '') return -1;
    if (b === '') return 1;
    return a.localeCompare(b);
  });
  return arr;
}

function pickMarketForGameRow(ev) {
  // Game view: return the market matching the PER-EVENT active
  // market type. Each matched event tracks its own selected tab
  // in _eventActiveMarketType so users can compare different
  // markets across events independently. Default '' = headline
  // Winner. NO fallback across types — if the user picked Spreads
  // and this event has no Spreads market, return null and let
  // the renderer leave the chips empty (with team names still
  // visible so the user can see which game it is).
  if (!ev.kalshi || !ev.kalshi.markets) return null;
  const t = _eventActiveMarketType.get(ev.EVENT_ID) || '';
  // For the headline (t === ''), prefer the market whose
  // event_ticker matches the kalshi block's chosen primary
  // (backend's _v2_pick_primary picks the GAME/MATCH-suffixed
  // ticker, so this lands on KXNBAGAME instead of arbitrary
  // empty-market_type rows like KXNBAMENTION).
  if (t === '' && ev.kalshi.event_ticker) {
    for (const m of ev.kalshi.markets) {
      if (m.event_ticker === ev.kalshi.event_ticker) return m;
    }
  }
  for (const m of ev.kalshi.markets) {
    if ((m.market_type || '') === t) return m;
  }
  return null;
}

function renderEventRow(ev, market, isMarketRow) {
  // market is non-null in Market view (the specific Kalshi
  // ticker for this row). isMarketRow flips a few visuals
  // (smaller font on the market-type label, ticker in the
  // selection key).
  const state = eventState(ev);
  const time = state === 'finished' ? 'FT' : fmtTime(ev.START_TIME);
  const stLbl = state === 'live' ? liveClockLabel(ev) :
                state === 'finished' ? '' :
                state === 'upcoming' ? '' : '';
  const matched = !!(ev.kalshi && ev.kalshi.event_ticker);
  // In Game view, the active market type drives which ticker
  // this row links to (so when user picks 'Spread' from the tab
  // strip, clicking a row opens the spread market for that
  // game, not the headline Winner).
  let gameViewMarket = null;
  if (matched && !isMarketRow) {
    gameViewMarket = pickMarketForGameRow(ev);
  }
  const rowTicker = isMarketRow && market ? market.event_ticker
                  : (gameViewMarket ? gameViewMarket.event_ticker
                  : (matched ? ev.kalshi.event_ticker : null));
  const isSelected = isMarketRow
    ? (ev.EVENT_ID === _selectedEventId && rowTicker === _selectedTicker)
    : (ev.EVENT_ID === _selectedEventId && !_selectedTicker);
  const evClasses = [
    'sp-c2-event',
    matched ? 'sp-c2-matched' : 'sp-c2-lite',
    isSelected ? 'selected' : '',
  ].filter(Boolean).join(' ');
  let html = '<div class="' + evClasses + '" data-event-id="' + escH(ev.EVENT_ID || '') + '"';
  if (rowTicker) html += ' data-ticker="' + escH(rowTicker) + '"';
  html += '>';
  // Per-event market-type tabs — only in Game view, only when this
  // event has more than one market. Mirrors the homepage card
  // pattern: the tabs live INSIDE the row so users can switch
  // markets right where they're looking, instead of via a global
  // filter at the top of COL 2.
  if (matched && !isMarketRow) {
    const types = eventMarketTypes(ev);
    if (types.length > 1) {
      const evActive = _eventActiveMarketType.get(ev.EVENT_ID) || '';
      // Cap at 5 visible tabs. When > 5, show first 4 + a 'More
      // Markets' toggle button. Click expands the strip in-place
      // to show all tabs (state held in _expandedTabs per event
      // ID). Active market always stays visible — if the user
      // picked a tab that's beyond the first 4, we move it into
      // the visible slot so they don't lose their place.
      const TAB_CAP = 5;
      const expandedHere = _expandedTabs.has(ev.EVENT_ID);
      let visible = types;
      let needsMore = false;
      if (types.length > TAB_CAP && !expandedHere) {
        visible = types.slice(0, TAB_CAP - 1);
        // Make sure the active tab is in the visible set; if not,
        // swap it into the last visible slot.
        if (evActive && !visible.includes(evActive) && types.includes(evActive)) {
          visible = visible.slice(0, TAB_CAP - 2);
          visible.push(evActive);
        }
        needsMore = true;
      }
      html += '<div class="sp-c2-event-tabs">';
      for (const t of visible) {
        const lbl = t === '' ? 'Winner' : t;
        const cls = 'sp-c2-event-tab' + (t === evActive ? ' active' : '');
        html += '<button class="' + cls + '" data-mtype="' + escH(t) +
                '" type="button">' + escH(lbl) + '</button>';
      }
      if (needsMore) {
        const moreCount = types.length - visible.length;
        html += '<button class="sp-c2-event-tab sp-c2-event-tab-more" ' +
                'data-event-id="' + escH(ev.EVENT_ID || '') + '" type="button" ' +
                'title="Show all markets in the tab strip">+ ' +
                moreCount + ' More</button>';
      } else if (expandedHere && types.length > TAB_CAP) {
        // Already expanded — show a "Less" toggle so the user
        // can collapse back to the compact strip.
        html += '<button class="sp-c2-event-tab sp-c2-event-tab-more" ' +
                'data-event-id="' + escH(ev.EVENT_ID || '') + '" type="button" ' +
                'data-collapse="1">Less</button>';
      }
      html += '</div>';
    }
  }
  // Aggregate / playoff-series pill — its own row between the
  // tab strip and the event-row grid. Visible only when populated.
  // Sits left-aligned above the team names so it reads as
  // contextual metadata for the row beneath. Game-number chip
  // (parsed from kalshi.title) renders alongside the series
  // chip when both apply.
  const _gameChipHtml = renderGameNumberChip(ev);
  const _aggRowHtml = renderAggOrSeries(ev);
  const _aggCombined = [_gameChipHtml, _aggRowHtml]
    .filter(s => s).join(' ');
  if (_aggCombined) {
    html += '<div class="sp-c2-event-aggrow">' + _aggCombined + '</div>';
  }
  // Compute outcomes BEFORE the header row reads `outcomes.length`
  // — `const` declarations have a temporal dead zone, so reading
  // the binding before its initializer throws ReferenceError and
  // takes down the whole render. Was the cause of the
  // 'Failed to load events.' regression.
  const rowMarketOverride = isMarketRow ? market : null;
  const allOutcomes = matched ? collectOutcomesForRender(ev, rowMarketOverride) : [];
  const MAX_VISIBLE = 4;
  const expanded = _expandedEvents.has(ev.EVENT_ID);
  const outcomes = (allOutcomes.length > MAX_VISIBLE && !expanded)
    ? allOutcomes.slice(0, MAX_VISIBLE)
    : allOutcomes;
  const hasMore = allOutcomes.length > MAX_VISIBLE;
  // Per-event header row — uses the SAME 4-column grid as the
  // event-row below, so SCORE label aligns with the score column,
  // KALSHI / PROB / YES / NO align with the chip columns. All
  // labels share one row → they line up horizontally. Rendered
  // only when this event has matched chips (otherwise the labels
  // would point at empty columns).
  if (matched && outcomes.length) {
    html += '<div class="sp-c2-event-headers">';
    html += '<div></div>';  // time column spacer
    html += '<div></div>';  // teams column spacer
    html += '<div class="sp-c2-eh-score">SCORE</div>';
    html += '<div class="sp-c2-eh-kalshi">';
    html += '<span class="sp-c2-eh-kalshi-title">KALSHI</span>';
    html += '<span class="sp-c2-eh-prob">PROB</span>';
    html += '<span class="sp-c2-eh-yes">YES</span>';
    html += '<span class="sp-c2-eh-no">NO</span>';
    html += '</div>';
    html += '</div>';
  }
  // Main row — time / teams / scores / marketcell.
  html += '<div class="sp-c2-event-row">';
  // Left indicator column — was the Kalshi K + count badge.
  // Removed: 'Kalshi' is already labelled in the column header,
  // and the available-markets count is implicit in the per-event
  // tab strip directly above the row. When Polymarket / sportsbook
  // sources land we'll re-introduce a tiny multi-source indicator
  // here; until then the column is gone and the grid is one
  // column slimmer.
  // Time cell — kickoff time + live state (e.g. 'HT' / '1H 23:14').
  // Aggregate/series pill moved to its own row above the event-row
  // grid so it doesn't crowd the narrow time column.
  html += '<div class="sp-c2-time">' + escH(time);
  if (stLbl) {
    const liveAttr = state === 'live'
      ? ' data-event-id="' + escH(ev.EVENT_ID || '') + '"'
      : '';
    html += '<span class="sp-c2-time-state' + (state === 'live' ? ' live' : '') + '"' +
            liveAttr + '>' + escH(stLbl) + '</span>';
  }
  html += '</div>';
  // outcomes / allOutcomes / hasMore are computed above (before the
  // header row reads outcomes.length). Re-using those bindings here.
  html += '<div class="sp-c2-teams">';
  // Matchup header — shows 'Home <score> - <score> Away' above
  // the outcome labels when the outcomes don't already include
  // team-name context. Detection is by SHAPE of the outcome list,
  // not by market_type, so it covers Winner, First Half Winner,
  // Set Winner, etc. (anything where the labels ARE the team
  // names + Tie) without needing a per-market-type whitelist.
  // Outright events (no team names) skip the header. Score is
  // baked into the matchup line itself so the standalone score
  // column stays empty for these rows (cleaner than a stranded
  // '0' floating in its own column).
  const hasTeamNames = !!(ev.HOME_NAME || ev.AWAY_NAME);
  const winnerShape = isWinnerShapedOutcomes(outcomes, ev.HOME_NAME, ev.AWAY_NAME);
  const showMatchup = matched && hasTeamNames && !winnerShape && outcomes.length > 0;
  // Team images come straight from FL's events-list response:
  // HOME_IMAGES / AWAY_IMAGES are arrays of CDN URLs. National
  // teams ship the country flag, clubs ship the crest — same
  // distinction the homepage relies on. No extra API calls.
  const homeImg = (ev.HOME_IMAGES && ev.HOME_IMAGES[0]) || '';
  const awayImg = (ev.AWAY_IMAGES && ev.AWAY_IMAGES[0]) || '';
  const homeIconHtml = homeImg
    ? '<img class="sp-c2-team-icon" src="' + escH(homeImg) + '" alt="" loading="lazy">'
    : '';
  const awayIconHtml = awayImg
    ? '<img class="sp-c2-team-icon" src="' + escH(awayImg) + '" alt="" loading="lazy">'
    : '';
  if (showMatchup) {
    const hs = ev.HOME_SCORE_CURRENT;
    const as = ev.AWAY_SCORE_CURRENT;
    const haveScores = (hs != null) || (as != null);
    const homeName = ev.HOME_NAME || '';
    const awayName = ev.AWAY_NAME || '';
    // Plain-text matchup for the title= tooltip (no markup).
    const matchupTitle = haveScores
      ? homeName + ' ' + (hs != null ? hs : 0) + ' - ' + (as != null ? as : 0) + ' ' + awayName
      : homeName + ' vs ' + awayName;
    let matchupHtml;
    if (haveScores) {
      matchupHtml = homeIconHtml + escH(homeName) +
        ' <span class="sp-c2-matchup-score">' + escH(hs != null ? hs : 0) + '</span>' +
        ' - <span class="sp-c2-matchup-score">' + escH(as != null ? as : 0) + '</span> ' +
        escH(awayName) + awayIconHtml;
    } else {
      matchupHtml = homeIconHtml + escH(homeName) + ' vs ' + escH(awayName) + awayIconHtml;
    }
    html += '<span class="sp-c2-matchup" title="' + escH(matchupTitle) +
            '">' + matchupHtml + '</span>';
  }
  if (matched && outcomes.length) {
    // Icons go on the matchup header (UP) when it's visible —
    // outcome rows below stay plain so the crest isn't duplicated
    // for labels that are team names. Winner-shape views have no
    // matchup header, so the outcome row IS the team line and
    // keeps its inline icon. Match on full name first, then on
    // partial (covers cases like outcome="Atletico" with
    // HOME_NAME="Atl. Madrid").
    const homeLc = (ev.HOME_NAME || '').toLowerCase();
    const awayLc = (ev.AWAY_NAME || '').toLowerCase();
    for (const o of outcomes) {
      const lblLc = (o.label || '').toLowerCase();
      let icon = '';
      if (!showMatchup) {
        // Prefer the explicit side field (set on Winner outcomes
        // by collectOutcomesForRender — authoritative since the
        // backend builds primary_prices from registry-resolved
        // sides). Fall back to substring matching for raw outcomes
        // (per-leg, spreads, etc. that don't carry .side).
        if (o.side === 'home') icon = homeIconHtml;
        else if (o.side === 'away') icon = awayIconHtml;
        else {
          const matchesTeam = function(team) {
            if (!team || !lblLc) return false;
            if (lblLc === team) return true;
            if (lblLc.length < 3) return false;
            return lblLc.includes(team) || team.includes(lblLc);
          };
          if (matchesTeam(homeLc)) icon = homeIconHtml;
          else if (matchesTeam(awayLc)) icon = awayIconHtml;
        }
      }
      html += '<span class="sp-c2-team" title="' + escH(o.label || '') +
              '">' + icon + escH(o.label || '') + '</span>';
    }
    if (hasMore) {
      const lbl = expanded ? 'Show less' : '+ ' + (allOutcomes.length - MAX_VISIBLE) + ' more';
      html += '<button class="sp-c2-loadmore" data-event-id="' +
              escH(ev.EVENT_ID || '') + '" type="button">' + escH(lbl) + '</button>';
    }
  } else if (!showMatchup && hasTeamNames) {
    // No outcomes (unmatched OR matched but no market for the
    // active sub-market type) and no matchup header above.
    // Render plain team names so the user still sees the fixture.
    html += '<span class="sp-c2-team">' + homeIconHtml + escH(ev.HOME_NAME || '') + '</span>';
    html += '<span class="sp-c2-team">' + awayIconHtml + escH(ev.AWAY_NAME || '') + '</span>';
  }
  // In Market view, append the market type below the labels so
  // users can scan which market each row represents.
  if (isMarketRow && market) {
    const mtypeLabel = market.market_type || 'Winner';
    html += '<span class="sp-c2-market-type">' + escH(mtypeLabel) + '</span>';
  }
  html += '</div>';
  // Tennis events get the full sets/serve/games/point breakdown
  // matching the homepage tennis-row layout (HOME_SCORE_PART_1..5,
  // HOME_SCORE_PART_GAME, SERVICE — all on the FL event payload).
  // Other sports get the simple home/away score column.
  const isTennisEv = activeSportId() === 2;
  if (isTennisEv) {
    html += renderTennisScoreCell(ev, showMatchup);
  } else if (showMatchup) {
    html += '<div class="sp-c2-scores"></div>';
  } else {
    html += '<div class="sp-c2-scores">';
    html += '<span>' + escH(ev.HOME_SCORE_CURRENT != null ? ev.HOME_SCORE_CURRENT : '') + '</span>';
    html += '<span>' + escH(ev.AWAY_SCORE_CURRENT != null ? ev.AWAY_SCORE_CURRENT : '') + '</span>';
    html += '</div>';
  }
  // Right market cell — chip rows only (PROB / YES / NO), one per
  // outcome. Labels live in the teams cell to the left so each
  // chip row reads horizontally with its corresponding label.
  // Outcome → chip row is 1:1 in display order. SCORE / KALSHI /
  // PROB / YES / NO labels are rendered in a unified header row
  // ABOVE the event-row grid so they all align horizontally
  // (same y) — not per-cell which made SCORE float higher than
  // PROB/YES/NO.
  html += '<div class="sp-c2-marketcell">';
  if (matched && outcomes.length) {
    if (showMatchup) html += '<div class="sp-c2-chip-spacer"></div>';
    for (const o of outcomes) html += renderChipRow(o);
  } else {
    html += '<span class="sp-c2-no-market" title="' +
            (matched ? 'No prices yet' : 'No markets yet') + '">—</span>';
  }
  html += '</div>';
  html += '</div>';   // close .sp-c2-event-row
  html += '</div>';   // close .sp-c2-event
  return html;
}

function collectOutcomesForRender(ev, marketOverride) {
  // Return a uniform [{label, prob, yes, no, ticker}, …] list for
  // the relevant market. In Market view the caller passes the
  // specific per-row market via marketOverride; in Game view we
  // pick by the active market-type tab. Winner uses primary_prices
  // (home / away / tie with FL team names); other types pass
  // through cache outcomes with self-describing labels like
  // "Real Madrid wins by over 2.5 goals".
  if (!ev.kalshi) return [];
  const activeMarket = marketOverride || pickMarketForGameRow(ev);
  const isWinner = activeMarket && (activeMarket.market_type || '') === '';
  if (isWinner && ev.kalshi.primary_prices) {
    const p = ev.kalshi.primary_prices;
    const out = [];
    const has = (a, b, c) => a != null || b != null || c != null;
    if (has(p.home_prob, p.home_yes, p.home_no)) {
      out.push({ label: ev.HOME_NAME || 'Home', side: 'home',
                 prob: p.home_prob, yes: p.home_yes, no: p.home_no,
                 ticker: p.home_ticker });
    }
    if (has(p.away_prob, p.away_yes, p.away_no)) {
      out.push({ label: ev.AWAY_NAME || 'Away', side: 'away',
                 prob: p.away_prob, yes: p.away_yes, no: p.away_no,
                 ticker: p.away_ticker });
    }
    if (has(p.tie_prob, p.tie_yes, p.tie_no)) {
      out.push({ label: 'Tie', side: 'tie',
                 prob: p.tie_prob, yes: p.tie_yes, no: p.tie_no,
                 ticker: p.tie_ticker });
    }
    return out;
  }
  if (activeMarket && activeMarket.outcomes && activeMarket.outcomes.length) {
    return activeMarket.outcomes;
  }
  return [];
}

function renderGameNumberChip(ev) {
  // Game number chip — parses "Game N:" out of the kalshi headline
  // title and renders it as a small pill. Kalshi puts the game
  // number directly in titles for series fixtures (e.g.
  // "Game 1: Cleveland at Detroit"). Useful contextual metadata
  // for playoffs alongside the series-state chip.
  if (!ev.kalshi || !ev.kalshi.title) return '';
  const m = /^Game\s+(\d+)\s*:/i.exec(ev.kalshi.title);
  if (!m) return '';
  return '<span class="sp-c2-agg" title="Game number in series">GAME ' +
         escH(m[1]) + '</span>';
}

function renderKickoffTimeChip(ev) {
  // Kickoff time chip — shown on winner-shape cards where the
  // matchup header is suppressed (so kickoff time would otherwise
  // be invisible). Formats START_TIME in the user's browser TZ as
  // HH:MM. Hidden for events without START_TIME (outrights) and
  // for events whose state already shows a live clock in the
  // score column (1H/2H/HT/etc.).
  const ts = ev.START_TIME || ev.START_UTIME;
  if (!ts) return '';
  const stage = (ev.STAGE_TYPE || '').toUpperCase();
  if (stage === 'LIVE' || stage === 'INPROGRESS' || stage === 'FINISHED') {
    return '';
  }
  const d = new Date(ts * 1000);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return '<span class="sp-c2-agg" title="Kickoff time (your local timezone)">' +
         escH(hh + ':' + mm) + '</span>';
}

function renderAggOrSeries(ev) {
  // Universal multi-leg / playoff-series pill. Two shapes share
  // the slot:
  //   1. Soccer two-leg cup ties:  AGG 1-1 · LEG 2/2
  //                                AGG ARS 4-3 · LEG 2/2  (when
  //                                home leads, abbr from kalshi)
  //   2. NBA / NHL / MLB / NFL playoffs:  SERIES BOS 3-2
  //                                       SERIES TIED 1-1
  //                                       GAME 5 · SERIES BOS 3-2
  // Mirrors homepage's renderSeriesPill format exactly.
  // Returns nothing for round-robin / regular-season games.
  if (!ev.kalshi || !(ev.kalshi.event_ticker)) return '';
  const k = ev.kalshi;
  // Soccer two-leg aggregate
  if (k.aggregate_home != null && k.aggregate_away != null) {
    const hh = k.aggregate_home;
    const aa = k.aggregate_away;
    const homeAbbr = (ev.HOME_NAME || '').slice(0, 3).toUpperCase();
    const awayAbbr = (ev.AWAY_NAME || '').slice(0, 3).toUpperCase();
    const parts = [];
    if (hh > aa && homeAbbr) {
      parts.push(escH(homeAbbr) + ' ' + escH(hh) + '-' + escH(aa));
    } else if (aa > hh && awayAbbr) {
      parts.push(escH(awayAbbr) + ' ' + escH(aa) + '-' + escH(hh));
    } else {
      // Tied — explicit 'TIED' prefix so it's visually parallel
      // with the playoff-series 'SERIES TIED 1-1' format.
      parts.push('TIED ' + escH(hh) + '-' + escH(aa));
    }
    if (k.aggregate_label) {
      parts.push(escH(k.aggregate_label));
    } else if (k.leg_number) {
      parts.push('LEG ' + escH(k.leg_number) + '/2');
    }
    return '<span class="sp-c2-agg" title="Aggregate across both legs">AGG ' +
           parts.join(' · ') + '</span>';
  }
  // North-American playoff series score
  if (k.series_home_wins != null && k.series_away_wins != null) {
    const hW = k.series_home_wins;
    const aW = k.series_away_wins;
    let leader, leadW, trailW;
    if (hW > aW) {
      leader = (ev.HOME_NAME || '').slice(0, 3).toUpperCase() || 'HOME';
      leadW = hW; trailW = aW;
    } else if (aW > hW) {
      leader = (ev.AWAY_NAME || '').slice(0, 3).toUpperCase() || 'AWAY';
      leadW = aW; trailW = hW;
    } else {
      leader = 'TIED'; leadW = hW; trailW = aW;
    }
    const tag = leader === 'TIED'
      ? 'SERIES TIED ' + escH(leadW) + '-' + escH(trailW)
      : 'SERIES ' + escH(leader) + ' ' + escH(leadW) + '-' + escH(trailW);
    return '<span class="sp-c2-agg" title="Playoff series score">' + tag + '</span>';
  }
  return '';
}

// Soccer period offsets — matches the homepage's
// computeSoccerMinute exactly so /sports and homepage agree on
// the displayed clock value for any live game.
const _SOCCER_PERIOD_OFFSETS = {1: 0, 2: 45, 3: 90, 4: 105};
const _SOCCER_PERIOD_END     = {1: 45, 2: 90, 3: 105, 4: 120};

function _stageToPeriod(stage) {
  const s = (stage || '').toUpperCase();
  if (s === 'FIRST_HALF')              return 1;
  if (s === 'SECOND_HALF')             return 2;
  if (s === 'EXTRA_TIME_FIRST_HALF')   return 3;
  if (s === 'EXTRA_TIME_SECOND_HALF')  return 4;
  return 0;
}

function _computeSoccerMinute(stageStartMs, period) {
  // Port of homepage's computeSoccerMinute. Format mirrors
  // FlashScore with seconds:
  //   '1H 32:15' / '2H 67:42' / '1H 45+3:27' / 'ET 95:08'
  // First second of a half displays as '1:00' / '46:00' —
  // broadcast convention rounds the minute up inside the first
  // 60 seconds.
  if (!stageStartMs || !_SOCCER_PERIOD_OFFSETS.hasOwnProperty(period)) return null;
  const elapsedSec = Math.max(0, Math.floor((Date.now() - stageStartMs) / 1000));
  const elapsedMin = Math.floor(elapsedSec / 60);
  const elapsedSecOnly = elapsedSec % 60;
  const pad = (n) => (n < 10 ? '0' + n : '' + n);
  const base = _SOCCER_PERIOD_OFFSETS[period];
  const endMark = _SOCCER_PERIOD_END[period];
  const prefix = (period === 1) ? '1H' : (period === 2) ? '2H' : 'ET';
  let minute = base + elapsedMin;
  let body;
  if (minute > endMark) {
    body = endMark + '+' + (minute - endMark) + ':' + pad(elapsedSecOnly);
  } else {
    if (minute < base + 1) minute = base + 1;
    body = minute + ':' + pad(elapsedSecOnly);
  }
  return prefix + ' ' + body;
}

// FL sport_id → ESPN/internal sport name. Used by liveClockLabel
// to pick the right period prefix ('Q' for Basketball/Football,
// 'P' for Hockey, no prefix for Soccer).
function _activeSportName() {
  const m = {1:'Soccer', 2:'Tennis', 3:'Basketball', 4:'Hockey',
             5:'Football', 6:'Baseball'};
  return m[activeSportId()] || '';
}

function _parseClockSecs(s) {
  // '8:42' → 522. Returns null for non-clock strings.
  if (!s) return null;
  const m = String(s).match(/^(\d+):(\d{1,2})$/);
  if (!m) return null;
  return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
}

function _formatMMSS(secs) {
  if (secs < 0) secs = 0;
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return m + ':' + (s < 10 ? '0' + s : s);
}

function _buildLiveLabel(sport, period, clockSecs, stageStartMs) {
  // Mirrors homepage's buildLiveLabel exactly so /sports and
  // homepage agree on every live game's label byte-for-byte.
  if (sport === 'Soccer') {
    const precise = _computeSoccerMinute(stageStartMs, period);
    if (precise !== null) return precise;
    return Math.floor(clockSecs / 60) + "'";
  }
  const clockStr = _formatMMSS(clockSecs);
  if (sport === 'Hockey') return 'P' + period + ' ' + clockStr;
  if (sport === 'Basketball' || sport === 'Football') return 'Q' + period + ' ' + clockStr;
  return clockStr;
}

function liveClockLabel(ev) {
  // Live-state label matching homepage format:
  //   Soccer:           '1H 32:15' / '2H 45+3:27' / 'HT'  (count up)
  //   Hockey:           'P{period} M:SS'                  (count down)
  //   Basketball / FB:  'Q{period} M:SS'                  (count down)
  // Soccer counts up from STAGE_START_TIME (FL ships seconds);
  // other sports count down from ESPN's display_clock at the
  // moment captured_at_ms it was sampled. 15 s drift cap so a
  // stale capture never runs the clock to zero.
  const stage = String(ev.STAGE || '').toUpperCase();
  if (stage === 'HALF_TIME' || stage === 'BREAK_AFTER_FIRST_HALF') return 'HT';
  const sport = _activeSportName();
  const stageStartSec = parseInt(ev.STAGE_START_TIME, 10);
  const stageStartMs = stageStartSec > 0 ? stageStartSec * 1000 : null;
  // Soccer — STAGE_START_TIME is enough; ESPN clock not needed.
  if (sport === 'Soccer') {
    const period = _stageToPeriod(stage);
    if (period > 0 && stageStartMs) {
      const result = _computeSoccerMinute(stageStartMs, period);
      if (result) return result;
    }
  }
  // Hockey / Basketball / Football — interpolate ESPN's display_clock
  // from when it was captured. Backend enrichment attaches
  // ev._live_state with display_clock/period/clock_running/captured_at_ms.
  const ls = ev._live_state;
  if (ls && ls.display_clock && ls.captured_at_ms) {
    const baseSecs = _parseClockSecs(ls.display_clock);
    if (baseSecs !== null) {
      let elapsed = Math.max(0, Math.floor((Date.now() - ls.captured_at_ms) / 1000));
      if (elapsed > 15) elapsed = 15;  // drift safety net
      const running = ls.clock_running !== false;
      const clockSecs = running ? Math.max(0, baseSecs - elapsed) : baseSecs;
      return _buildLiveLabel(sport, ls.period || 0, clockSecs, stageStartMs);
    }
  }
  // Fallback when neither soccer STAGE_START_TIME nor ESPN
  // _live_state is present — FL sometimes ships GAME_TIME
  // pre-formatted ('Q3 8:42'); use as-is.
  if (ev.GAME_TIME != null && ev.GAME_TIME !== '') {
    return String(ev.GAME_TIME);
  }
  return stage.replace(/_/g, ' ') || 'LIVE';
}

// 500 ms tick — matches the homepage's tickLiveClocks cadence so
// the seconds count up visibly. Updates only the live state
// spans in place; no COL 2 re-render. Self-skips when no live
// rows are visible — when nothing's live the cost is one
// querySelectorAll every 500 ms (cheap).
let _liveTickInterval = null;
function tickLiveClocks() {
  if (!_eventsCache) return;
  const labels = document.querySelectorAll('.sp-c2-time-state.live[data-event-id]');
  if (labels.length === 0) return;
  const evById = {};
  for (const t of _eventsCache) {
    for (const ev of (t.events || t.EVENTS || [])) {
      if (ev.EVENT_ID) evById[ev.EVENT_ID] = ev;
    }
  }
  for (const el of labels) {
    const ev = evById[el.dataset.eventId];
    if (!ev) continue;
    const newLabel = liveClockLabel(ev);
    if (el.textContent !== newLabel) el.textContent = newLabel;
  }
}
function startLiveTick() {
  if (_liveTickInterval) return;
  _liveTickInterval = setInterval(tickLiveClocks, 500);
}

function eventShowsScoreInColumn(ev) {
  // True if THIS event will render its scores in the standalone
  // score column (vs inline in the matchup header). Used to
  // decide whether the tournament's column header strip should
  // show 'Score' or leave that label blank. Mirror of the
  // showMatchup branch in renderEventRow — keep them in sync.
  const matched = !!(ev.kalshi && ev.kalshi.event_ticker);
  if (!matched) return true;
  const outcomes = collectOutcomesForRender(ev);
  if (!outcomes.length) return true;
  // Winner-shape outcomes → score column carries home/away. Sub-
  // market outcomes (BTTS / Totals / Spreads) → score is in the
  // matchup line, column is empty.
  return isWinnerShapedOutcomes(outcomes, ev.HOME_NAME, ev.AWAY_NAME);
}

function isWinnerShapedOutcomes(outcomes, homeName, awayName) {
  // True when every outcome label maps to home, away, or a tie
  // word. Used to skip the matchup header (which would just
  // duplicate the team names already showing as outcome labels).
  // Covers Winner, First Half Winner, Half-time Winner, Set
  // Winner, etc. — any market shaped like 'home / away / tie'.
  //
  // Match is bidirectional substring (>=3 chars) so Kalshi short
  // labels like 'San Antonio' map to FL HOME_NAME 'San Antonio
  // Spurs', and 'Atl. Madrid' to 'Atletico Madrid'. Spreads still
  // fail because 'Freiburg wins by over 2.5' contains 'Freiburg'
  // but also contains tokens like 'wins by' which won't match the
  // other side, and we require non-tie labels to map to DIFFERENT
  // teams so a single team-name substring can't satisfy both
  // outcomes of a 2-outcome market.
  if (!outcomes || outcomes.length < 2 || outcomes.length > 3) return false;
  const tieWords = new Set(['tie', 'draw', 'no winner', 'no result']);
  const home = (homeName || '').trim().toLowerCase();
  const away = (awayName || '').trim().toLowerCase();
  if (!home || !away) return false;
  function matches(lbl, team) {
    if (!lbl || !team) return false;
    if (lbl === team) return true;
    if (lbl.length < 3) return false;
    return team.indexOf(lbl) !== -1 || lbl.indexOf(team) !== -1;
  }
  let homeSeen = false;
  let awaySeen = false;
  for (const o of outcomes) {
    const lbl = (o.label || '').trim().toLowerCase();
    if (tieWords.has(lbl)) continue;
    const isHome = matches(lbl, home);
    const isAway = matches(lbl, away);
    if (isHome && !isAway && !homeSeen) { homeSeen = true; continue; }
    if (isAway && !isHome && !awaySeen) { awaySeen = true; continue; }
    if (isHome && isAway) {
      // Ambiguous (e.g. home='LA Lakers', away='LA Clippers',
      // label='LA'). Assign to whichever side hasn't been seen.
      if (!homeSeen) { homeSeen = true; continue; }
      if (!awaySeen) { awaySeen = true; continue; }
    }
    return false;
  }
  return homeSeen && awaySeen;
}

function renderTennisScoreCell(ev, hasMatchupHeader) {
  // Tennis-specific score cell — full sets / serve-dot / per-set
  // games (history + current) / current-point. Matches the
  // homepage tennis-row layout so a 2-set match with set 1
  // completed shows '0 ● 4 3 0' (sets-won, serve, set-1-games,
  // current-set-games, current-point) instead of just the
  // current set.
  //
  // FL ships these on each event:
  //   HOME_SCORE_CURRENT / AWAY_SCORE_CURRENT — sets won
  //   HOME_SCORE_PART_<n> / AWAY_SCORE_PART_<n> — games per set
  //     (n=1..5; populated as each set completes; the last
  //     populated set is the in-progress one)
  //   HOME_SCORE_PART_GAME / AWAY_SCORE_PART_GAME — current point
  //     (0/15/30/40/A)
  //   SERVICE — '1' home / '2' away (empty between points)
  const sets_h = ev.HOME_SCORE_CURRENT != null ? ev.HOME_SCORE_CURRENT : '';
  const sets_a = ev.AWAY_SCORE_CURRENT != null ? ev.AWAY_SCORE_CURRENT : '';
  // Collect every populated set in order — both completed and
  // in-progress. The home / away rows iterate the same list so
  // the per-set boxes line up vertically.
  const setHistory = [];
  for (let si = 1; si <= 5; si++) {
    const h = ev['HOME_SCORE_PART_' + si];
    const a = ev['AWAY_SCORE_PART_' + si];
    if (h != null || a != null) setHistory.push({ h: h, a: a });
  }
  const point_h = ev.HOME_SCORE_PART_GAME != null ? ev.HOME_SCORE_PART_GAME : '';
  const point_a = ev.AWAY_SCORE_PART_GAME != null ? ev.AWAY_SCORE_PART_GAME : '';
  const svc = String(ev.SERVICE || '').trim().toUpperCase();
  const homeServes = svc === '1' || svc === 'HOME' || svc === 'H';
  const awayServes = svc === '2' || svc === 'AWAY' || svc === 'A';

  function buildRow(sets, serves, who, point) {
    let row = '<div class="tn-row">';
    row += '<span class="tn-sets">' + escH(sets) + '</span>';
    row += '<span class="tn-serve">' + (serves ? '●' : '') + '</span>';
    for (const s of setHistory) {
      const v = who === 'h' ? s.h : s.a;
      row += '<span class="tn-games">' + escH(v != null ? v : '') + '</span>';
    }
    row += '<span class="tn-point">' + escH(point) + '</span>';
    row += '</div>';
    return row;
  }

  let html = '<div class="sp-c2-scores tennis-score">';
  if (hasMatchupHeader) html += '<div class="tn-row"></div>';  // align below matchup
  html += buildRow(sets_h, homeServes, 'h', point_h);
  html += buildRow(sets_a, awayServes, 'a', point_a);
  html += '</div>';
  return html;
}

function renderChipRow(o) {
  // One PROB / YES / NO chip row aligned 1:1 with the outcome
  // label rendered in the teams cell to the left. Each row's
  // data-ticker is the per-outcome WS subscription target so
  // prices flash on the chip when the bid moves.
  const tickerAttr = o.ticker ? ' data-ticker="' + escH(o.ticker) + '"' : '';
  let row = '<div class="sp-c2-chip-row"' + tickerAttr + '>';
  row += '<span class="sp-c2-prob" data-fld="prob">' +
    (o.prob != null ? o.prob + '%' : '–') + '</span>';
  row += '<span class="sp-c2-yes" data-fld="yes">' +
    (o.yes != null ? o.yes + '¢' : '–') + '</span>';
  row += '<span class="sp-c2-no" data-fld="no">' +
    (o.no != null ? o.no + '¢' : '–') + '</span>';
  row += '</div>';
  return row;
}

// ── COL 3: event detail panel ──
// Populated when user clicks an event in COL 2. For matched
// events (Kalshi market exists) we show the basic FL header
// + a 'View on Stochverse ↗' button that opens the existing
// homepage modal (which has the full block-component stack —
// Stats, Lineups, Player Stats, etc.). For FL-only events we
// show the FL data inline since there's no Kalshi modal target.
async function renderCol3(flEventId, ticker) {
  const col3 = document.getElementById('sp-col3');
  // Find the FL event in our cache so we can render header
  // immediately without an extra fetch.
  let ev = null;
  let tournament = null;
  for (const t of (_eventsCache || [])) {
    for (const e of (t.events || [])) {
      if (e.EVENT_ID === flEventId) { ev = e; tournament = t; break; }
    }
    if (ev) break;
  }
  if (!ev) {
    col3.innerHTML = '<div class="sp-c3-empty"><div class="sp-c3-empty-title">Event not found</div></div>';
    return;
  }
  const state = eventState(ev);
  const time = state === 'finished' ? 'FT' : fmtTime(ev.START_TIME);
  const stLbl = state === 'live' ? (ev.STAGE || 'LIVE') :
                state === 'finished' ? 'Finished' :
                state === 'upcoming' ? 'Scheduled' : '';
  const matched = !!ticker;

  let html = '<div class="sp-c3-detail">';
  // Tournament context up top
  html += '<div class="sp-c3-tournament">';
  html += '<span class="sp-c3-league-name">' + escH(leagueDisplayName(tournament || {})) + '</span>';
  if (tournament && tournament.COUNTRY_NAME) {
    html += ' <span class="sp-c3-country">' + escH(tournament.COUNTRY_NAME) + '</span>';
  }
  html += '</div>';
  // Header — score line + state
  html += '<div class="sp-c3-header">';
  html += '<div class="sp-c3-state' + (state === 'live' ? ' live' : '') + '">';
  if (stLbl) html += escH(stLbl);
  if (time) html += ' · ' + escH(time);
  html += '</div>';
  html += '<div class="sp-c3-teams-row">';
  html += '<div class="sp-c3-team-name">' + escH(ev.HOME_NAME || '') + '</div>';
  html += '<div class="sp-c3-score">' +
    escH(ev.HOME_SCORE_CURRENT != null ? ev.HOME_SCORE_CURRENT : '–') + '</div>';
  html += '</div>';
  html += '<div class="sp-c3-teams-row">';
  html += '<div class="sp-c3-team-name">' + escH(ev.AWAY_NAME || '') + '</div>';
  html += '<div class="sp-c3-score">' +
    escH(ev.AWAY_SCORE_CURRENT != null ? ev.AWAY_SCORE_CURRENT : '–') + '</div>';
  html += '</div>';
  html += '</div>';

  // Markets section: for matched events, list ALL Kalshi markets
  // for this match (Winner, Spread, Total Points, Steals, etc.)
  // each with its own 'View' link to the full Kalshi modal. For
  // FL-only events, a 'no markets yet' placeholder that's
  // future-compatible with Polymarket / sportsbook integration.
  html += '<div class="sp-c3-section">';
  html += '<div class="sp-c3-section-head">Markets</div>';
  if (matched) {
    const markets = (ev.kalshi && ev.kalshi.markets) || [];
    html += '<div class="sp-c3-markets">';
    for (const m of markets) {
      const label = m.market_type || 'Winner';
      html += '<a class="sp-c3-market-row" href="/?event=' + escH(m.event_ticker) + '" target="_blank" rel="noopener">';
      html += '<span class="sp-c3-market-label">' + escH(label) + '</span>';
      html += '<span class="sp-c3-market-arrow">↗</span>';
      html += '</a>';
    }
    html += '</div>';
    html += '<div class="sp-c3-cta-sub">Click a market → opens the full Kalshi view in a new tab.</div>';
  } else {
    html += '<div class="sp-c3-no-market">No markets yet</div>';
    html += '<div class="sp-c3-cta-sub">Polymarket and sportsbook odds for this event will appear here once those integrations land.</div>';
  }
  html += '</div>';

  // Stats section: placeholder for now (Phase 2c will inline
  // the existing block components — Stats, Lineups, Player Stats —
  // pulled from /api/event/{ticker}/normalized for matched events
  // or directly from FL endpoints for FL-only events).
  html += '<div class="sp-c3-section">';
  html += '<div class="sp-c3-section-head">Stats</div>';
  html += '<div class="sp-c3-stats-placeholder">Stats panel coming in Phase 2c — Summary, Stats, Lineups, Player Stats blocks rendered inline here.</div>';
  html += '</div>';

  html += '</div>';
  col3.innerHTML = html;
}

// ── Column splitter: drag-to-resize for COL 1 and COL 3 ──
// Bounds: COL 1 in [200, 480]px, COL 3 in [320, 720]px. Below
// these the layout starts breaking; above wastes screen real
// estate. Persists to localStorage so user prefs survive reload.
//
// Disabled at <900px (mobile fallback uses single-column anyway).
// COL 3 max is dynamic — capped by viewport width minus a
// minimum-viable footprint for COL 1 + COL 2 (~480px combined),
// so on wide displays you can drag COL 3 to fill most of the
// screen for full event-detail real estate.
const SPLIT_BOUNDS = {
  col1: { min: 200, max: 480, default: 280, var: '--col1-w' },
  col3: { min: 320, max: 1400, default: 480, var: '--col3-w' },
};

function effectiveMax(key) {
  const b = SPLIT_BOUNDS[key];
  if (key === 'col3') {
    // Reserve at least 480px combined for COL 1 + COL 2 (sidebar
    // 200 + middle 280 minimum); the rest can go to COL 3.
    return Math.max(b.min, Math.min(b.max, window.innerWidth - 480));
  }
  return b.max;
}
const SPLIT_LS_KEY = 'sv:sports:cols';

function loadColWidths() {
  if (window.innerWidth < 900) return;
  let saved;
  try {
    saved = JSON.parse(localStorage.getItem(SPLIT_LS_KEY) || '{}');
  } catch (e) { saved = {}; }
  const main = document.getElementById('sp-main');
  for (const key of ['col1', 'col3']) {
    const b = SPLIT_BOUNDS[key];
    const max = effectiveMax(key);
    const w = saved[key];
    if (typeof w === 'number' && w >= b.min && w <= max) {
      main.style.setProperty(b.var, w + 'px');
    }
  }
}

function saveColWidth(key, px) {
  let saved;
  try {
    saved = JSON.parse(localStorage.getItem(SPLIT_LS_KEY) || '{}');
  } catch (e) { saved = {}; }
  saved[key] = px;
  try {
    localStorage.setItem(SPLIT_LS_KEY, JSON.stringify(saved));
  } catch (e) { /* localStorage may be unavailable in private mode */ }
}

function setupSplitter(splitterEl) {
  const key = splitterEl.dataset.resize;       // 'col1' or 'col3'
  const b = SPLIT_BOUNDS[key];
  const main = document.getElementById('sp-main');
  let dragging = false;
  let startX = 0;
  let startW = 0;

  function getCurrentW() {
    const cs = getComputedStyle(main).getPropertyValue(b.var).trim();
    return parseInt(cs, 10) || b.default;
  }

  function onDown(e) {
    if (window.innerWidth < 900) return;
    dragging = true;
    splitterEl.classList.add('dragging');
    startX = e.clientX;
    startW = getCurrentW();
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    let delta = e.clientX - startX;
    // COL 3 grows when you drag the right splitter LEFT (delta
    // negative shrinks main area, expanding col3). Invert for col3.
    if (key === 'col3') delta = -delta;
    const max = effectiveMax(key);
    let next = Math.max(b.min, Math.min(max, startW + delta));
    main.style.setProperty(b.var, next + 'px');
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    splitterEl.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    saveColWidth(key, getCurrentW());
  }

  splitterEl.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  // Double-click resets to default (Sofascore convention).
  splitterEl.addEventListener('dblclick', () => {
    main.style.setProperty(b.var, b.default + 'px');
    saveColWidth(key, b.default);
  });
}

// ── Live price WebSocket — same pattern as the homepage's
// PriceStream. Connects to /ws/prices, subscribes to the per-
// outcome market tickers we render, and patches chips in place
// when prices move. Flash animation matches the homepage.
//
// Self-contained (~80 lines) so sports.html doesn't have to
// pull the full bundle just for this.
const PriceWS = (function() {
  let ws = null;
  const subscribed = new Set();   // tickers we've asked for
  const handlers = [];            // onUpdate callbacks
  let retry = 0;
  let heartbeat = null;

  function connect() {
    try {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws/prices');
    } catch (e) { return scheduleReconnect(); }
    ws.onopen = () => {
      retry = 0;
      if (subscribed.size > 0) {
        ws.send(JSON.stringify({
          action: 'subscribe', tickers: Array.from(subscribed),
        }));
      }
      heartbeat = setInterval(() => {
        try { ws.send(JSON.stringify({action: 'ping'})); } catch (e) {}
      }, 25000);
    };
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      if (msg.type === 'price') dispatch(msg.ticker, msg.data);
      else if (msg.type === 'snapshot') {
        const u = msg.updates || [];
        for (let i = 0; i < u.length; i++) dispatch(u[i].ticker, u[i].data);
      }
    };
    ws.onclose = () => {
      if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
      scheduleReconnect();
    };
  }
  function scheduleReconnect() {
    retry = Math.min(retry + 1, 6);
    setTimeout(connect, Math.min(1000 * Math.pow(2, retry), 30000));
  }
  function dispatch(ticker, data) {
    for (const h of handlers) { try { h(ticker, data); } catch (e) {} }
  }
  return {
    connect: connect,
    subscribe: (tickers) => {
      const added = [];
      for (const t of tickers) {
        const u = String(t || '').toUpperCase();
        if (!u || subscribed.has(u)) continue;
        subscribed.add(u);
        added.push(u);
      }
      if (added.length && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({action: 'subscribe', tickers: added}));
      }
    },
    onUpdate: (cb) => handlers.push(cb),
  };
})();

// Apply a price update to the chip in COL 2 for a given ticker.
// data carries yes_bid / yes_ask / no_bid / no_ask in cents.
// On change: update text + add flash class (auto-clears via
// animationend listener).
function applyPriceUpdate(ticker, data) {
  if (!ticker) return;
  // Outcome rows carry data-ticker (event-level wrappers also do,
  // but those don't contain [data-fld] cells, so be specific).
  const row = document.querySelector(
    '.sp-c2-chip-row[data-ticker="' + ticker + '"]');
  if (!row) return;
  const updateField = (field, newVal, cls) => {
    if (newVal == null) return;
    // Coerce to integer cents — WS payloads may carry float
    // artefacts (56.000000000000001) that would render as long
    // decimals in the chip. Same fix as the API-side _to_cents().
    const intVal = Math.round(Number(newVal));
    if (!Number.isFinite(intVal)) return;
    const cell = row.querySelector('[data-fld="' + field + '"]');
    if (!cell) return;
    const newText = intVal + (field === 'prob' ? '%' : '¢');
    if (cell.textContent === newText) return;
    // Compare numeric value to choose flash direction.
    const oldNum = parseInt(cell.textContent, 10);
    const direction = isNaN(oldNum) || intVal === oldNum ? '' :
                      (intVal > oldNum ? 'sp-flash-up' : 'sp-flash-down');
    cell.textContent = newText;
    if (direction) {
      cell.classList.remove('sp-flash-up', 'sp-flash-down');
      // Force reflow so the animation restarts even if the same
      // class was just removed.
      void cell.offsetWidth;
      cell.classList.add(direction);
    }
  };
  if (data.yes_bid != null) updateField('prob', data.yes_bid);
  if (data.yes_ask != null) updateField('yes',  data.yes_ask);
  if (data.no_ask  != null) updateField('no',   data.no_ask);
}

PriceWS.onUpdate(applyPriceUpdate);
PriceWS.connect();

// After events render, gather all price-row tickers and subscribe
// to them. Hook into renderCol2's tail by wrapping the original.
const _origRenderCol2 = renderCol2;
renderCol2 = function() {
  _origRenderCol2();
  const tickers = [];
  document.querySelectorAll('.sp-c2-chip-row[data-ticker]').forEach(el => {
    const t = el.dataset.ticker;
    if (t) tickers.push(t);
  });
  if (tickers.length) PriceWS.subscribe(tickers);
};

// Calendar modal — close button, backdrop click, month nav,
// Today button. Wired once at init since the modal lives in the
// static body markup (not re-rendered).
document.getElementById('sp-cal-close').addEventListener('click', closeCalendar);
document.getElementById('sp-cal-overlay').addEventListener('click', (e) => {
  // Only close if click was on the backdrop, not the modal itself.
  if (e.target.id === 'sp-cal-overlay') closeCalendar();
});
document.getElementById('sp-cal-month-prev').addEventListener('click', () => {
  _calendarMonth = new Date(_calendarMonth.getFullYear(), _calendarMonth.getMonth() - 1, 1);
  renderCalendar();
});
document.getElementById('sp-cal-month-next').addEventListener('click', () => {
  _calendarMonth = new Date(_calendarMonth.getFullYear(), _calendarMonth.getMonth() + 1, 1);
  renderCalendar();
});
document.getElementById('sp-cal-today').addEventListener('click', () => {
  setIndentDays(0);
  closeCalendar();
});
// Esc closes the calendar.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && _calendarOpen) closeCalendar();
});

// Day-picker — left/right arrows + center label (opens calendar
// modal). Static markup in COL 1 next to the state pills, so we
// wire once at init rather than on every renderCol2.
const dpPrev = document.getElementById('sp-c2-dp-prev');
const dpNext = document.getElementById('sp-c2-dp-next');
const dpLabel = document.getElementById('sp-c2-dp-label');
if (dpPrev) dpPrev.addEventListener('click', () => setIndentDays(_indentDays - 1));
if (dpNext) dpNext.addEventListener('click', () => setIndentDays(_indentDays + 1));
if (dpLabel) dpLabel.addEventListener('click', openCalendar);
refreshDayPickerUI();

// Initial load
loadColWidths();
// Tennis sport needs a wider score column (sets/serve/games/point
// breakdown). Set the body class once on load — the CSS variable
// --sp-score-w switches based on this.
if (activeSportId() === 2) document.body.classList.add('sport-tennis');
document.querySelectorAll('.sp-splitter').forEach(setupSplitter);
loadSportNav();
loadEvents();
// Start the live-clock ticker once on init — it self-skips when
// no .sp-c2-time-state.live spans are in the DOM, so the cost
// while no live games are showing is one querySelectorAll every
// 30 s. Idle.
startLiveTick();
</script>

<!-- Calendar modal — toggled by the day-picker label. Sofascore-
     style month grid with Today button. Renders into this fixed
     container so it overlays the COL layout. -->
<div class="sp-cal-overlay" id="sp-cal-overlay" hidden>
  <div class="sp-cal-modal" role="dialog" aria-label="Pick a date">
    <button class="sp-cal-close" id="sp-cal-close" type="button" aria-label="Close">×</button>
    <div class="sp-cal-month-row">
      <button class="sp-cal-month-arrow" id="sp-cal-month-prev" type="button" aria-label="Previous month">‹</button>
      <div class="sp-cal-month-name" id="sp-cal-month-name"></div>
      <button class="sp-cal-month-arrow" id="sp-cal-month-next" type="button" aria-label="Next month">›</button>
    </div>
    <div class="sp-cal-weekdays">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div class="sp-cal-grid" id="sp-cal-grid"></div>
    <button class="sp-cal-today-btn" id="sp-cal-today" type="button">TODAY</button>
  </div>
</div>

</body>
