<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stochverse — Sports</title>

<!-- Theme variables shared with index.html so the dark look is identical.
     If you tweak palette here, mirror it in static/index.html lines 10-12. -->
<style>
:root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--border:#1a1a1a;--green:#00ff00;--green-dim:#00aa00;--green-line:#0a3f0a;--green-bg:#001500;--red:#ff3333;--text:#fff;--text-dim:#888;--text-muted:#444;--bg-card:rgba(255,255,255,0.04);--bg-card-hover:rgba(255,255,255,0.07)}
:root{--header-h:56px;--sport-nav-h:48px;--col1-w:280px;--col3-w:480px;--sp-score-w:40px}
/* Tennis needs the full sets/serve/games/point breakdown — wider
   score column. Activated by `body.sport-tennis` set on page load
   from the URL's sport_id. */
body.sport-tennis{--sp-score-w:80px}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.4;height:100%;overflow:hidden}

/* Header (compact — link back to home, page title) */
.sp-header{height:var(--header-h);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:30}
.sp-logo{font-size:16px;font-weight:700;color:var(--green);text-decoration:none;letter-spacing:.5px}
.sp-logo:hover{color:var(--green-dim)}
.sp-header-spacer{flex:1}
.sp-header a.sp-back{color:var(--text-dim);text-decoration:none;font-size:12px;padding:6px 10px;border-radius:4px}
.sp-header a.sp-back:hover{color:var(--text);background:var(--bg-card)}

/* Top sport nav strip — horizontally scrollable, with edge fade
   gradients and arrow buttons that surface when content overflows.
   Tab-style layout (uppercase text, active-state underline) matches
   the COL 1 sub-tabs for a coherent header system. */
.sp-nav-wrap{position:relative;height:var(--sport-nav-h);border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center}
.sp-nav{flex:1;display:flex;align-items:center;gap:0;padding:0 36px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;white-space:nowrap;height:100%;scroll-behavior:smooth}
.sp-nav::-webkit-scrollbar{display:none}
.sp-nav-item{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:100%;cursor:pointer;color:var(--text-dim);font-size:11px;font-weight:600;background:transparent;border:0;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;text-decoration:none;transition:color .12s ease,border-color .12s ease;white-space:nowrap;font-family:inherit}
.sp-nav-item:hover{color:var(--text)}
.sp-nav-item.active{color:var(--green);border-bottom-color:var(--green)}
.sp-nav-count{font-size:9px;font-weight:600;padding:1px 5px;border-radius:7px;background:var(--bg-card);color:var(--text-muted);font-variant-numeric:tabular-nums;letter-spacing:0;text-transform:none}
.sp-nav-item.active .sp-nav-count{background:var(--green-bg);color:var(--green)}
/* Edge fades: hint that content extends past the visible area.
   Become invisible when the nav is at the start/end of its scroll. */
.sp-nav-fade{position:absolute;top:0;bottom:0;width:36px;pointer-events:none;z-index:1;transition:opacity .15s ease}
.sp-nav-fade-l{left:32px;background:linear-gradient(to right, var(--bg) 0%, transparent 100%)}
.sp-nav-fade-r{right:32px;background:linear-gradient(to left, var(--bg) 0%, transparent 100%)}
.sp-nav-fade.hidden{opacity:0}
/* Scroll arrow buttons — sit on either edge, click to scroll
   the strip ~200px in that direction. Hidden when no overflow. */
.sp-nav-arrow{flex-shrink:0;width:32px;height:100%;background:var(--bg);color:var(--text-dim);border:0;border-bottom:1px solid transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;z-index:2;transition:color .12s ease,opacity .15s ease}
.sp-nav-arrow:hover{color:var(--green)}
.sp-nav-arrow.hidden{opacity:0;pointer-events:none}
.sp-nav-arrow-l{border-right:1px solid var(--border)}
.sp-nav-arrow-r{border-left:1px solid var(--border)}

/* Main 3-column grid. Heights are calculated so each column
   gets its own scrollbar without page-level scroll. The grid uses
   --col1-w / --col3-w which user-resizable splitters update via
   inline style + localStorage persistence (init.js). */
.sp-main{display:grid;grid-template-columns:var(--col1-w) 4px 1fr 4px var(--col3-w);height:calc(100vh - var(--header-h) - var(--sport-nav-h));overflow:hidden}
.sp-col{height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sp-col::-webkit-scrollbar{width:8px}
.sp-col::-webkit-scrollbar-track{background:transparent}
.sp-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sp-col::-webkit-scrollbar-thumb:hover{background:#333}
.sp-col1{background:var(--bg)}
.sp-col2{background:var(--bg)}
.sp-col3{background:var(--bg2)}
/* Splitter bars between columns. Thin, dark, hoverable green so
   users can find them without crowding the layout. Drag handler
   in JS updates --col1-w / --col3-w on the .sp-main element. */
.sp-splitter{background:var(--border);cursor:col-resize;position:relative;transition:background .12s ease}
.sp-splitter:hover,.sp-splitter.dragging{background:var(--green-line)}
.sp-splitter::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:24px;background:var(--text-muted);border-radius:1px;opacity:0;transition:opacity .12s ease}
.sp-splitter:hover::after,.sp-splitter.dragging::after{opacity:.6}

/* COL 1 — leagues sidebar.
   Each tournament = collapsible group with country flag/name + count. */
.sp-c1-tabs{display:flex;border-bottom:1px solid var(--border);font-size:12px}
.sp-c1-tab{flex:1;text-align:center;padding:10px 8px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;font-weight:500}
.sp-c1-tab:hover{color:var(--text)}
.sp-c1-tab.active{color:var(--green);border-bottom-color:var(--green)}
.sp-c1-filters{display:flex;gap:6px;padding:10px 12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.sp-c1-filter{font-size:11px;padding:5px 10px;border-radius:14px;background:var(--bg-card);color:var(--text-dim);cursor:pointer;border:1px solid transparent;font-weight:500}
.sp-c1-filter:hover{color:var(--text)}
.sp-c1-filter.active{background:var(--red);color:#fff;border-color:var(--red)}
.sp-c1-list{padding:6px 0}
.sp-c1-league{padding:7px 12px 7px 28px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-dim);border-left:2px solid transparent}
.sp-c1-league:hover{background:var(--bg-card)}
.sp-c1-league:hover .sp-c1-league-name{color:var(--text)}
.sp-c1-league.active{background:var(--green-bg);border-left-color:var(--green)}
.sp-c1-league.active .sp-c1-league-name{color:var(--green)}
.sp-c1-league-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.sp-c1-league-name{color:var(--text);font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.sp-c1-league-count{font-size:10px;font-variant-numeric:tabular-nums;color:var(--text-muted);flex-shrink:0}
/* All-leagues entry at top — no country wrapper, full padding. */
.sp-c1-league.sp-c1-all{padding-left:14px;font-weight:600}
.sp-c1-league.sp-c1-all .sp-c1-league-name{color:var(--text)}
/* Country section header — collapsible, all-caps small. */
.sp-c1-country{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);cursor:pointer;font-size:10px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--border);user-select:none}
.sp-c1-country:hover{background:var(--bg-card)}
.sp-c1-country-arrow{color:var(--text-dim);font-size:9px;width:10px;display:inline-block;transition:transform .12s ease}
.sp-c1-country.collapsed .sp-c1-country-arrow{transform:rotate(-90deg)}
.sp-c1-country-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-c1-country-count{color:var(--text-muted);font-weight:500;font-variant-numeric:tabular-nums}

/* COL 2 — events list grouped by tournament.
   Each tournament has a header + collapsible list of event rows. */
.sp-c2-empty{padding:60px 24px;text-align:center;color:var(--text-muted);font-size:13px}
/* Summary header at top of COL 2 — total event count + matched count. */
.sp-c2-summary{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);position:sticky;top:0;z-index:5}
/* Filter pills in COL 2 summary — 'All events' and 'On Kalshi'
   are mutually-exclusive; styled identically so they read as a
   pair. Inactive: outlined dim. Active: solid green. */
.sp-c2-summary-pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:11px;background:transparent;color:var(--text-dim);font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-family:inherit;transition:background .12s ease,color .12s ease,border-color .12s ease;font-variant-numeric:tabular-nums}
.sp-c2-summary-pill:hover{color:var(--text);border-color:var(--text-dim)}
.sp-c2-summary-pill.active{background:var(--green-bg);color:var(--green);border-color:var(--green-line)}
.sp-c2-summary-pill.active:hover{background:var(--green-line)}
/* Game / Market view toggle — pushed to the right side of the
   summary bar. Mirrors the homepage's GRID/LIST switcher. */
.sp-c2-viewtoggle{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.sp-c2-summary{display:flex;align-items:center;gap:8px}
.sp-c2-vt-btn{padding:3px 10px;background:transparent;color:var(--text-dim);border:0;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .12s ease,color .12s ease}
.sp-c2-vt-btn:hover{color:var(--text)}
.sp-c2-vt-btn.active{background:var(--green-bg);color:var(--green)}
.sp-c2-vt-btn + .sp-c2-vt-btn{border-left:1px solid var(--border)}
/* +N markets badge — sits next to the K in the indicator column
   in Game view. Tiny, inline, communicates the market count
   without taking up its own grid cell. */
.sp-c2-count-badge{display:inline-block;font-size:9px;font-weight:700;color:var(--green);background:transparent;padding-left:1px;letter-spacing:.2px}
.sp-c2-indicator{flex-direction:column;gap:2px}
/* Market-type label — small dim line under team names in Market
   view so users know which market the row is about. */
.sp-c2-market-type{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;font-weight:600}
/* Market-type tab strip below the summary in Game view. Lets
   user pick which Kalshi sub-market is shown across all rows
   (Winner, Spread, Total Points, etc.). Hidden in Market view
   where each market becomes its own row. */
.sp-c2-tournament{border-bottom:1px solid var(--border)}
.sp-c2-tournament-head{padding:10px 14px;background:var(--bg2);display:flex;align-items:baseline;gap:8px;border-top:1px solid var(--border)}
.sp-c2-league-name{font-size:12px;font-weight:700;color:var(--text);letter-spacing:.3px}
.sp-c2-country{font-size:10px;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px}
.sp-c2-events{padding:0}
/* Event = vertical container holding optional per-event tab strip
   on top + the main grid row. Click + selection styles live on
   the wrapper so a click anywhere selects the event (tabs stop
   propagation). */
.sp-c2-event{display:flex;flex-direction:column;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s ease;border-left:2px solid transparent}
.sp-c2-event:hover{background:var(--bg-card)}
.sp-c2-event.selected{background:var(--green-bg);border-left-color:var(--green)}
.sp-c2-event:last-child{border-bottom:none}
.sp-c2-event-row{display:grid;grid-template-columns:20px 64px 1fr var(--sp-score-w) 180px;gap:8px;padding:10px 14px;align-items:start}
/* Per-event tab strip — appears at the top of matched events that
   have multiple market types. Sits inside the event's accent
   border, so visually it belongs to THIS event. Horizontal scroll
   when the strip overflows. */
.sp-c2-event-tabs{display:flex;gap:14px;padding:8px 14px 0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;overflow-x:auto;scrollbar-width:none}
.sp-c2-event-tabs::-webkit-scrollbar{display:none}
.sp-c2-event-tab{background:transparent;border:0;color:var(--text-muted);font-weight:700;font-size:9px;padding:2px 0;cursor:pointer;font-family:inherit;letter-spacing:.4px;text-transform:uppercase;border-bottom:2px solid transparent;flex-shrink:0;transition:color .12s ease,border-color .12s ease}
.sp-c2-event-tab:hover{color:var(--text)}
.sp-c2-event-tab.active{color:var(--green);border-bottom-color:var(--green)}
/* Matched (Kalshi market exists) gets a subtle accent. Lite (FL only)
   stays neutral so the eye is drawn to actionable rows. */
.sp-c2-event.sp-c2-matched .sp-c2-team{color:var(--text)}
.sp-c2-event.sp-c2-lite .sp-c2-team{color:var(--text-dim)}
/* Left indicator column — Kalshi marker for matched rows. Empty
   for lite rows (kept as a column so all rows align). When
   Polymarket / sportsbook integrations land, the same column
   will stack additional source markers (P, DK, FD, ...). */
.sp-c2-indicator{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.sp-c2-kalshi-badge{display:inline-flex;width:18px;height:18px;line-height:1;border-radius:50%;background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;align-items:center;justify-content:center;border:1px solid var(--green-line)}
/* Right market cell — Kalshi PROB / YES / NO chip rows aligned
   1:1 with the outcome labels in the teams cell to the left.
   Each row's data-ticker is the WS subscription target. Future
   Polymarket / sportsbook chips will stack into additional rows
   here. */
.sp-c2-marketcell{display:flex;flex-direction:column;gap:2px;font-size:10px;font-variant-numeric:tabular-nums;align-self:start}
.sp-c2-chip-row{display:grid;grid-template-columns:32px 1fr 1fr;gap:4px;align-items:center;min-height:18px}
.sp-c2-prob{color:var(--text-dim);text-align:right;font-size:10px;font-weight:500}
.sp-c2-yes{color:var(--green);font-weight:700;padding:2px 0;border-radius:3px;background:transparent;border:1px solid var(--green-line);text-align:center;font-size:10px;line-height:1}
.sp-c2-no{color:var(--red);font-weight:700;padding:2px 0;border-radius:3px;background:transparent;border:1px solid #4d1a1a;text-align:center;font-size:10px;line-height:1}
.sp-c2-price-empty{color:var(--text-muted);text-align:center;font-size:10px}
.sp-c2-no-market{color:var(--text-muted);font-size:14px}
/* Price update flash — same pattern as the homepage cards.
   Green when bid moves up, red when down. Auto-clears after
   the animation completes (0.9s). */
@keyframes sp-flash-up{0%{background-color:rgba(0,255,0,0.55)}100%{background-color:transparent}}
@keyframes sp-flash-down{0%{background-color:rgba(255,51,51,0.55)}100%{background-color:transparent}}
.sp-c2-yes.sp-flash-up,.sp-c2-no.sp-flash-up,.sp-c2-prob.sp-flash-up{animation:sp-flash-up 0.9s ease-out}
.sp-c2-yes.sp-flash-down,.sp-c2-no.sp-flash-down,.sp-c2-prob.sp-flash-down{animation:sp-flash-down 0.9s ease-out}
/* Per-tournament column header strip — sits between the
   tournament name and its first event row. Matches the .sp-c2-event
   grid so 'Score' lines up with the score column and 'Kalshi
   (PROB / YES / NO)' lines up with the chip columns. Renders
   only when at least one event in the tournament has a Kalshi
   match — otherwise there'd be nothing to label. */
.sp-c2-tournament-cols{display:grid;grid-template-columns:20px 64px 1fr var(--sp-score-w) 180px;gap:8px;padding:4px 14px 6px;background:transparent;border-bottom:1px solid var(--border);font-size:8px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.sp-c2-tcol-score{text-align:center;align-self:end}
/* Kalshi cell — single 3-column grid with two rows. The KALSHI
   title spans cols 2-3 only (above YES + NO, NOT above PROB) so
   it centers between the two chip columns. PROB / YES / NO labels
   sit on row 2 directly above their chip columns in the rows
   below. All labels share the parent's 8px so SCORE / PROB / YES /
   NO render at the same visual weight. */
.sp-c2-tcol-kalshi{display:grid;grid-template-columns:32px 1fr 1fr;grid-template-rows:auto auto;gap:0 4px}
.sp-c2-tcol-kalshi-title{grid-column:2 / 4;grid-row:1;text-align:center;color:var(--text);padding-bottom:1px}
.sp-c2-tcol-kalshi .lh-prob{grid-column:1;grid-row:2;text-align:right;color:var(--text-muted)}
.sp-c2-tcol-kalshi .lh-yes{grid-column:2;grid-row:2;text-align:center;color:var(--green)}
.sp-c2-tcol-kalshi .lh-no{grid-column:3;grid-row:2;text-align:center;color:var(--red)}
/* Load-more toggle inside the teams cell — green text link
   appearing under the visible outcomes when there are more than
   4 to display. Click expands / collapses the full list. */
.sp-c2-loadmore{background:transparent;border:none;color:var(--green);font-size:9px;font-weight:700;padding:2px 0;text-align:left;cursor:pointer;text-transform:uppercase;letter-spacing:.4px}
.sp-c2-loadmore:hover{text-decoration:underline}
.sp-c2-time{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
.sp-c2-time-state{display:block;font-size:10px;color:var(--text-muted);margin-top:2px;text-transform:uppercase}
.sp-c2-time-state.live{color:var(--red);font-weight:700}
.sp-c2-teams{font-size:13px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.sp-c2-team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Matchup header inside the teams cell — shown for matched events
   that are displaying sub-market outcomes (BTTS / Totals / First
   Goalscorer / Spreads / etc.). Carries the actual fixture name
   ('Bayern vs Barcelona') above the outcome labels so users can
   tell which game the row refers to even when outcome labels
   don't include team names. */
.sp-c2-matchup{font-size:11px;font-weight:600;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-bottom:2px;margin-bottom:2px;border-bottom:1px dashed var(--border)}
.sp-c2-scores{font-size:13px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;display:flex;flex-direction:column;gap:2px}
.sp-c2-agg{font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
/* Empty chip-row spacer — used when the teams cell shows a
   matchup header (sub-market views). Pushes the first real chip
   row down by one row so each chip aligns with its outcome label
   below the matchup header instead of with the header itself.
   Same height as a chip row so vertical alignment matches. */
.sp-c2-chip-spacer{min-height:18px}
/* Tennis score cell — replaces the simple home/away score with
   the full sets / serve-dot / games / current-point breakdown
   that matches the homepage tennis-row format. Width comes from
   the --sp-score-w variable (set wider for the tennis sport
   page so all 4 sub-cells fit). */
.sp-c2-scores.tennis-score{display:flex;flex-direction:column;gap:2px;text-align:left}
.sp-c2-scores .tn-row{display:grid;grid-template-columns:14px 8px 18px 24px;gap:4px;align-items:center;font-size:11px;font-weight:700;line-height:1}
.sp-c2-scores .tn-sets{text-align:center;color:var(--text-muted);font-weight:600}
.sp-c2-scores .tn-serve{color:var(--green);font-size:9px;text-align:center}
.sp-c2-scores .tn-games{text-align:center;color:var(--text)}
.sp-c2-scores .tn-point{text-align:center;color:var(--text-dim);font-weight:600}
.sp-c2-fav{color:var(--text-muted);text-align:center;cursor:pointer;font-size:14px}
.sp-c2-fav:hover{color:var(--green)}

/* COL 3 — event detail panel placeholder.
   Will be populated by the bundle's renderer once an event is
   selected. The placeholder lives here for both empty-state and
   loading-state. */
.sp-c3-empty{padding:80px 32px;text-align:center;color:var(--text-muted);font-size:13px}
.sp-c3-empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.sp-c3-empty-title{font-size:14px;color:var(--text-dim);margin-bottom:6px}
.sp-c3-empty-hint{font-size:12px;color:var(--text-muted)}
/* COL 3 populated detail */
.sp-c3-detail{padding:16px}
.sp-c3-tournament{font-size:11px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.sp-c3-league-name{color:var(--text);font-weight:600}
.sp-c3-country{color:var(--text-muted)}
.sp-c3-header{padding:14px 0 18px;border-bottom:1px solid var(--border);margin-bottom:18px}
.sp-c3-state{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sp-c3-state.live{color:var(--red);font-weight:700}
.sp-c3-teams-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:15px}
.sp-c3-team-name{color:var(--text);font-weight:600}
.sp-c3-score{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;font-size:18px}
.sp-c3-section{margin-bottom:18px}
.sp-c3-section-head{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:10px}
.sp-c3-cta{display:inline-block;padding:8px 14px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-line);border-radius:4px;text-decoration:none;font-size:12px;font-weight:600;letter-spacing:.3px;transition:background .12s ease,color .12s ease}
.sp-c3-cta:hover{background:var(--green);color:var(--bg)}
.sp-c3-cta-sub{font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.4}
/* Markets list in COL 3 — one row per market type for matched
   events. Each row links to the existing /?event=ticker modal. */
.sp-c3-markets{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.sp-c3-market-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;text-decoration:none;color:var(--text);font-size:12px;font-weight:500;transition:background .12s ease,border-color .12s ease}
.sp-c3-market-row:hover{background:var(--green-bg);border-color:var(--green-line);color:var(--green)}
.sp-c3-market-label{flex:1}
.sp-c3-market-arrow{color:var(--text-dim);font-size:12px;margin-left:8px}
.sp-c3-market-row:hover .sp-c3-market-arrow{color:var(--green)}
.sp-c3-no-market{color:var(--text-dim);font-size:13px;font-style:italic}
.sp-c3-stats-placeholder{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.5;padding:8px 0}

/* Mobile fallback — collapse to single column with the existing
   modal pattern. COL 1 + COL 3 hidden, COL 2 expands full-width.
   Click an event card → open existing modal (if matched ticker)
   or a basic FL detail view (TODO when COL 3 ships). */
@media (max-width:900px){
  :root{--col1-w:0;--col3-w:0}
  .sp-main{grid-template-columns:1fr}
  .sp-col1,.sp-col3{display:none}
  .sp-col2{border-right:none}
  .sp-c2-event{grid-template-columns:56px 1fr 50px 28px}
}
</style>
<!--__ANALYTICS__-->
</head>
<body>

<header class="sp-header">
  <a class="sp-logo" href="/">STOCHVERSE</a>
  <div class="sp-header-spacer"></div>
  <a class="sp-back" href="/">← Markets</a>
</header>

<!-- Top sport nav: populated from /api/fl/sports-list + counts.
     Active sport pulled from the URL path (/sports/:sport_id).
     Wrapper holds scroll-affordance arrows + edge fades so users
     discover that the strip overflows on narrow viewports. -->
<div class="sp-nav-wrap" aria-label="Sport selector">
  <button class="sp-nav-arrow sp-nav-arrow-l hidden" id="sp-nav-arrow-l"
          type="button" title="Scroll left" aria-label="Scroll sports left">‹</button>
  <div class="sp-nav-fade sp-nav-fade-l hidden" id="sp-nav-fade-l"></div>
  <nav class="sp-nav" id="sp-nav">
    <span style="color:var(--text-muted);padding:0 14px;font-size:12px">Loading sports…</span>
  </nav>
  <div class="sp-nav-fade sp-nav-fade-r hidden" id="sp-nav-fade-r"></div>
  <button class="sp-nav-arrow sp-nav-arrow-r hidden" id="sp-nav-arrow-r"
          type="button" title="Scroll right" aria-label="Scroll sports right">›</button>
</div>

<main class="sp-main" id="sp-main">

  <!-- COL 1 — leagues sidebar -->
  <aside class="sp-col sp-col1" id="sp-col1">
    <div class="sp-c1-tabs">
      <div class="sp-c1-tab active" data-tab="all">All</div>
      <div class="sp-c1-tab" data-tab="favourites">Favourites</div>
      <div class="sp-c1-tab" data-tab="competitions">Competitions</div>
    </div>
    <div class="sp-c1-filters" id="sp-c1-filters">
      <span class="sp-c1-filter active" data-state="all">All</span>
      <span class="sp-c1-filter" data-state="live">Live</span>
      <span class="sp-c1-filter" data-state="finished">Finished</span>
      <span class="sp-c1-filter" data-state="upcoming">Upcoming</span>
    </div>
    <div class="sp-c1-list" id="sp-c1-list">
      <div style="padding:24px 14px;color:var(--text-muted);font-size:12px;text-align:center">Loading leagues…</div>
    </div>
  </aside>

  <!-- Splitter between COL 1 and COL 2. Drag to resize COL 1
       width; persists to localStorage via splitter.js. -->
  <div class="sp-splitter" id="sp-split-1" data-resize="col1"
       title="Drag to resize"></div>

  <!-- COL 2 — events stream, grouped by tournament -->
  <section class="sp-col sp-col2" id="sp-col2">
    <div class="sp-c2-empty" id="sp-col2-empty">Loading events…</div>
  </section>

  <!-- Splitter between COL 2 and COL 3. Drag to resize COL 3
       width (from the right edge); same persistence. -->
  <div class="sp-splitter" id="sp-split-2" data-resize="col3"
       title="Drag to resize"></div>

  <!-- COL 3 — selected event detail. Placeholder until COL 3
       wiring lands in the next commit. -->
  <aside class="sp-col sp-col3" id="sp-col3">
    <div class="sp-c3-empty">
      <div class="sp-c3-empty-icon">⊙</div>
      <div class="sp-c3-empty-title">Select an event</div>
      <div class="sp-c3-empty-hint">Click any match in the list to see details, stats, and odds here.</div>
    </div>
  </aside>

</main>

<script type="module">
// Phase 2a wiring — top nav, COL 1, COL 2.
// COL 3 detail rendering ships in a follow-up commit so the user
// can visually verify the scaffold + nav + leagues + events first.

// (Sport icons removed per visual feedback — uppercase text-only
// labels with active-state underline read more professional.)

// Pull active sport_id from URL path (/sports/3 → 3) or query string.
function activeSportId() {
  const parts = (location.pathname || '').split('/').filter(Boolean);
  if (parts[0] === 'sports' && parts[1]) {
    const n = parseInt(parts[1], 10);
    if (!isNaN(n) && n >= 1 && n <= 42) return n;
  }
  return 1;  // default soccer
}

function escH(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Top sport nav — populate from /api/fl/sports-list + events-count.
async function loadSportNav() {
  const nav = document.getElementById('sp-nav');
  let sportsListData, countsData;
  try {
    const tz = -new Date().getTimezoneOffset() / 60;
    const [r1, r2] = await Promise.all([
      fetch('/api/fl/sports-list').then(r => r.json()),
      fetch('/api/fl/sports-events-count?timezone=' + Math.round(tz))
        .then(r => r.json()).catch(() => null),
    ]);
    sportsListData = r1;
    countsData = r2;
  } catch (e) {
    nav.innerHTML = '<span style="color:var(--red);padding:0 14px;font-size:12px">Failed to load sports</span>';
    return;
  }
  if (sportsListData.error) {
    nav.innerHTML = '<span style="color:var(--red);padding:0 14px;font-size:12px">' + escH(sportsListData.error) + '</span>';
    return;
  }
  const sports = (sportsListData.data && sportsListData.data.DATA) || [];
  // Build count map by sport_id from /events-count if available.
  // FL's response shape isn't strictly an array — defensively
  // handle both array (DATA: [{SPORT_ID, COUNT}, ...]) and object
  // (DATA: {1: 37, 2: 8, ...} — sport_id keyed) variants. Throws
  // were silent until v0.6.7 broke the nav loader entirely.
  const counts = {};
  let cdRaw = countsData && countsData.data && countsData.data.DATA;
  if (Array.isArray(cdRaw)) {
    for (const c of cdRaw) {
      const sid = c.SPORT_ID || c.ID;
      const n = c.LIVE_EVENT_COUNT || c.EVENT_COUNT || c.COUNT;
      if (sid != null && n != null) counts[sid] = n;
    }
  } else if (cdRaw && typeof cdRaw === 'object') {
    for (const sid of Object.keys(cdRaw)) {
      const n = cdRaw[sid];
      if (n != null && typeof n === 'number') counts[sid] = n;
    }
  }
  // Legacy unused vars for the loop below; preserved to match
  // earlier shape but skip the iteration since counts is already
  // built. Replaces the broken `for (const c of cd)` loop.
  const cd = [];
  for (const c of cd) {
    const sid = c.SPORT_ID || c.ID;
    const n = c.LIVE_EVENT_COUNT || c.EVENT_COUNT || c.COUNT;
    if (sid != null && n != null) counts[sid] = n;
  }
  const active = activeSportId();
  let html = '';
  for (const s of sports) {
    const sid = s.ID;
    const name = (s.NAME || '').toLowerCase()
      .replace(/_/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
    const count = counts[sid];
    const cls = 'sp-nav-item' + (sid === active ? ' active' : '');
    html += '<a class="' + cls + '" href="/sports/' + sid + '">';
    html += '<span class="sp-nav-name">' + escH(name) + '</span>';
    if (count != null && count > 0) {
      html += '<span class="sp-nav-count">' + escH(count) + '</span>';
    }
    html += '</a>';
  }
  nav.innerHTML = html;
  setupNavScroll();
}

// Sport-nav scroll affordance: arrow buttons + edge fades that
// surface when the strip overflows. Arrows scroll the strip ~200px
// per click. Fades indicate there's more content past the visible
// edge. Both update on scroll/resize.
function setupNavScroll() {
  const nav = document.getElementById('sp-nav');
  const aL = document.getElementById('sp-nav-arrow-l');
  const aR = document.getElementById('sp-nav-arrow-r');
  const fL = document.getElementById('sp-nav-fade-l');
  const fR = document.getElementById('sp-nav-fade-r');
  if (!nav || !aL || !aR || !fL || !fR) return;

  function update() {
    const sl = nav.scrollLeft;
    const sw = nav.scrollWidth;
    const cw = nav.clientWidth;
    const overflow = sw > cw + 1;
    const atStart = sl < 4;
    const atEnd = sl + cw >= sw - 4;
    aL.classList.toggle('hidden', !overflow || atStart);
    aR.classList.toggle('hidden', !overflow || atEnd);
    fL.classList.toggle('hidden', !overflow || atStart);
    fR.classList.toggle('hidden', !overflow || atEnd);
  }

  aL.onclick = () => { nav.scrollBy({ left: -240, behavior: 'smooth' }); };
  aR.onclick = () => { nav.scrollBy({ left:  240, behavior: 'smooth' }); };
  nav.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  // Initial after content has rendered.
  requestAnimationFrame(update);
}

// COL 1 + COL 2 — fetch events for the active sport, group by
// tournament. COL 1 lists tournaments with counts; COL 2 lists
// events grouped under tournament headers.
let _eventsCache = null;
let _matchedKalshiCount = 0;
let _selectedEventId = null;     // currently-selected FL EVENT_ID for COL 3
let _selectedTicker = null;      // currently-selected Kalshi ticker (Market view)
let _activeStateFilter = 'all';
let _activeLeagueFilter = null;  // tournament_stage_id, or null = all
let _onlyMatched = false;        // toggled by clicking the "X on Kalshi" pill
let _viewMode = 'game';          // 'game' (one row per match) or 'market' (one row per ticker)
// Per-event active market type, keyed by EVENT_ID. Default '' = headline Winner.
// Each matched event with multiple market types renders its own
// inline tab strip — clicking a tab updates this map and re-renders
// just that event's outcomes/chips. Replaces the old global
// _activeMarketType tab strip at the top of COL 2 (felt disconnected
// from the events; per-event matches the homepage card design).
const _eventActiveMarketType = new Map();
const _collapsedCountries = new Set();  // Set of country names
const _expandedEvents = new Set();      // Event IDs with full outcome list shown (Load more toggled)

// View mode persists across reloads — same pattern as the
// column splitter widths.
const VIEW_LS_KEY = 'sv:sports:view';
try {
  const saved = localStorage.getItem(VIEW_LS_KEY);
  if (saved === 'game' || saved === 'market') _viewMode = saved;
} catch (e) { /* private mode */ }

async function loadEvents() {
  const sid = activeSportId();
  const col1 = document.getElementById('sp-c1-list');
  const col2 = document.getElementById('sp-col2');
  col1.innerHTML = '<div style="padding:24px 14px;color:var(--text-muted);font-size:12px;text-align:center">Loading…</div>';
  col2.innerHTML = '<div class="sp-c2-empty">Loading events…</div>';
  try {
    // Phase 2b: use the merged feed endpoint instead of raw FL list.
    // Response: {tournaments: [{TOURNAMENT_STAGE_ID, NAME, COUNTRY_NAME,
    //   events: [{...FL fields..., kalshi: {event_ticker} | null}]}]}.
    // Each event carries a .kalshi field — rich (matched market) vs
    // lite (FL-only, no markets yet).
    const r = await fetch('/api/sports/' + sid + '/feed?indent_days=0');
    const json = await r.json();
    if (json.error) {
      col2.innerHTML = '<div class="sp-c2-empty">' + escH(json.error) + '</div>';
      col1.innerHTML = '';
      return;
    }
    _eventsCache = json.tournaments || [];
    _matchedKalshiCount = json.matched_kalshi_count || 0;
    renderCol1();
    renderCol2();
  } catch (e) {
    col2.innerHTML = '<div class="sp-c2-empty" style="color:var(--red)">Failed to load events.</div>';
    col1.innerHTML = '';
  }
}

function eventState(ev) {
  // STAGE_TYPE: SCHEDULED | LIVE | FINISHED. Falls back to
  // STAGE if not present (older payloads). Anything starting
  // with HALF/SET/QUARTER/INNING/PERIOD/EXTRA is live.
  const t = (ev.STAGE_TYPE || '').toUpperCase();
  if (t === 'LIVE') return 'live';
  if (t === 'FINISHED') return 'finished';
  if (t === 'SCHEDULED') return 'upcoming';
  return (ev.STAGE || '').toUpperCase().match(/HALF|SET|QUARTER|INNING|PERIOD|EXTRA|LIVE/)
    ? 'live' : 'upcoming';
}

function passesStateFilter(ev) {
  if (_activeStateFilter !== 'all' && eventState(ev) !== _activeStateFilter) {
    return false;
  }
  // 'On Kalshi' filter — toggled by clicking the summary pill.
  // When active, drops all FL-only (lite) events from the list.
  if (_onlyMatched && !(ev.kalshi && ev.kalshi.event_ticker)) {
    return false;
  }
  return true;
}

function renderCol1() {
  const col1 = document.getElementById('sp-c1-list');
  if (!_eventsCache || !_eventsCache.length) {
    col1.innerHTML = '<div style="padding:24px 14px;color:var(--text-muted);font-size:12px;text-align:center">No leagues today.</div>';
    return;
  }
  // Group leagues by country (Sofascore-style). Each country gets
  // its own section header; leagues nest under. Eliminates the
  // repetitive 'ARGENTINA' subtitle on every row when the same
  // country has many leagues active.
  const byCountry = {};
  let totalEvents = 0;
  for (const t of _eventsCache) {
    const evs = (t.events || t.EVENTS || []).filter(passesStateFilter);
    if (!evs.length) continue;
    totalEvents += evs.length;
    // Country / region bucket. International competitions
    // (UEFA Champions League, Copa Libertadores, World Cup) carry
    // no COUNTRY_NAME — FL parks them under NAME_PART_1 instead
    // ("Europe", "South America", "World"). Fall back to that
    // before lumping into 'International' so they show up in the
    // sidebar under their actual region.
    const country = t.COUNTRY_NAME || t.NAME_PART_1 || 'International';
    if (!byCountry[country]) byCountry[country] = [];
    byCountry[country].push({
      stageId: t.TOURNAMENT_STAGE_ID || '',
      name: leagueDisplayName(t),
      count: evs.length,
    });
  }

  let html = '';
  // 'All leagues' pseudo-entry at top (no country wrapper).
  const allCls = 'sp-c1-league sp-c1-all' + (_activeLeagueFilter == null ? ' active' : '');
  html += '<div class="' + allCls + '" data-stage-id="">';
  html += '<div class="sp-c1-league-info">';
  html += '<span class="sp-c1-league-name">All leagues</span>';
  html += '</div>';
  html += '<span class="sp-c1-league-count">' + totalEvents + '</span>';
  html += '</div>';

  // Country sections — alphabetical, each with its own collapsible
  // header. Leagues within a country sorted alphabetically too.
  // Special-case 'Outrights' to the very top so tournament/season
  // futures (Champions League Winner, Super Bowl Winner, MVP) are
  // the first thing the user sees.
  const countries = Object.keys(byCountry).sort();
  const orIdx = countries.indexOf('Outrights');
  if (orIdx > 0) {
    countries.splice(orIdx, 1);
    countries.unshift('Outrights');
  }
  for (const country of countries) {
    const leagues = byCountry[country].sort((a, b) => a.name.localeCompare(b.name));
    const collapsed = _collapsedCountries.has(country);
    const total = leagues.reduce((s, l) => s + l.count, 0);
    const cls = 'sp-c1-country' + (collapsed ? ' collapsed' : '');
    html += '<div class="' + cls + '" data-country="' + escH(country) + '">';
    html += '<span class="sp-c1-country-arrow">▾</span>';
    html += '<span class="sp-c1-country-name">' + escH(country) + '</span>';
    html += '<span class="sp-c1-country-count">' + total + '</span>';
    html += '</div>';
    if (!collapsed) {
      for (const l of leagues) {
        const lcls = 'sp-c1-league' + (_activeLeagueFilter === l.stageId ? ' active' : '');
        html += '<div class="' + lcls + '" data-stage-id="' + escH(l.stageId) + '">';
        html += '<div class="sp-c1-league-info">';
        html += '<span class="sp-c1-league-name">' + escH(l.name) + '</span>';
        html += '</div>';
        html += '<span class="sp-c1-league-count">' + l.count + '</span>';
        html += '</div>';
      }
    }
  }
  col1.innerHTML = html;
  // Country header → toggle collapse
  col1.querySelectorAll('.sp-c1-country').forEach(el => {
    el.addEventListener('click', () => {
      const c = el.dataset.country;
      if (_collapsedCountries.has(c)) _collapsedCountries.delete(c);
      else _collapsedCountries.add(c);
      renderCol1();
    });
  });
  // League click → filter COL 2
  col1.querySelectorAll('.sp-c1-league').forEach(el => {
    el.addEventListener('click', () => {
      const sid = el.dataset.stageId || null;
      _activeLeagueFilter = sid || null;
      renderCol1();
      renderCol2();
    });
  });
}

function fmtTime(unixSec) {
  if (!unixSec) return '';
  const d = new Date(unixSec * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function leagueDisplayName(t) {
  // Prefer NAME_PART_2 (clean league name, e.g. "Premier League")
  // when FL ships it. Fall back to peeling the country prefix off
  // NAME (which arrives as "England: Premier League" for many
  // tournaments) so the league name still leads the row even when
  // FL omits the split fields. Final fallback: full NAME as-is.
  if (t.NAME_PART_2) return t.NAME_PART_2;
  const name = t.NAME || '';
  const country = t.COUNTRY_NAME || t.NAME_PART_1 || '';
  if (country && name.startsWith(country + ':')) {
    return name.substring(country.length + 1).trim();
  }
  const idx = name.indexOf(':');
  if (idx > 0 && idx < name.length - 1) return name.substring(idx + 1).trim();
  return name;
}

function renderCol2() {
  const col2 = document.getElementById('sp-col2');
  if (!_eventsCache || !_eventsCache.length) {
    col2.innerHTML = '<div class="sp-c2-empty">No events today.</div>';
    return;
  }
  let html = '';
  let any = false;
  // Header with match summary + Game/Market view toggle.
  const totalEvents = _eventsCache.reduce((s, t) =>
    s + (t.events || []).filter(passesStateFilter).length, 0);
  if (_matchedKalshiCount > 0 || totalEvents > 0) {
    html += '<div class="sp-c2-summary">';
    // 'All events' and 'On Kalshi' are mutually-exclusive filter
    // pills — same shape, one always active. Default _onlyMatched
    // = false → 'All events' is the active one.
    const allCls = 'sp-c2-summary-pill' + (!_onlyMatched ? ' active' : '');
    html += '<button class="' + allCls + '" id="sp-c2-show-all" type="button">';
    html += totalEvents + ' events';
    html += '</button>';
    if (_matchedKalshiCount > 0) {
      const pillCls = 'sp-c2-summary-pill' + (_onlyMatched ? ' active' : '');
      html += '<button class="' + pillCls + '" id="sp-c2-only-kalshi" type="button">';
      html += _matchedKalshiCount + ' on Kalshi';
      html += '</button>';
    }
    // Game / Market view toggle — same pattern as the homepage's
    // GRID/LIST style switcher.
    html += '<div class="sp-c2-viewtoggle" role="tablist">';
    html += '<button class="sp-c2-vt-btn' + (_viewMode === 'game' ? ' active' : '') +
            '" data-view="game" type="button" role="tab">Game</button>';
    html += '<button class="sp-c2-vt-btn' + (_viewMode === 'market' ? ' active' : '') +
            '" data-view="market" type="button" role="tab">Markets</button>';
    html += '</div>';
    html += '</div>';

  }
  for (const t of _eventsCache) {
    const stageId = t.TOURNAMENT_STAGE_ID || '';
    if (_activeLeagueFilter && _activeLeagueFilter !== stageId) continue;
    const evs = (t.events || t.EVENTS || []).filter(passesStateFilter);
    if (!evs.length) continue;
    any = true;
    // Does this tournament have any matched (Kalshi-backed)
    // events? If so render the Score / Kalshi (PROB/YES/NO)
    // column header strip beneath the tournament name. If not,
    // skip the strip — there's nothing to label.
    const tournamentHasMatch = evs.some(e => e.kalshi && e.kalshi.event_ticker);
    html += '<div class="sp-c2-tournament">';
    html += '<div class="sp-c2-tournament-head">';
    html += '<span class="sp-c2-league-name">' + escH(leagueDisplayName(t)) + '</span>';
    if (t.COUNTRY_NAME) html += '<span class="sp-c2-country">' + escH(t.COUNTRY_NAME) + '</span>';
    html += '</div>';
    if (tournamentHasMatch) {
      html += '<div class="sp-c2-tournament-cols">';
      html += '<div></div>';  // indicator spacer
      html += '<div></div>';  // time spacer
      html += '<div></div>';  // teams spacer
      html += '<div class="sp-c2-tcol-score">Score</div>';
      html += '<div class="sp-c2-tcol-kalshi">';
      html += '<span class="sp-c2-tcol-kalshi-title">Kalshi</span>';
      html += '<span class="lh-prob">PROB</span>';
      html += '<span class="lh-yes">YES</span>';
      html += '<span class="lh-no">NO</span>';
      html += '</div>';
      html += '</div>';
    }
    html += '<div class="sp-c2-events">';
    for (const ev of evs) {
      // In Market view, each Kalshi ticker becomes its own row;
      // in Game view, each match is one row with a +N badge if
      // multiple markets exist.
      if (_viewMode === 'market' && ev.kalshi && ev.kalshi.markets) {
        // Expand to one row per market — matched events only.
        // Lite events still get one row each (no markets to
        // expand into).
        for (const m of ev.kalshi.markets) {
          html += renderEventRow(ev, m, /*isMarketRow=*/true);
        }
      } else {
        html += renderEventRow(ev, null, /*isMarketRow=*/false);
      }
    }
    html += '</div></div>';
  }
  col2.innerHTML = any ? html :
    '<div class="sp-c2-empty">No events match the current filter.</div>';
  // Click event → select + populate COL 3
  col2.querySelectorAll('.sp-c2-event').forEach(el => {
    el.addEventListener('click', () => {
      col2.querySelectorAll('.sp-c2-event.selected').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      const evId = el.dataset.eventId;
      const ticker = el.dataset.ticker || null;
      _selectedEventId = evId;
      _selectedTicker = ticker;
      renderCol3(evId, ticker);
    });
  });
  // Load-more / show-less toggle inside the teams cell. stop
  // propagation so clicking the button doesn't also fire the
  // row-select handler above (which would steal focus).
  col2.querySelectorAll('.sp-c2-loadmore').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const evId = el.dataset.eventId;
      if (!evId) return;
      if (_expandedEvents.has(evId)) _expandedEvents.delete(evId);
      else _expandedEvents.add(evId);
      renderCol2();
    });
  });
  // 'All events' / 'On Kalshi' filter pills — mutual toggle.
  // Each sets _onlyMatched explicitly (rather than flipping)
  // so a click on the active pill is a no-op rather than
  // accidentally turning off the filter the user already picked.
  const allPill = col2.querySelector('#sp-c2-show-all');
  if (allPill) {
    allPill.addEventListener('click', () => {
      if (_onlyMatched) {
        _onlyMatched = false;
        renderCol1();
        renderCol2();
      }
    });
  }
  const matchedPill = col2.querySelector('#sp-c2-only-kalshi');
  if (matchedPill) {
    matchedPill.addEventListener('click', () => {
      if (!_onlyMatched) {
        _onlyMatched = true;
        renderCol1();
        renderCol2();
      }
    });
  }
  // Game / Market view toggle.
  col2.querySelectorAll('.sp-c2-vt-btn').forEach(el => {
    el.addEventListener('click', () => {
      _viewMode = el.dataset.view;
      try { localStorage.setItem(VIEW_LS_KEY, _viewMode); } catch (e) {}
      renderCol2();
    });
  });
  // Per-event market-type tabs — one strip per matched event.
  // Updates the per-event map then re-renders so just this event's
  // outcomes and chips swap. stopPropagation so the row's click
  // handler doesn't also fire selection.
  col2.querySelectorAll('.sp-c2-event-tab').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const wrap = el.closest('.sp-c2-event');
      if (!wrap) return;
      const evId = wrap.dataset.eventId;
      _eventActiveMarketType.set(evId, el.dataset.mtype || '');
      renderCol2();
    });
  });
}


function eventMarketTypes(ev) {
  // List of market types available for this event, ordered with
  // headline Winner ('') first, then alphabetical. Used to render
  // the per-event tab strip — only types this event actually has,
  // not the union across all events.
  if (!ev.kalshi || !ev.kalshi.markets) return [];
  const set = new Set();
  for (const m of ev.kalshi.markets) set.add(m.market_type || '');
  const arr = Array.from(set);
  arr.sort((a, b) => {
    if (a === b) return 0;
    if (a === '') return -1;
    if (b === '') return 1;
    return a.localeCompare(b);
  });
  return arr;
}

function pickMarketForGameRow(ev) {
  // Game view: return the market matching the PER-EVENT active
  // market type. Each matched event tracks its own selected tab
  // in _eventActiveMarketType so users can compare different
  // markets across events independently. Default '' = headline
  // Winner. NO fallback across types — if the user picked Spreads
  // and this event has no Spreads market, return null and let
  // the renderer leave the chips empty (with team names still
  // visible so the user can see which game it is).
  if (!ev.kalshi || !ev.kalshi.markets) return null;
  const t = _eventActiveMarketType.get(ev.EVENT_ID) || '';
  for (const m of ev.kalshi.markets) {
    if ((m.market_type || '') === t) return m;
  }
  return null;
}

function renderEventRow(ev, market, isMarketRow) {
  // market is non-null in Market view (the specific Kalshi
  // ticker for this row). isMarketRow flips a few visuals
  // (smaller font on the market-type label, ticker in the
  // selection key).
  const state = eventState(ev);
  const time = state === 'finished' ? 'FT' : fmtTime(ev.START_TIME);
  const stLbl = state === 'live' ? (ev.STAGE || 'LIVE') :
                state === 'finished' ? '' :
                state === 'upcoming' ? '' : '';
  const matched = !!(ev.kalshi && ev.kalshi.event_ticker);
  // In Game view, the active market type drives which ticker
  // this row links to (so when user picks 'Spread' from the tab
  // strip, clicking a row opens the spread market for that
  // game, not the headline Winner).
  let gameViewMarket = null;
  if (matched && !isMarketRow) {
    gameViewMarket = pickMarketForGameRow(ev);
  }
  const rowTicker = isMarketRow && market ? market.event_ticker
                  : (gameViewMarket ? gameViewMarket.event_ticker
                  : (matched ? ev.kalshi.event_ticker : null));
  const isSelected = isMarketRow
    ? (ev.EVENT_ID === _selectedEventId && rowTicker === _selectedTicker)
    : (ev.EVENT_ID === _selectedEventId && !_selectedTicker);
  const evClasses = [
    'sp-c2-event',
    matched ? 'sp-c2-matched' : 'sp-c2-lite',
    isSelected ? 'selected' : '',
  ].filter(Boolean).join(' ');
  let html = '<div class="' + evClasses + '" data-event-id="' + escH(ev.EVENT_ID || '') + '"';
  if (rowTicker) html += ' data-ticker="' + escH(rowTicker) + '"';
  html += '>';
  // Per-event market-type tabs — only in Game view, only when this
  // event has more than one market. Mirrors the homepage card
  // pattern: the tabs live INSIDE the row so users can switch
  // markets right where they're looking, instead of via a global
  // filter at the top of COL 2.
  if (matched && !isMarketRow) {
    const types = eventMarketTypes(ev);
    if (types.length > 1) {
      const evActive = _eventActiveMarketType.get(ev.EVENT_ID) || '';
      html += '<div class="sp-c2-event-tabs">';
      for (const t of types) {
        const lbl = t === '' ? 'Winner' : t;
        const cls = 'sp-c2-event-tab' + (t === evActive ? ' active' : '');
        html += '<button class="' + cls + '" data-mtype="' + escH(t) +
                '" type="button">' + escH(lbl) + '</button>';
      }
      html += '</div>';
    }
  }
  // Main row — indicator / time / teams / scores / marketcell.
  html += '<div class="sp-c2-event-row">';
  // Left indicator column — Kalshi K (+ count badge in Game view
  // when an event has multiple markets).
  html += '<div class="sp-c2-indicator">';
  if (matched) {
    html += '<span class="sp-c2-kalshi-badge" title="On Kalshi">K</span>';
    if (!isMarketRow && ev.kalshi.count > 1) {
      html += '<span class="sp-c2-count-badge" title="' +
        escH(ev.kalshi.count + ' markets') + '">+' + (ev.kalshi.count - 1) + '</span>';
    }
  }
  html += '</div>';
  html += '<div class="sp-c2-time">' + escH(time);
  if (stLbl) html += '<span class="sp-c2-time-state' + (state === 'live' ? ' live' : '') + '">' + escH(stLbl) + '</span>';
  html += '</div>';
  // Build the visible outcome list (capped at MAX_VISIBLE unless
  // the user toggled "+ N more" on this event). The same list
  // drives both the teams cell (labels) and the marketcell
  // (chips) so they stay in lockstep. In Market view we pass the
  // per-row market so SPREADS / TOTALS / etc. show their own
  // outcomes — not always the headline Winner's home/away/tie.
  const rowMarketOverride = isMarketRow ? market : null;
  const allOutcomes = matched ? collectOutcomesForRender(ev, rowMarketOverride) : [];
  const MAX_VISIBLE = 4;
  const expanded = _expandedEvents.has(ev.EVENT_ID);
  const outcomes = (allOutcomes.length > MAX_VISIBLE && !expanded)
    ? allOutcomes.slice(0, MAX_VISIBLE)
    : allOutcomes;
  const hasMore = allOutcomes.length > MAX_VISIBLE;
  html += '<div class="sp-c2-teams">';
  // For matched events showing sub-market outcomes (BTTS / Totals
  // / First Goalscorer / Spreads / etc.), the outcome labels alone
  // ('Both Teams To Score', 'Over 2.5') don't tell the user which
  // game it is. Prepend a matchup header so 'Bayern vs Barcelona'
  // is always visible. Skip the header for Winner outcomes
  // because the labels are already the team names — adding the
  // header would just duplicate them. Outright events have no
  // matchup; they don't get a header either.
  const activeMkt = rowMarketOverride || (matched ? pickMarketForGameRow(ev) : null);
  const isWinnerActive = activeMkt && (activeMkt.market_type || '') === '';
  const hasTeamNames = !!(ev.HOME_NAME || ev.AWAY_NAME);
  const showMatchup = matched && hasTeamNames && !isWinnerActive;
  if (showMatchup) {
    const matchup = (ev.HOME_NAME || '') + ' vs ' + (ev.AWAY_NAME || '');
    html += '<span class="sp-c2-matchup" title="' + escH(matchup) +
            '">' + escH(matchup) + '</span>';
  }
  if (matched && outcomes.length) {
    // Show outcome labels (home / away / tie for Winner; spread
    // variants for Spreads; etc.). Score column to the right
    // stays anchored to the home/away pair regardless of how
    // many outcome rows we render here.
    for (const o of outcomes) {
      html += '<span class="sp-c2-team" title="' + escH(o.label || '') +
              '">' + escH(o.label || '') + '</span>';
    }
    if (hasMore) {
      const lbl = expanded ? 'Show less' : '+ ' + (allOutcomes.length - MAX_VISIBLE) + ' more';
      html += '<button class="sp-c2-loadmore" data-event-id="' +
              escH(ev.EVENT_ID || '') + '" type="button">' + escH(lbl) + '</button>';
    }
  } else if (!showMatchup && hasTeamNames) {
    // No outcomes (unmatched OR matched but no market for the
    // active sub-market type) and no matchup header above.
    // Render plain team names so the user still sees the fixture.
    html += '<span class="sp-c2-team">' + escH(ev.HOME_NAME || '') + '</span>';
    html += '<span class="sp-c2-team">' + escH(ev.AWAY_NAME || '') + '</span>';
  }
  // In Market view, append the market type below the labels so
  // users can scan which market each row represents.
  if (isMarketRow && market) {
    const mtypeLabel = market.market_type || 'Winner';
    html += '<span class="sp-c2-market-type">' + escH(mtypeLabel) + '</span>';
  }
  html += '</div>';
  // Tennis events get the full sets/serve/games/point breakdown
  // matching the homepage tennis-row layout (HOME_SCORE_PART_1..5,
  // HOME_SCORE_PART_GAME, SERVICE — all on the FL event payload).
  // Other sports get the simple home/away score column.
  const isTennisEv = activeSportId() === 2;
  if (isTennisEv) {
    html += renderTennisScoreCell(ev, showMatchup);
  } else {
    html += '<div class="sp-c2-scores">';
    if (showMatchup) html += '<span></span>';  // align scores with outcome rows below the matchup header
    html += '<span>' + escH(ev.HOME_SCORE_CURRENT != null ? ev.HOME_SCORE_CURRENT : '') + '</span>';
    html += '<span>' + escH(ev.AWAY_SCORE_CURRENT != null ? ev.AWAY_SCORE_CURRENT : '') + '</span>';
    // Aggregate score (two-leg knockout ties — soccer cup
    // competitions). Only shows when matched event has aggregate
    // data from SofaScore enrichment. Tiny "agg X-Y" line below
    // the leg score so users see the tie standing.
    if (matched && ev.kalshi.aggregate_home != null && ev.kalshi.aggregate_away != null) {
      html += '<span class="sp-c2-agg" title="Aggregate score">agg ' +
              escH(ev.kalshi.aggregate_home) + '-' +
              escH(ev.kalshi.aggregate_away) + '</span>';
    }
    html += '</div>';
  }
  // Right market cell — chip rows only (PROB / YES / NO), one per
  // outcome. Labels live in the teams cell to the left so each
  // chip row reads horizontally with its corresponding label.
  // Outcome → chip row is 1:1 in display order.
  html += '<div class="sp-c2-marketcell">';
  if (matched && outcomes.length) {
    // When the teams cell has a matchup header on top (sub-market
    // views like Spreads / BTTS), prepend an empty chip-row spacer
    // here so each real chip row aligns horizontally with its
    // outcome label below the matchup header — not with the
    // matchup line itself.
    if (showMatchup) html += '<div class="sp-c2-chip-spacer"></div>';
    for (const o of outcomes) html += renderChipRow(o);
  } else {
    html += '<span class="sp-c2-no-market" title="' +
            (matched ? 'No prices yet' : 'No markets yet') + '">—</span>';
  }
  html += '</div>';
  html += '</div>';   // close .sp-c2-event-row
  html += '</div>';   // close .sp-c2-event
  return html;
}

function collectOutcomesForRender(ev, marketOverride) {
  // Return a uniform [{label, prob, yes, no, ticker}, …] list for
  // the relevant market. In Market view the caller passes the
  // specific per-row market via marketOverride; in Game view we
  // pick by the active market-type tab. Winner uses primary_prices
  // (home / away / tie with FL team names); other types pass
  // through cache outcomes with self-describing labels like
  // "Real Madrid wins by over 2.5 goals".
  if (!ev.kalshi) return [];
  const activeMarket = marketOverride || pickMarketForGameRow(ev);
  const isWinner = activeMarket && (activeMarket.market_type || '') === '';
  if (isWinner && ev.kalshi.primary_prices) {
    const p = ev.kalshi.primary_prices;
    const out = [];
    const has = (a, b, c) => a != null || b != null || c != null;
    if (has(p.home_prob, p.home_yes, p.home_no)) {
      out.push({ label: ev.HOME_NAME || 'Home',
                 prob: p.home_prob, yes: p.home_yes, no: p.home_no,
                 ticker: p.home_ticker });
    }
    if (has(p.away_prob, p.away_yes, p.away_no)) {
      out.push({ label: ev.AWAY_NAME || 'Away',
                 prob: p.away_prob, yes: p.away_yes, no: p.away_no,
                 ticker: p.away_ticker });
    }
    if (has(p.tie_prob, p.tie_yes, p.tie_no)) {
      out.push({ label: 'Tie',
                 prob: p.tie_prob, yes: p.tie_yes, no: p.tie_no,
                 ticker: p.tie_ticker });
    }
    return out;
  }
  if (activeMarket && activeMarket.outcomes && activeMarket.outcomes.length) {
    return activeMarket.outcomes;
  }
  return [];
}

function renderTennisScoreCell(ev, hasMatchupHeader) {
  // Tennis-specific score cell — replaces home/away score numbers
  // with the full sets / serve-dot / current-games / current-point
  // breakdown that matches the homepage tennis-row layout. FL
  // ships these on each event:
  //   HOME_SCORE_CURRENT / AWAY_SCORE_CURRENT — sets won
  //   HOME_SCORE_PART_GAME / AWAY_SCORE_PART_GAME — current point
  //     (0/15/30/40/A)
  //   HOME_SCORE_PART_<n> / AWAY_SCORE_PART_<n> — games per set;
  //     last populated set is the current set
  //   SERVICE — '1' home / '2' away (empty between points)
  // Player names live in the teams cell to the left, so this cell
  // is purely numeric.
  const sets_h = ev.HOME_SCORE_CURRENT != null ? ev.HOME_SCORE_CURRENT : '';
  const sets_a = ev.AWAY_SCORE_CURRENT != null ? ev.AWAY_SCORE_CURRENT : '';
  // Find the latest populated set to get current games.
  let games_h = '', games_a = '';
  for (let si = 5; si >= 1; si--) {
    const h = ev['HOME_SCORE_PART_' + si];
    const a = ev['AWAY_SCORE_PART_' + si];
    if (h != null || a != null) {
      games_h = h != null ? h : '';
      games_a = a != null ? a : '';
      break;
    }
  }
  const point_h = ev.HOME_SCORE_PART_GAME != null ? ev.HOME_SCORE_PART_GAME : '';
  const point_a = ev.AWAY_SCORE_PART_GAME != null ? ev.AWAY_SCORE_PART_GAME : '';
  const svc = String(ev.SERVICE || '').trim().toUpperCase();
  const homeServes = svc === '1' || svc === 'HOME' || svc === 'H';
  const awayServes = svc === '2' || svc === 'AWAY' || svc === 'A';
  let html = '<div class="sp-c2-scores tennis-score">';
  if (hasMatchupHeader) html += '<div class="tn-row"></div>';  // align below matchup
  html += '<div class="tn-row">';
  html += '<span class="tn-sets">' + escH(sets_h) + '</span>';
  html += '<span class="tn-serve">' + (homeServes ? '●' : '') + '</span>';
  html += '<span class="tn-games">' + escH(games_h) + '</span>';
  html += '<span class="tn-point">' + escH(point_h) + '</span>';
  html += '</div>';
  html += '<div class="tn-row">';
  html += '<span class="tn-sets">' + escH(sets_a) + '</span>';
  html += '<span class="tn-serve">' + (awayServes ? '●' : '') + '</span>';
  html += '<span class="tn-games">' + escH(games_a) + '</span>';
  html += '<span class="tn-point">' + escH(point_a) + '</span>';
  html += '</div>';
  html += '</div>';
  return html;
}

function renderChipRow(o) {
  // One PROB / YES / NO chip row aligned 1:1 with the outcome
  // label rendered in the teams cell to the left. Each row's
  // data-ticker is the per-outcome WS subscription target so
  // prices flash on the chip when the bid moves.
  const tickerAttr = o.ticker ? ' data-ticker="' + escH(o.ticker) + '"' : '';
  let row = '<div class="sp-c2-chip-row"' + tickerAttr + '>';
  row += '<span class="sp-c2-prob" data-fld="prob">' +
    (o.prob != null ? o.prob + '%' : '–') + '</span>';
  row += '<span class="sp-c2-yes" data-fld="yes">' +
    (o.yes != null ? o.yes + '¢' : '–') + '</span>';
  row += '<span class="sp-c2-no" data-fld="no">' +
    (o.no != null ? o.no + '¢' : '–') + '</span>';
  row += '</div>';
  return row;
}

// State-filter pill clicks
document.querySelectorAll('.sp-c1-filter').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sp-c1-filter').forEach(x => x.classList.remove('active'));
    el.classList.add('active');

// ── COL 3: event detail panel ──
// Populated when user clicks an event in COL 2. For matched
// events (Kalshi market exists) we show the basic FL header
// + a 'View on Stochverse ↗' button that opens the existing
// homepage modal (which has the full block-component stack —
// Stats, Lineups, Player Stats, etc.). For FL-only events we
// show the FL data inline since there's no Kalshi modal target.
async function renderCol3(flEventId, ticker) {
  const col3 = document.getElementById('sp-col3');
  // Find the FL event in our cache so we can render header
  // immediately without an extra fetch.
  let ev = null;
  let tournament = null;
  for (const t of (_eventsCache || [])) {
    for (const e of (t.events || [])) {
      if (e.EVENT_ID === flEventId) { ev = e; tournament = t; break; }
    }
    if (ev) break;
  }
  if (!ev) {
    col3.innerHTML = '<div class="sp-c3-empty"><div class="sp-c3-empty-title">Event not found</div></div>';
    return;
  }
  const state = eventState(ev);
  const time = state === 'finished' ? 'FT' : fmtTime(ev.START_TIME);
  const stLbl = state === 'live' ? (ev.STAGE || 'LIVE') :
                state === 'finished' ? 'Finished' :
                state === 'upcoming' ? 'Scheduled' : '';
  const matched = !!ticker;

  let html = '<div class="sp-c3-detail">';
  // Tournament context up top
  html += '<div class="sp-c3-tournament">';
  html += '<span class="sp-c3-league-name">' + escH(leagueDisplayName(tournament || {})) + '</span>';
  if (tournament && tournament.COUNTRY_NAME) {
    html += ' <span class="sp-c3-country">' + escH(tournament.COUNTRY_NAME) + '</span>';
  }
  html += '</div>';
  // Header — score line + state
  html += '<div class="sp-c3-header">';
  html += '<div class="sp-c3-state' + (state === 'live' ? ' live' : '') + '">';
  if (stLbl) html += escH(stLbl);
  if (time) html += ' · ' + escH(time);
  html += '</div>';
  html += '<div class="sp-c3-teams-row">';
  html += '<div class="sp-c3-team-name">' + escH(ev.HOME_NAME || '') + '</div>';
  html += '<div class="sp-c3-score">' +
    escH(ev.HOME_SCORE_CURRENT != null ? ev.HOME_SCORE_CURRENT : '–') + '</div>';
  html += '</div>';
  html += '<div class="sp-c3-teams-row">';
  html += '<div class="sp-c3-team-name">' + escH(ev.AWAY_NAME || '') + '</div>';
  html += '<div class="sp-c3-score">' +
    escH(ev.AWAY_SCORE_CURRENT != null ? ev.AWAY_SCORE_CURRENT : '–') + '</div>';
  html += '</div>';
  html += '</div>';

  // Markets section: for matched events, list ALL Kalshi markets
  // for this match (Winner, Spread, Total Points, Steals, etc.)
  // each with its own 'View' link to the full Kalshi modal. For
  // FL-only events, a 'no markets yet' placeholder that's
  // future-compatible with Polymarket / sportsbook integration.
  html += '<div class="sp-c3-section">';
  html += '<div class="sp-c3-section-head">Markets</div>';
  if (matched) {
    const markets = (ev.kalshi && ev.kalshi.markets) || [];
    html += '<div class="sp-c3-markets">';
    for (const m of markets) {
      const label = m.market_type || 'Winner';
      html += '<a class="sp-c3-market-row" href="/?event=' + escH(m.event_ticker) + '" target="_blank" rel="noopener">';
      html += '<span class="sp-c3-market-label">' + escH(label) + '</span>';
      html += '<span class="sp-c3-market-arrow">↗</span>';
      html += '</a>';
    }
    html += '</div>';
    html += '<div class="sp-c3-cta-sub">Click a market → opens the full Kalshi view in a new tab.</div>';
  } else {
    html += '<div class="sp-c3-no-market">No markets yet</div>';
    html += '<div class="sp-c3-cta-sub">Polymarket and sportsbook odds for this event will appear here once those integrations land.</div>';
  }
  html += '</div>';

  // Stats section: placeholder for now (Phase 2c will inline
  // the existing block components — Stats, Lineups, Player Stats —
  // pulled from /api/event/{ticker}/normalized for matched events
  // or directly from FL endpoints for FL-only events).
  html += '<div class="sp-c3-section">';
  html += '<div class="sp-c3-section-head">Stats</div>';
  html += '<div class="sp-c3-stats-placeholder">Stats panel coming in Phase 2c — Summary, Stats, Lineups, Player Stats blocks rendered inline here.</div>';
  html += '</div>';

  html += '</div>';
  col3.innerHTML = html;
}

// ── Column splitter: drag-to-resize for COL 1 and COL 3 ──
// Bounds: COL 1 in [200, 480]px, COL 3 in [320, 720]px. Below
// these the layout starts breaking; above wastes screen real
// estate. Persists to localStorage so user prefs survive reload.
//
// Disabled at <900px (mobile fallback uses single-column anyway).
// COL 3 max is dynamic — capped by viewport width minus a
// minimum-viable footprint for COL 1 + COL 2 (~480px combined),
// so on wide displays you can drag COL 3 to fill most of the
// screen for full event-detail real estate.
const SPLIT_BOUNDS = {
  col1: { min: 200, max: 480, default: 280, var: '--col1-w' },
  col3: { min: 320, max: 1400, default: 480, var: '--col3-w' },
};

function effectiveMax(key) {
  const b = SPLIT_BOUNDS[key];
  if (key === 'col3') {
    // Reserve at least 480px combined for COL 1 + COL 2 (sidebar
    // 200 + middle 280 minimum); the rest can go to COL 3.
    return Math.max(b.min, Math.min(b.max, window.innerWidth - 480));
  }
  return b.max;
}
const SPLIT_LS_KEY = 'sv:sports:cols';

function loadColWidths() {
  if (window.innerWidth < 900) return;
  let saved;
  try {
    saved = JSON.parse(localStorage.getItem(SPLIT_LS_KEY) || '{}');
  } catch (e) { saved = {}; }
  const main = document.getElementById('sp-main');
  for (const key of ['col1', 'col3']) {
    const b = SPLIT_BOUNDS[key];
    const max = effectiveMax(key);
    const w = saved[key];
    if (typeof w === 'number' && w >= b.min && w <= max) {
      main.style.setProperty(b.var, w + 'px');
    }
  }
}

function saveColWidth(key, px) {
  let saved;
  try {
    saved = JSON.parse(localStorage.getItem(SPLIT_LS_KEY) || '{}');
  } catch (e) { saved = {}; }
  saved[key] = px;
  try {
    localStorage.setItem(SPLIT_LS_KEY, JSON.stringify(saved));
  } catch (e) { /* localStorage may be unavailable in private mode */ }
}

function setupSplitter(splitterEl) {
  const key = splitterEl.dataset.resize;       // 'col1' or 'col3'
  const b = SPLIT_BOUNDS[key];
  const main = document.getElementById('sp-main');
  let dragging = false;
  let startX = 0;
  let startW = 0;

  function getCurrentW() {
    const cs = getComputedStyle(main).getPropertyValue(b.var).trim();
    return parseInt(cs, 10) || b.default;
  }

  function onDown(e) {
    if (window.innerWidth < 900) return;
    dragging = true;
    splitterEl.classList.add('dragging');
    startX = e.clientX;
    startW = getCurrentW();
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    let delta = e.clientX - startX;
    // COL 3 grows when you drag the right splitter LEFT (delta
    // negative shrinks main area, expanding col3). Invert for col3.
    if (key === 'col3') delta = -delta;
    const max = effectiveMax(key);
    let next = Math.max(b.min, Math.min(max, startW + delta));
    main.style.setProperty(b.var, next + 'px');
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    splitterEl.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    saveColWidth(key, getCurrentW());
  }

  splitterEl.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  // Double-click resets to default (Sofascore convention).
  splitterEl.addEventListener('dblclick', () => {
    main.style.setProperty(b.var, b.default + 'px');
    saveColWidth(key, b.default);
  });
}

// ── Live price WebSocket — same pattern as the homepage's
// PriceStream. Connects to /ws/prices, subscribes to the per-
// outcome market tickers we render, and patches chips in place
// when prices move. Flash animation matches the homepage.
//
// Self-contained (~80 lines) so sports.html doesn't have to
// pull the full bundle just for this.
const PriceWS = (function() {
  let ws = null;
  const subscribed = new Set();   // tickers we've asked for
  const handlers = [];            // onUpdate callbacks
  let retry = 0;
  let heartbeat = null;

  function connect() {
    try {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws/prices');
    } catch (e) { return scheduleReconnect(); }
    ws.onopen = () => {
      retry = 0;
      if (subscribed.size > 0) {
        ws.send(JSON.stringify({
          action: 'subscribe', tickers: Array.from(subscribed),
        }));
      }
      heartbeat = setInterval(() => {
        try { ws.send(JSON.stringify({action: 'ping'})); } catch (e) {}
      }, 25000);
    };
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      if (msg.type === 'price') dispatch(msg.ticker, msg.data);
      else if (msg.type === 'snapshot') {
        const u = msg.updates || [];
        for (let i = 0; i < u.length; i++) dispatch(u[i].ticker, u[i].data);
      }
    };
    ws.onclose = () => {
      if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
      scheduleReconnect();
    };
  }
  function scheduleReconnect() {
    retry = Math.min(retry + 1, 6);
    setTimeout(connect, Math.min(1000 * Math.pow(2, retry), 30000));
  }
  function dispatch(ticker, data) {
    for (const h of handlers) { try { h(ticker, data); } catch (e) {} }
  }
  return {
    connect: connect,
    subscribe: (tickers) => {
      const added = [];
      for (const t of tickers) {
        const u = String(t || '').toUpperCase();
        if (!u || subscribed.has(u)) continue;
        subscribed.add(u);
        added.push(u);
      }
      if (added.length && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({action: 'subscribe', tickers: added}));
      }
    },
    onUpdate: (cb) => handlers.push(cb),
  };
})();

// Apply a price update to the chip in COL 2 for a given ticker.
// data carries yes_bid / yes_ask / no_bid / no_ask in cents.
// On change: update text + add flash class (auto-clears via
// animationend listener).
function applyPriceUpdate(ticker, data) {
  if (!ticker) return;
  // Outcome rows carry data-ticker (event-level wrappers also do,
  // but those don't contain [data-fld] cells, so be specific).
  const row = document.querySelector(
    '.sp-c2-chip-row[data-ticker="' + ticker + '"]');
  if (!row) return;
  const updateField = (field, newVal, cls) => {
    if (newVal == null) return;
    // Coerce to integer cents — WS payloads may carry float
    // artefacts (56.000000000000001) that would render as long
    // decimals in the chip. Same fix as the API-side _to_cents().
    const intVal = Math.round(Number(newVal));
    if (!Number.isFinite(intVal)) return;
    const cell = row.querySelector('[data-fld="' + field + '"]');
    if (!cell) return;
    const newText = intVal + (field === 'prob' ? '%' : '¢');
    if (cell.textContent === newText) return;
    // Compare numeric value to choose flash direction.
    const oldNum = parseInt(cell.textContent, 10);
    const direction = isNaN(oldNum) || intVal === oldNum ? '' :
                      (intVal > oldNum ? 'sp-flash-up' : 'sp-flash-down');
    cell.textContent = newText;
    if (direction) {
      cell.classList.remove('sp-flash-up', 'sp-flash-down');
      // Force reflow so the animation restarts even if the same
      // class was just removed.
      void cell.offsetWidth;
      cell.classList.add(direction);
    }
  };
  if (data.yes_bid != null) updateField('prob', data.yes_bid);
  if (data.yes_ask != null) updateField('yes',  data.yes_ask);
  if (data.no_ask  != null) updateField('no',   data.no_ask);
}

PriceWS.onUpdate(applyPriceUpdate);
PriceWS.connect();

// After events render, gather all price-row tickers and subscribe
// to them. Hook into renderCol2's tail by wrapping the original.
const _origRenderCol2 = renderCol2;
renderCol2 = function() {
  _origRenderCol2();
  const tickers = [];
  document.querySelectorAll('.sp-c2-chip-row[data-ticker]').forEach(el => {
    const t = el.dataset.ticker;
    if (t) tickers.push(t);
  });
  if (tickers.length) PriceWS.subscribe(tickers);
};

// Initial load
loadColWidths();
// Tennis sport needs a wider score column (sets/serve/games/point
// breakdown). Set the body class once on load — the CSS variable
// --sp-score-w switches based on this.
if (activeSportId() === 2) document.body.classList.add('sport-tennis');
document.querySelectorAll('.sp-splitter').forEach(setupSplitter);
loadSportNav();
loadEvents();
</script>
