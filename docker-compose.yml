# Local development stack for the SP Architecture rebuild.
#
# Brings up Postgres 16 with a persistent volume. Connect via:
#   DATABASE_URL=postgresql+asyncpg://dev:dev@localhost:5432/sports_dev
#
# Common workflows live in the Makefile. Quick start:
#   make dev          # bring this stack up
#   make migrate      # apply Alembic migrations to the dev database
#   make seed         # load curated test fixtures (when sp_seed_fixtures.py exists)
#   make psql         # interactive psql shell into the dev database
#   make clean        # tear down and delete the volume
#
# The application itself is run from the host (uvicorn main:app --reload)
# rather than inside docker — keeps the file-watch story simple and lets
# the existing dev setup keep working unchanged.
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stochverse_dev_pg
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: sports_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d sports_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
